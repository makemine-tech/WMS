<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}

<script>
'use strict';
const {createElement:h,useState,useEffect,Fragment}=React;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Firebase REST API (SDK 없음 — fetch 직접 통신)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const DB_URL='https://makemine-wms-default-rtdb.asia-southeast1.firebasedatabase.app/wms/data.json';

function dbSave(data){
  fetch(DB_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({j:JSON.stringify(data),t:Date.now()})})
    .then(function(r){return r.json();})
    .then(function(){console.log('✅ 저장완료');})
    .catch(function(e){console.error('❌ 저장실패',e);});
}
var _poll=null, _lastT=null;
function dbListen(cb){
  function fetch1(){
    fetch(DB_URL)
      .then(function(r){return r.json();})
      .then(function(v){
        if(v&&v.j&&v.t!==_lastT){_lastT=v.t;try{cb(JSON.parse(v.j));}catch(e){cb([]);}}
        else if(!v||!v.j){cb([]);}
      })
      .catch(function(e){console.error('❌ 읽기실패',e);});
  }
  fetch1();
  _poll=setInterval(fetch1,3000);
}
function dbOff(){if(_poll){clearInterval(_poll);_poll=null;}}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const uid=function(){return Math.random().toString(36).slice(2,9);};
const dayLabel=function(){var d=new Date(),W=['일','월','화','수','목','금','토'];return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+' ('+W[d.getDay()]+')';};
const fmtExp=function(s){return s&&s.length===6?'20'+s.slice(0,2)+'.'+s.slice(2,4)+'.'+s.slice(4,6):(s||'');};
const deep=function(o){return JSON.parse(JSON.stringify(o));};

const CT={rack:{lbl:'랙',clr:'#60A5FA',bg:'rgba(59,130,246,.20)',bdr:'#3B82F6'},empty:{lbl:'빈공간',clr:'#34D399',bg:'rgba(16,185,129,.11)',bdr:'#10B981'},unused:{lbl:'미사용',clr:'#6B7280',bg:'rgba(100,116,139,.09)',bdr:'#475569'},shelf:{lbl:'선반',clr:'#FBBF24',bg:'rgba(245,158,11,.16)',bdr:'#F59E0B'}};
const PC=['#F87171','#FB923C','#FBBF24','#4ADE80','#34D399','#60A5FA','#A78BFA','#F472B6','#2DD4BF','#38BDF8'];
const BG='#0F172A',CARD='#1E293B',BDR='#334155',TX='#E2E8F0',SUB='#64748B';
function S(bg,clr,ex){return Object.assign({background:bg,color:clr,border:'none',borderRadius:7,padding:'7px 14px',fontSize:13,fontWeight:600,cursor:'pointer'},ex||{});}

function mkSlots(r,c){var s={};for(var ri=0;ri<r;ri++)for(var ci=0;ci<c;ci++)s[ri+'-'+ci]=null;return s;}
function mkCell(type,dr,dc){return{type:type,divR:dr,divC:dc,slots:mkSlots(dr,dc)};}
function mkWH(name,rows,cols){
  var cells={};
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)cells[r+'-'+c]={type:null,divR:1,divC:1,slots:{'0-0':null}};
  return{id:uid(),name:name,rows:rows,cols:cols,cells:cells,inQ:[],history:[],undoStack:[],pColors:{},sheetsUrl:''};
}
function calcSt(wh){var tot=0,used=0;Object.values(wh.cells).forEach(function(c){if(c.type==='rack'||c.type==='shelf'){tot+=c.divR*c.divC;used+=Object.values(c.slots).filter(Boolean).length;}});return{tot:tot,used:used,free:tot-used};}
function getPG(wh,cells){
  var src=cells||wh.cells,m={};
  Object.values(src).forEach(function(c){Object.values(c.slots).forEach(function(s){
    if(!s)return;var clr=wh.pColors[s.name]||'#94A3B8';
    if(!m[s.name])m[s.name]={name:s.name,cnt:0,totalQty:0,clr:clr,exps:{}};
    m[s.name].cnt++;m[s.name].totalQty+=s.qty||0;
    var ek=s.exp||'';if(!m[s.name].exps[ek])m[s.name].exps[ek]={exp:ek,cnt:0,totalQty:0};
    m[s.name].exps[ek].cnt++;m[s.name].exps[ek].totalQty+=s.qty||0;
  });});
  return Object.values(m).map(function(p){return Object.assign({},p,{exps:Object.values(p.exps).sort(function(a,b){return !a.exp?1:!b.exp?-1:a.exp.localeCompare(b.exp);})});});
}
function pickClr(wh,name){if(wh.pColors[name])return wh.pColors[name];var used=new Set(Object.values(wh.pColors));return PC.find(function(c){return !used.has(c);})||PC[0];}

var tl={rack:'랙',empty:'빈공간',unused:'미사용',shelf:'선반'};
function buildTSV(wh,cells,stats,label){
  function esc(v){return String(v||'').replace(/\t/g,' ').replace(/\n/g,' ');}
  var rows=[['창고:'+esc(wh.name),'저장:'+esc(label||'현재'),'전체:'+stats.tot,'사용:'+stats.used,'여유:'+stats.free],[],[''].concat(Array.from({length:wh.cols},function(_,i){return 'C'+(i+1);}))];
  for(var r=0;r<wh.rows;r++){
    var row=['R'+(r+1)];
    for(var c=0;c<wh.cols;c++){
      var cell=cells&&cells[r+'-'+c];
      if(!cell||!cell.type){row.push('');continue;}
      var slots=Object.values(cell.slots||{}).filter(Boolean);
      if(!slots.length){row.push('['+( tl[cell.type]||cell.type)+']');continue;}
      row.push(slots.map(function(s){return esc(s.name)+(s.exp?' ~'+fmtExp(s.exp):'')+' ('+s.qty+'개)';}).join(' / '));
    }
    rows.push(row);
  }
  return rows.map(function(r){return r.join('\t');}).join('\n');
}
function copyText(text){var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:-9999px;left:-9999px';document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,9999999);var ok=document.execCommand('copy');document.body.removeChild(ta);return ok;}

var GAS=['function doPost(e){','  try{','    var data=JSON.parse(e.postData.contents);','    var ss=SpreadsheetApp.getActiveSpreadsheet();','    var sn=(data.label||"sheet").slice(0,28);','    var ex=ss.getSheetByName(sn);','    if(ex)ss.deleteSheet(ex);','    var sheet=ss.insertSheet(sn,ss.getSheets().length);','    var tc={rack:"#dbeafe",empty:"#d1fae5",unused:"#f1f5f9",shelf:"#fef3c7"};','    sheet.getRange(1,1).setValue("창고: "+data.warehouseName).setFontWeight("bold");','    sheet.getRange(2,1).setValue("저장: "+data.label);','    sheet.getRange(3,1).setValue("전체:"+data.stats.tot+" 사용:"+data.stats.used+" 여유:"+data.stats.free);','    for(var r=0;r<data.rows;r++){','      for(var c=0;c<data.cols;c++){','        var cell=data.cells[r+"-"+c];','        var rng=sheet.getRange(5+r,c+1);','        if(!cell||!cell.type){rng.setBackground("#f8f9fa");continue;}','        rng.setBackground(tc[cell.type]||"#fff");','        var texts=[],sk=Object.keys(cell.slots||{});','        for(var i=0;i<sk.length;i++){','          var s=cell.slots[sk[i]];','          if(s)texts.push(s.name+(s.exp?" ~"+s.exp:"")+" "+s.qty+"개");',        '}','        if(texts.length){rng.setValue(texts.join(" / "));rng.setWrap(true);}','      }','    }','    SpreadsheetApp.flush();','    var out=ContentService.createTextOutput(JSON.stringify({success:true}));','    out.setMimeType(ContentService.MimeType.JSON);return out;','  }catch(err){','    var out=ContentService.createTextOutput(JSON.stringify({success:false,error:err.message}));','    out.setMimeType(ContentService.MimeType.JSON);return out;','  }','}','function doGet(e){','  var out=ContentService.createTextOutput(JSON.stringify({status:"WMS connected"}));','  out.setMimeType(ContentService.MimeType.JSON);return out;','}'].join('\n');

// ── 공통 컴포넌트 ──────────────────────────────────────────────
function Inp(props){
  return h('label',{style:{display:'flex',flexDirection:'column',gap:4,fontSize:12,color:SUB}},
    props.lbl,
    h('input',{type:props.type||'text',value:props.val,placeholder:props.ph||'',onChange:function(e){props.set(e.target.value);},style:{background:BG,border:'1px solid '+BDR,borderRadius:7,padding:'8px 10px',color:TX,fontSize:14,outline:'none',width:'100%'}})
  );
}
function DivPicker(props){
  var val=props.val,set=props.set;
  var _hov=useState(null),hov=_hov[0],setHov=_hov[1];
  var hi=hov||val;
  var cells=[];
  for(var r=0;r<4;r++)for(var c=0;c<4;c++){
    var act=hi.r>=r+1&&hi.c>=c+1,sel=val.r>=r+1&&val.c>=c+1;
    cells.push(h('div',{key:r+'-'+c,style:{width:22,height:22,borderRadius:3,cursor:'pointer',background:act?'rgba(99,102,241,.55)':sel?'rgba(99,102,241,.2)':'rgba(255,255,255,.06)',border:'1px solid '+(act?'#818CF8':sel?'#6366F1':'rgba(255,255,255,.1)')},
      onMouseEnter:function(rr,cc){return function(){setHov({r:rr+1,c:cc+1});};}(r,c),
      onMouseLeave:function(){setHov(null);},
      onClick:function(rr,cc){return function(){set({r:rr+1,c:cc+1});};}(r,c)
    }));
  }
  return h('div',null,h('div',{style:{fontSize:11,color:SUB,marginBottom:5}},'분할 '+val.r+'×'+val.c),h('div',{style:{display:'inline-grid',gridTemplateColumns:'repeat(4,22px)',gap:2}},cells));
}

// ── APP ────────────────────────────────────────────────────────
function App(){
  var _w=useState([]),whs=_w[0],setWhs=_w[1];
  var _id=useState(null),whId=_id[0],setWhId=_id[1];
  var _r=useState(false),ready=_r[0],setReady=_r[1];

  useEffect(function(){
    dbListen(function(data){
      setWhs(data||[]);
      setReady(true);
    });
    var t=setTimeout(function(){setReady(true);},5000);
    return function(){dbOff();clearTimeout(t);};
  },[]);

  function persist(d){
    setWhs(d);
    dbSave(d);
    try{localStorage.setItem('wms_bak',JSON.stringify(d));}catch(e){}
  }
  function upWh(id,fn){persist(whs.map(function(w){return w.id===id?fn(w):w;}));}
  var cWh=whs.find(function(w){return w.id===whId;});

  if(!ready)return h('div',{style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}},
    h('div',{style:{fontSize:48}},'📦'),h('div',{style:{color:SUB}},'로딩 중...'));
  if(cWh)return h(WHView,{wh:cWh,onUpdate:function(fn){upWh(whId,fn);},onBack:function(){setWhId(null);}});
  return h(MainView,{whs:whs,onPersist:persist,onEnter:setWhId});
}

// ── MAIN VIEW ──────────────────────────────────────────────────
function MainView(props){
  var whs=props.whs,onPersist=props.onPersist,onEnter=props.onEnter;
  var _o=useState(false),open=_o[0],setOpen=_o[1];
  var _n=useState(''),nm=_n[0],setNm=_n[1];
  var _row=useState('10'),rows=_row[0],setRows=_row[1];
  var _col=useState('10'),cols=_col[0],setCols=_col[1];
  function create(){
    if(!nm.trim())return;
    var r=Math.min(Math.max(+rows||10,2),30),c=Math.min(Math.max(+cols||10,2),30);
    onPersist(whs.concat([mkWH(nm.trim(),r,c)]));
    setOpen(false);setNm('');setRows('10');setCols('10');
  }
  return h('div',{style:{minHeight:'100vh',background:BG}},
    h('div',{style:{background:CARD,borderBottom:'1px solid '+BDR,padding:'0 16px',height:54,display:'flex',alignItems:'center',gap:10,position:'sticky',top:0,zIndex:10}},
      h('span',{style:{fontSize:24}},'📦'),
      h('div',{style:{flex:1}},h('div',{style:{fontWeight:700,fontSize:17}},'WMS 창고관리'),h('div',{style:{fontSize:10,color:SUB}},'Warehouse Management System')),
      h('button',{style:S('#3B82F6','#fff'),onClick:function(){setOpen(true);}},'+ 새 창고')
    ),
    h('div',{style:{padding:16,maxWidth:960,margin:'0 auto'}},
      whs.length===0
        ?h('div',{style:{textAlign:'center',marginTop:80,color:SUB}},h('div',{style:{fontSize:56}},'🏭'),h('div',{style:{marginTop:14,fontSize:16,color:'#94A3B8'}},'등록된 창고가 없습니다'),h('div',{style:{marginTop:4,fontSize:13}},'새 창고를 추가해 시작하세요'))
        :h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12,paddingTop:8}},
          whs.map(function(wh){
            var st=calcSt(wh),pg=getPG(wh);
            return h('div',{key:wh.id,onClick:function(){onEnter(wh.id);},style:{background:CARD,borderRadius:14,padding:18,cursor:'pointer',border:'1px solid '+BDR}},
              h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}},
                h('div',null,h('div',{style:{fontSize:18,fontWeight:700}},wh.name),h('div',{style:{fontSize:11,color:SUB,marginTop:3}},wh.rows+'×'+wh.cols+' 그리드')),
                h('button',{style:S('rgba(239,68,68,.15)','#F87171',{padding:'4px 9px',fontSize:11,borderRadius:5}),onClick:function(e){e.stopPropagation();if(confirm('삭제할까요?'))onPersist(whs.filter(function(w){return w.id!==wh.id;}));}},'삭제')
              ),
              h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:12}},
                [['전체',st.tot,'#94A3B8'],['사용중',st.used,'#60A5FA'],['여유',st.free,'#4ADE80']].map(function(x){return h('div',{key:x[0],style:{background:'rgba(255,255,255,.04)',borderRadius:7,padding:'7px 4px',textAlign:'center'}},h('div',{style:{fontSize:20,fontWeight:700,color:x[2]}},x[1]),h('div',{style:{fontSize:10,color:SUB}},x[0]));})
              ),
              pg.length>0&&h('div',{style:{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8}},pg.slice(0,4).map(function(p){return h('span',{key:p.name,style:{background:p.clr+'20',color:p.clr,border:'1px solid '+p.clr+'44',borderRadius:20,padding:'1px 7px',fontSize:10,fontWeight:600}},p.name+' '+p.cnt+'팔');})),
              h('div',{style:{fontSize:10,color:SUB}},'마지막 저장: '+(wh.history.length?wh.history[wh.history.length-1].label:'없음'))
            );
          })
        )
    ),
    open&&h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.72)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:100},onClick:function(){setOpen(false);}},
      h('div',{style:{background:CARD,borderRadius:'16px 16px 0 0',padding:22,width:'100%',maxWidth:460},onClick:function(e){e.stopPropagation();}},
        h('div',{style:{fontSize:17,fontWeight:700,marginBottom:16}},'🏭 새 창고 만들기'),
        h('div',{style:{display:'flex',flexDirection:'column',gap:11}},
          h(Inp,{lbl:'창고 이름',val:nm,set:setNm,ph:'예: 본창고 A동'}),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},h(Inp,{lbl:'행 수',val:rows,set:setRows,type:'number'}),h(Inp,{lbl:'열 수',val:cols,set:setCols,type:'number'})),
          h('div',{style:{fontSize:11,color:SUB}},'총 '+(+rows||0)*(+cols||0)+'칸'),
          h('button',{style:S('#3B82F6','#fff',{padding:13,fontSize:15,width:'100%'}),onClick:create},'생성하기')
        )
      )
    )
  );
}

// ── WH VIEW ────────────────────────────────────────────────────
function WHView(props){
  var wh=props.wh,onUpdate=props.onUpdate,onBack=props.onBack;
  var _tab=useState('setup'),tab=_tab[0],setTab=_tab[1];
  var _zm=useState(1),zoom=_zm[0],setZoom=_zm[1];
  var _sel=useState(new Set()),sel=_sel[0],setSel=_sel[1];
  var _st=useState('rack'),sType=_st[0],setSType=_st[1];
  var _sd=useState({r:1,c:1}),sDiv=_sd[0],setSDiv=_sd[1];
  var _ss=useState([]),selSlots=_ss[0],setSelSlots=_ss[1];
  var _op=useState('idle'),opMode=_op[0],setOpMode=_op[1];
  var _mf=useState(null),moveFrom=_mf[0],setMoveFrom=_mf[1];
  var _oq=useState([]),outQ=_oq[0],setOutQ=_oq[1];
  var _if=useState(false),showInForm=_if[0],setShowInForm=_if[1];
  var _op2=useState(false),showOutPanel=_op2[0],setShowOutPanel=_op2[1];
  var _inf=useState({name:'',pallets:'1',qty:'1',exp:''}),inForm=_inf[0],setInForm=_inf[1];
  var _ei=useState(null),editInfo=_ei[0],setEditInfo=_ei[1];
  var _hv=useState(null),histView=_hv[0],setHistView=_hv[1];
  var _se=useState(false),showExport=_se[0],setShowExport=_se[1];

  var st=calcSt(wh),pg=getPG(wh);

  function withUndo(fn){onUpdate(function(w){var snap={cells:deep(w.cells),inQ:w.inQ.slice()};var nw=fn(Object.assign({},w,{cells:deep(w.cells)}));return Object.assign({},nw,{undoStack:(w.undoStack||[]).slice(-29).concat([snap])});});}
  function doUndo(){onUpdate(function(w){if(!w.undoStack||!w.undoStack.length)return w;var stack=w.undoStack.slice(),prev=stack.pop();return Object.assign({},w,prev,{undoStack:stack});});}
  function doSave(){onUpdate(function(w){return Object.assign({},w,{history:w.history.concat([{id:uid(),label:dayLabel(),cells:deep(w.cells),stats:calcSt(w),prods:getPG(w,w.cells)}])});});}
  function toggleSel(key){setSel(function(s){var n=new Set(s);n.has(key)?n.delete(key):n.add(key);return n;});}
  function applySetup(){if(!sel.size)return;withUndo(function(w){sel.forEach(function(k){w.cells[k]=mkCell(sType,sDiv.r,sDiv.c);});return w;});setSel(new Set());}
  function submitIn(){
    var name=inForm.name,pallets=inForm.pallets,qty=inForm.qty,exp=inForm.exp;
    if(!name.trim())return;
    var n=Math.max(1,+pallets||1),clr=pickClr(wh,name.trim());
    var items=Array.from({length:n},function(){return{id:uid(),name:name.trim(),qty:+qty||1,exp:exp.trim()};});
    withUndo(function(w){return Object.assign({},w,{inQ:w.inQ.concat(items),pColors:Object.assign({},w.pColors,{[name.trim()]:clr})});});
    setShowInForm(false);setInForm({name:'',pallets:'1',qty:'1',exp:''});setTab('ops');
  }
  function clickSlot(cKey,sKey){
    var cell=wh.cells[cKey];if(!cell||!cell.type||cell.type==='unused')return;
    var slot=cell.slots[sKey];
    if(opMode==='outbound'){if(!slot)return;setOutQ(function(q){return q.concat([Object.assign({},slot,{cKey:cKey,sKey:sKey,qid:uid()})]);});withUndo(function(w){w.cells[cKey].slots[sKey]=null;return w;});return;}
    if(moveFrom){if(moveFrom.cKey===cKey&&moveFrom.sKey===sKey){setMoveFrom(null);return;}if(!slot){withUndo(function(w){w.cells[cKey].slots[sKey]=moveFrom.slot;w.cells[moveFrom.cKey].slots[moveFrom.sKey]=null;return w;});}setMoveFrom(null);return;}
    if(slot&&selSlots.length===0){setMoveFrom({cKey:cKey,sKey:sKey,slot:slot});return;}
    if(!slot&&(cell.type==='rack'||cell.type==='shelf')){
      var idx=selSlots.findIndex(function(s){return s.cKey===cKey&&s.sKey===sKey;});
      if(idx>=0)setSelSlots(function(s){return s.filter(function(_,i){return i!==idx;});});
      else setSelSlots(function(s){return s.concat([{cKey:cKey,sKey:sKey}]);});
    }
  }
  function assignIn(item){
    if(selSlots.length===0){
      withUndo(function(w){
        var entries=Object.entries(w.cells);
        for(var i=0;i<entries.length;i++){var ck=entries[i][0],cell=entries[i][1];if(cell.type!=='rack'&&cell.type!=='shelf')continue;var sks=Object.keys(cell.slots);for(var j=0;j<sks.length;j++){if(!cell.slots[sks[j]]){w.cells[ck].slots[sks[j]]=item;w.inQ=w.inQ.filter(function(x){return x.id!==item.id;});return w;}}}return w;
