<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>WMS 창고관리 시스템</title>

body{background:#0F172A;font-family:'Noto Sans KR',system-ui,sans-serif;color:#E2E8F0;-webkit-tap-highlight-color:transparent;}

<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect}=React;

// ── 유틸 ──────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9);
const dayLabel=()=>{const d=new Date(),W=['일','월','화','수','목','금','토'];return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${W[d.getDay()]})`};
const fmtExp=s=>s?.length===6?`20${s.slice(0,2)}.${s.slice(2,4)}.${s.slice(4,6)}`:(s||'');
const deep=o=>JSON.parse(JSON.stringify(o));

// ── 상수 ──────────────────────────────────────────────────────────
const CT={
  rack:  {lbl:'랙',    clr:'#60A5FA',bg:'rgba(59,130,246,.20)',bdr:'#3B82F6'},
  empty: {lbl:'빈공간',clr:'#34D399',bg:'rgba(16,185,129,.11)',bdr:'#10B981'},
  unused:{lbl:'미사용',clr:'#6B7280',bg:'rgba(100,116,139,.09)',bdr:'#475569'},
  shelf: {lbl:'선반',  clr:'#FBBF24',bg:'rgba(245,158,11,.16)',bdr:'#F59E0B'},
};
const PC=['#F87171','#FB923C','#FBBF24','#4ADE80','#34D399','#60A5FA','#A78BFA','#F472B6','#2DD4BF','#38BDF8'];
const BG='#0F172A',CARD='#1E293B',BDR='#334155',TX='#E2E8F0',SUB='#64748B';
const B=(bg,clr,ex={})=>({background:bg,color:clr,border:'none',borderRadius:7,padding:'7px 14px',fontSize:13,fontWeight:600,cursor:'pointer',...ex});

// ── 창고 헬퍼 ─────────────────────────────────────────────────────
const mkSlots=(r,c)=>{const s={};for(let ri=0;ri<r;ri++)for(let ci=0;ci<c;ci++)s[`${ri}-${ci}`]=null;return s;};
const mkCell=(type,dr,dc)=>({type,divR:dr,divC:dc,slots:mkSlots(dr,dc)});
const mkWH=(name,rows,cols)=>{
  const cells={};
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)cells[`${r}-${c}`]={type:null,divR:1,divC:1,slots:{'0-0':null}};
  return{id:uid(),name,rows,cols,cells,inQ:[],history:[],undoStack:[],pColors:{},sheetsUrl:''};
};
const calcSt=wh=>{let tot=0,used=0;Object.values(wh.cells).forEach(c=>{if(c.type==='rack'||c.type==='shelf'){tot+=c.divR*c.divC;used+=Object.values(c.slots).filter(Boolean).length;}});return{tot,used,free:tot-used};};
const getPG=(wh,cells)=>{
  const src=cells||wh.cells,m={};
  Object.values(src).forEach(c=>Object.values(c.slots).forEach(s=>{
    if(!s)return;const clr=wh.pColors[s.name]||'#94A3B8';
    if(!m[s.name])m[s.name]={name:s.name,cnt:0,totalQty:0,clr,exps:{}};
    m[s.name].cnt++;m[s.name].totalQty+=s.qty||0;
    const ek=s.exp||'';if(!m[s.name].exps[ek])m[s.name].exps[ek]={exp:ek,cnt:0,totalQty:0};
    m[s.name].exps[ek].cnt++;m[s.name].exps[ek].totalQty+=s.qty||0;
  }));
  return Object.values(m).map(p=>({...p,exps:Object.values(p.exps).sort((a,b)=>!a.exp?1:!b.exp?-1:a.exp.localeCompare(b.exp))}));
};
const pickClr=(wh,name)=>{if(wh.pColors[name])return wh.pColors[name];const used=new Set(Object.values(wh.pColors));return PC.find(c=>!used.has(c))||PC[0];};

// ── TSV 생성 ─────────────────────────────────────────────────────
const tl={rack:'랙',empty:'빈공간',unused:'미사용',shelf:'선반'};
function buildTSV(wh,cells,stats,label){
  const esc=v=>String(v||'').replace(/\t/g,' ').replace(/\n/g,' ');
  const rows=[];
  rows.push(['창고:'+esc(wh.name),'저장:'+esc(label||'현재'),'전체:'+stats.tot,'사용:'+stats.used,'여유:'+stats.free]);
  rows.push([]);
  rows.push([''].concat(Array.from({length:wh.cols},(_,i)=>'C'+(i+1))));
  for(let r=0;r<wh.rows;r++){
    const row=['R'+(r+1)];
    for(let c=0;c<wh.cols;c++){
      const cell=cells?.[`${r}-${c}`];
      if(!cell?.type){row.push('');continue;}
      const slots=Object.values(cell.slots||{}).filter(Boolean);
      if(!slots.length){row.push('['+( tl[cell.type]||cell.type)+']');continue;}
      row.push(slots.map(s=>esc(s.name)+(s.exp?' ~'+fmtExp(s.exp):'')+' ('+s.qty+'개)').join(' / '));
    }
    rows.push(row);
  }
  return rows.map(r=>r.join('\t')).join('\n');
}

function doCopy(text,onOk,onFail){
  try{
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.cssText='position:fixed;top:-9999px;left:-9999px';
    document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,99999999);
    const ok=document.execCommand('copy');document.body.removeChild(ta);
    if(ok)onOk(); else onFail();
  }catch(e){
    navigator.clipboard?.writeText(text).then(onOk).catch(onFail);
  }
}

// ── 공통 컴포넌트 ────────────────────────────────────────────────
function Inp({lbl,val,set,ph='',type='text'}){
  return(
    <label style={{display:'flex',flexDirection:'column',gap:4,fontSize:12,color:SUB}}>
      {lbl}
      <input type={type} value={val} onChange={e=>set(e.target.value)} placeholder={ph}
        style={{background:BG,border:`1px solid ${BDR}`,borderRadius:7,padding:'8px 10px',color:TX,fontSize:14,outline:'none',width:'100%'}}/>
    </label>
  );
}
function DivPicker({val,set}){
  const [hov,setHov]=useState(null);const hi=hov||val;
  return(
    <div>
      <div style={{fontSize:11,color:SUB,marginBottom:5}}>분할 {val.r}×{val.c}</div>
      <div style={{display:'inline-grid',gridTemplateColumns:'repeat(4,22px)',gap:2}}>
        {Array.from({length:4},(_,r)=>Array.from({length:4},(_,c)=>{
          const act=hi.r>=r+1&&hi.c>=c+1,sel=val.r>=r+1&&val.c>=c+1;
          return <div key={`${r}-${c}`} style={{width:22,height:22,borderRadius:3,cursor:'pointer',background:act?'rgba(99,102,241,.55)':sel?'rgba(99,102,241,.2)':'rgba(255,255,255,.06)',border:`1px solid ${act?'#818CF8':sel?'#6366F1':'rgba(255,255,255,.1)'}`}}
            onMouseEnter={()=>setHov({r:r+1,c:c+1})} onMouseLeave={()=>setHov(null)} onClick={()=>set({r:r+1,c:c+1})}/>;
        }))}
      </div>
    </div>
  );
}

// ═══ APP ═════════════════════════════════════════════════════════
function App(){
  const [whs,setWhs]=useState([]);
  const [whId,setWhId]=useState(null);
  const [ready,setReady]=useState(false);

  useEffect(()=>{
    try{const d=localStorage.getItem('wms_v1');if(d)setWhs(JSON.parse(d));}catch(e){}
    setReady(true);
  },[]);

  const persist=d=>{setWhs(d);try{localStorage.setItem('wms_v1',JSON.stringify(d));}catch(e){}};
  const upWh=(id,fn)=>persist(whs.map(w=>w.id===id?fn(w):w));
  const cWh=whs.find(w=>w.id===whId);

  if(!ready)return <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}><div style={{fontSize:48}}>📦</div><div style={{color:SUB}}>로딩 중...</div></div>;
  if(cWh)return <WHView wh={cWh} onUpdate={fn=>upWh(whId,fn)} onBack={()=>setWhId(null)}/>;
  return <MainView whs={whs} onPersist={persist} onEnter={setWhId}/>;
}

// ═══ MAIN VIEW ═══════════════════════════════════════════════════
function MainView({whs,onPersist,onEnter}){
  const [open,setOpen]=useState(false);
  const [nm,setNm]=useState('');
  const [rows,setRows]=useState('10');
  const [cols,setCols]=useState('10');

  const create=()=>{
    if(!nm.trim())return;
    const r=Math.min(Math.max(+rows||10,2),30),c=Math.min(Math.max(+cols||10,2),30);
    onPersist([...whs,mkWH(nm.trim(),r,c)]);
    setOpen(false);setNm('');setRows('10');setCols('10');
  };

  return(
    <div style={{minHeight:'100vh',background:BG}}>
      {/* 헤더 */}
      <div style={{background:CARD,borderBottom:`1px solid ${BDR}`,padding:'0 16px',height:54,display:'flex',alignItems:'center',gap:10,position:'sticky',top:0,zIndex:10}}>
        <span style={{fontSize:24}}>📦</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:17}}>WMS 창고관리</div>
          <div style={{fontSize:10,color:SUB}}>Warehouse Management System</div>
        </div>
        <button style={B('#3B82F6','#fff')} onClick={()=>setOpen(true)}>+ 새 창고</button>
      </div>
      {/* 목록 */}
      <div style={{padding:16,maxWidth:960,margin:'0 auto'}}>
        {whs.length===0?(
          <div style={{textAlign:'center',marginTop:80,color:SUB}}>
            <div style={{fontSize:56}}>🏭</div>
            <div style={{marginTop:14,fontSize:16,color:'#94A3B8'}}>등록된 창고가 없습니다</div>
            <div style={{marginTop:4,fontSize:13}}>새 창고를 추가해 시작하세요</div>
          </div>
        ):(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12,paddingTop:8}}>
            {whs.map(wh=>{
              const st=calcSt(wh),pg=getPG(wh);
              return(
                <div key={wh.id} onClick={()=>onEnter(wh.id)}
                  style={{background:CARD,borderRadius:14,padding:18,cursor:'pointer',border:`1px solid ${BDR}`,transition:'border-color .15s'}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor='#475569'}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=BDR}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
                    <div>
                      <div style={{fontSize:18,fontWeight:700}}>{wh.name}</div>
                      <div style={{fontSize:11,color:SUB,marginTop:3}}>{wh.rows}×{wh.cols} 그리드</div>
                    </div>
                    <button style={B('rgba(239,68,68,.15)','#F87171',{padding:'4px 9px',fontSize:11,borderRadius:5})}
                      onClick={e=>{e.stopPropagation();if(confirm('이 창고를 삭제할까요?'))onPersist(whs.filter(w=>w.id!==wh.id));}}>삭제</button>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:12}}>
                    {[['전체',st.tot,'#94A3B8'],['사용중',st.used,'#60A5FA'],['여유',st.free,'#4ADE80']].map(([l,v,c])=>(
                      <div key={l} style={{background:'rgba(255,255,255,.04)',borderRadius:7,padding:'7px 4px',textAlign:'center'}}>
                        <div style={{fontSize:20,fontWeight:700,color:c}}>{v}</div>
                        <div style={{fontSize:10,color:SUB}}>{l}</div>
                      </div>
                    ))}
                  </div>
                  {pg.length>0&&<div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8}}>
                    {pg.slice(0,4).map(p=><span key={p.name} style={{background:`${p.clr}20`,color:p.clr,border:`1px solid ${p.clr}44`,borderRadius:20,padding:'1px 7px',fontSize:10,fontWeight:600}}>{p.name} {p.cnt}팔</span>)}
                  </div>}
                  <div style={{fontSize:10,color:SUB}}>마지막 저장: {wh.history.at(-1)?.label||'없음'}</div>
                </div>
              );
            })}
          </div>
        )}
      </div>
      {/* 새 창고 모달 */}
      {open&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.72)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:100}} onClick={()=>setOpen(false)}>
          <div style={{background:CARD,borderRadius:'16px 16px 0 0',padding:22,width:'100%',maxWidth:460}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:700,marginBottom:16}}>🏭 새 창고 만들기</div>
            <div style={{display:'flex',flexDirection:'column',gap:11}}>
              <Inp lbl="창고 이름" val={nm} set={setNm} ph="예: 본창고 A동"/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <Inp lbl="행 수 (2~30)" val={rows} set={setRows} type="number"/>
                <Inp lbl="열 수 (2~30)" val={cols} set={setCols} type="number"/>
              </div>
              <div style={{fontSize:11,color:SUB}}>총 {(+rows||0)*(+cols||0)}칸 그리드 생성</div>
              <button style={B('#3B82F6','#fff',{padding:13,fontSize:15,width:'100%'})} onClick={create}>생성하기</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══ WH VIEW ═════════════════════════════════════════════════════
function WHView({wh,onUpdate,onBack}){
  const [tab,setTab]=useState('setup');
  const [zoom,setZoom]=useState(1);
  const [sel,setSel]=useState(new Set());
  const [sType,setSType]=useState('rack');
  const [sDiv,setSDiv]=useState({r:1,c:1});
  const [selSlots,setSelSlots]=useState([]);
  const [opMode,setOpMode]=useState('idle');
  const [moveFrom,setMoveFrom]=useState(null);
  const [outQ,setOutQ]=useState([]);
  const [showInForm,setShowInForm]=useState(false);
  const [showOutPanel,setShowOutPanel]=useState(false);
  const [inForm,setInForm]=useState({name:'',pallets:'1',qty:'1',exp:''});
  const [editInfo,setEditInfo]=useState(null);
  const [histView,setHistView]=useState(null);
  const [showExport,setShowExport]=useState(false);

  const st=calcSt(wh),pg=getPG(wh);

  const withUndo=fn=>onUpdate(w=>{
    const snap={cells:deep(w.cells),inQ:[...w.inQ]};
    const nw=fn({...w,cells:deep(w.cells)});
    return{...nw,undoStack:[...(w.undoStack||[]).slice(-29),snap]};
  });
  const doUndo=()=>onUpdate(w=>{
    if(!w.undoStack?.length)return w;
    const stack=[...w.undoStack],prev=stack.pop();
    return{...w,...prev,undoStack:stack};
  });
  const doSave=()=>onUpdate(w=>({...w,history:[...w.history,{id:uid(),label:dayLabel(),cells:deep(w.cells),stats:calcSt(w),prods:getPG(w,w.cells)}]}));

  const toggleSel=key=>setSel(s=>{const n=new Set(s);n.has(key)?n.delete(key):n.add(key);return n;});
  const applySetup=()=>{
    if(!sel.size)return;
    withUndo(w=>{sel.forEach(k=>{w.cells[k]=mkCell(sType,sDiv.r,sDiv.c);});return w;});
    setSel(new Set());
  };

  const submitIn=()=>{
    const {name,pallets,qty,exp}=inForm;if(!name.trim())return;
    const n=Math.max(1,+pallets||1),clr=pickClr(wh,name.trim());
    const items=Array.from({length:n},()=>({id:uid(),name:name.trim(),qty:+qty||1,exp:exp.trim()}));
    withUndo(w=>({...w,inQ:[...w.inQ,...items],pColors:{...w.pColors,[name.trim()]:clr}}));
    setShowInForm(false);setInForm({name:'',pallets:'1',qty:'1',exp:''});setTab('ops');
  };

  const clickSlot=(cKey,sKey)=>{
    const cell=wh.cells[cKey];if(!cell?.type||cell.type==='unused')return;
    const slot=cell.slots[sKey];
    if(opMode==='outbound'){if(!slot)return;setOutQ(q=>[...q,{...slot,cKey,sKey,qid:uid()}]);withUndo(w=>{w.cells[cKey].slots[sKey]=null;return w;});return;}
    if(moveFrom){
      if(moveFrom.cKey===cKey&&moveFrom.sKey===sKey){setMoveFrom(null);return;}
      if(!slot){withUndo(w=>{w.cells[cKey].slots[sKey]=moveFrom.slot;w.cells[moveFrom.cKey].slots[moveFrom.sKey]=null;return w;});}
      setMoveFrom(null);return;
    }
    if(slot&&selSlots.length===0){setMoveFrom({cKey,sKey,slot});return;}
    if(!slot&&(cell.type==='rack'||cell.type==='shelf')){
      const idx=selSlots.findIndex(s=>s.cKey===cKey&&s.sKey===sKey);
      if(idx>=0)setSelSlots(s=>s.filter((_,i)=>i!==idx));
      else setSelSlots(s=>[...s,{cKey,sKey}]);
    }
  };

  const assignIn=item=>{
    if(selSlots.length===0){
      withUndo(w=>{for(const[ck,cell]of Object.entries(w.cells)){if(cell.type!=='rack'&&cell.type!=='shelf')continue;for(const sk of Object.keys(cell.slots)){if(!cell.slots[sk]){w.cells[ck].slots[sk]=item;w.inQ=w.inQ.filter(i=>i.id!==item.id);return w;}}}return w;});
    }else{
      const t=selSlots[0];const cell=wh.cells[t.cKey];
      if(!cell||cell.slots[t.sKey]){setSelSlots(s=>s.slice(1));return;}
      withUndo(w=>{w.cells[t.cKey].slots[t.sKey]=item;w.inQ=w.inQ.filter(i=>i.id!==item.id);return w;});
      setSelSlots(s=>s.slice(1));
    }
  };

  const dblClickSlot=(cKey,sKey)=>{const slot=wh.cells[cKey]?.slots[sKey];if(slot)setEditInfo({cKey,sKey,data:{...slot}});};
  const saveEdit=()=>{withUndo(w=>{w.cells[editInfo.cKey].slots[editInfo.sKey]=editInfo.data;return w;});setEditInfo(null);};

  const CSIZ=Math.round(56*zoom);
  const renderGrid=ops=>(
    <div style={{display:'inline-grid',gridTemplateColumns:`repeat(${wh.cols},${CSIZ}px)`,gap:2,padding:8,userSelect:'none'}}>
      {Array.from({length:wh.rows},(_,r)=>Array.from({length:wh.cols},(_,c)=>{
        const key=`${r}-${c}`,cell=wh.cells[key];if(!cell)return null;
        const ct=CT[cell.type],isSel=sel.has(key);
        const dR=(!ops&&isSel)?sDiv.r:cell.divR,dC=(!ops&&isSel)?sDiv.c:cell.divC;
        const isPrev=!ops&&isSel,pCT=CT[isPrev?sType:cell.type];
        const skeys=[];for(let sr=0;sr<dR;sr++)for(let sc=0;sc<dC;sc++)skeys.push(`${sr}-${sc}`);
        return(
          <div key={key} style={{width:CSIZ,height:CSIZ,background:pCT?pCT.bdr+'22':'rgba(255,255,255,.03)',border:`1.5px solid ${isSel?(pCT?.bdr||'#F1F5F9'):(ct?ct.bdr:BDR)}`,outline:isSel?`2px solid ${pCT?.bdr||'#e2e8f0'}`:'none',borderRadius:4,overflow:'hidden',cursor:'pointer',boxSizing:'border-box',display:'grid',gridTemplateColumns:`repeat(${dC},1fr)`,gridTemplateRows:`repeat(${dR},1fr)`,gap:2,padding:2}}
            onClick={!ops?()=>toggleSel(key):undefined}>

                <div key={sKey} style={{background:isPrev?(idx===0?(pCT?.bg||'rgba(255,255,255,.08)'):'rgba(255,255,255,.04)'):isSS?'rgba(59,130,246,.48)':isMF?'rgba(245,158,11,.38)':slot?`${pClr}3a`:(ct?ct.bg:'rgba(255,255,255,.04)'),border:isPrev?`1px solid ${pCT?.bdr||BDR}55`:`1px solid ${isSS?'#60A5FA':isMF?'#F59E0B':ct?(ct.bdr+'55'):BDR}`,borderRadius:2,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',overflow:'hidden',cursor:ops?'pointer':'default',boxSizing:'border-box',padding:1}}
                  onClick={ops?()=>clickSlot(key,sKey):undefined}

                  {!isPrev&&isSS&&!slot&&<div style={{fontSize:Math.max(8,Math.min(12,subH*.25)),fontWeight:800,color:'#60A5FA'}}>{ssIdx+1}</div>}

                        </div>
                      </div>
                    );})}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── 히스토리 ── */}
      {tab==='history'&&(
        <div style={{flex:1,overflow:'auto',padding:14}}>
          <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>🗂 히스토리</div>
          <div style={{fontSize:12,color:SUB,marginBottom:12}}>상단 💾 버튼으로 저장 / 항목 클릭 → 배치도 조회</div>

      {/* 히스토리 배치도 */}
      {histView&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.88)',display:'flex',flexDirection:'column',zIndex:300}}>
          <div style={{background:CARD,borderBottom:`1px solid ${BDR}`,padding:'10px 14px',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>📐 배치도 — {histView.label}</div><div style={{fontSize:11,color:SUB,marginTop:2}}>슬롯 {histView.stats?.tot||0} · 사용 {histView.stats?.used||0} · 여유 {histView.stats?.free||0}</div></div>
            <button style={B('rgba(59,130,246,.2)','#60A5FA',{padding:'5px 10px',fontSize:12})} onClick={()=>{if(confirm('복원?')){withUndo(()=>({...wh,cells:deep(histView.cells)}));setHistView(null);}}}>복원</button>
            <button style={B('rgba(255,255,255,.08)',TX,{padding:'5px 10px',fontSize:12})} onClick={()=>setHistView(null)}>✕</button>
          </div>
          {histView.prods?.length>0&&<div style={{background:'rgba(15,23,42,.97)',borderBottom:`1px solid ${BDR}`,padding:'6px 14px',display:'flex',gap:8,flexWrap:'wrap',flexShrink:0}}>
            {histView.prods.map(p=><span key={p.name} style={{background:`${p.clr}1e`,border:`1px solid ${p.clr}44`,color:p.clr,borderRadius:20,padding:'2px 9px',fontSize:11,fontWeight:600}}>{p.name} {p.cnt}팔 {(p.totalQty||0).toLocaleString()}개</span>)}
          </div>}
          <div style={{flex:1,overflow:'auto',padding:8}}>
            <HistGrid cells={histView.cells} rows={wh.rows} cols={wh.cols} pColors={wh.pColors} zoom={zoom}/>
          </div>
        </div>
      )}

      {/* 입고 폼 */}
      {showInForm&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.76)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:200}} onClick={()=>setShowInForm(false)}>
          <div style={{background:CARD,borderRadius:'16px 16px 0 0',padding:22,width:'100%',maxWidth:460}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:700,marginBottom:16,color:'#4ADE80'}}>📥 입고 등록</div>
            <div style={{display:'flex',flexDirection:'column',gap:11}}>
              <Inp lbl="상품명" val={inForm.name} set={v=>setInForm(f=>({...f,name:v}))} ph="상품명 입력"/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <Inp lbl="파렛트 수" val={inForm.pallets} set={v=>setInForm(f=>({...f,pallets:v}))} type="number"/>
                <Inp lbl="파렛트당 수량" val={inForm.qty} set={v=>setInForm(f=>({...f,qty:v}))} type="number"/>
              </div>
              <Inp lbl="유통기한 (YYMMDD)" val={inForm.exp} set={v=>setInForm(f=>({...f,exp:v}))} ph="예: 260505"/>
              {inForm.exp.length===6&&<div style={{fontSize:12,color:'#4ADE80'}}>→ {fmtExp(inForm.exp)}</div>}
              <button style={B('#059669','#fff',{padding:13,fontSize:15,width:'100%'})} onClick={submitIn}>입고 등록</button>
            </div>
          </div>
        </div>
      )}

      {/* 수정 모달 */}
      {editInfo&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.76)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:16}} onClick={()=>setEditInfo(null)}>
          <div style={{background:CARD,borderRadius:14,padding:22,width:'100%',maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:700,marginBottom:16}}>✏️ 슬롯 수정</div>
            <div style={{display:'flex',flexDirection:'column',gap:11}}>
              <Inp lbl="상품명" val={editInfo.data.name} set={v=>setEditInfo(i=>({...i,data:{...i.data,name:v}}))}/>
              <Inp lbl="수량" val={String(editInfo.data.qty)} set={v=>setEditInfo(i=>({...i,data:{...i.data,qty:+v}}))} type="number"/>
              <Inp lbl="유통기한 (YYMMDD)" val={editInfo.data.exp||''} set={v=>setEditInfo(i=>({...i,data:{...i.data,exp:v}}))} ph="YYMMDD"/>
              {editInfo.data.exp?.length===6&&<div style={{fontSize:12,color:'#4ADE80'}}>→ {fmtExp(editInfo.data.exp)}</div>}
              <div style={{display:'flex',gap:8}}>
                <button style={B('#3B82F6','#fff',{flex:1,padding:12,fontSize:14})} onClick={saveEdit}>저장</button>
                <button style={B('rgba(239,68,68,.2)','#F87171',{flex:1,padding:12,fontSize:14})} onClick={()=>{withUndo(w=>{w.cells[editInfo.cKey].slots[editInfo.sKey]=null;return w;});setEditInfo(null);}}>삭제</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══ 히스토리 그리드 ═════════════════════════════════════════════
function HistGrid({cells,rows,cols,pColors,zoom}){
  const CSIZ=Math.round(56*zoom);
  return(
    <div style={{display:'inline-grid',gridTemplateColumns:`repeat(${cols},${CSIZ}px)`,gap:2,userSelect:'none'}}>
      {Array.from({length:rows},(_,r)=>Array.from({length:cols},(_,c)=>{
        const key=`${r}-${c}`,cell=cells[key];if(!cell)return null;
        const ct=CT[cell.type],dR=cell.divR||1,dC=cell.divC||1;
        const skeys=[];for(let sr=0;sr<dR;sr++)for(let sc=0;sc<dC;sc++)skeys.push(`${sr}-${sc}`);
        return(
          <div key={key} style={{width:CSIZ,height:CSIZ,background:ct?ct.bdr+'22':'rgba(255,255,255,.03)',border:`1.5px solid ${ct?ct.bdr:BDR}`,borderRadius:4,overflow:'hidden',boxSizing:'border-box',display:'grid',gridTemplateColumns:`repeat(${dC},1fr)`,gridTemplateRows:`repeat(${dR},1fr)`,gap:2,padding:2}}>
            {skeys.map(sKey=>{
              const slot=cell.slots?.[sKey],pClr=slot?(pColors[slot.name]||'#94A3B8'):null;
              const subH=CSIZ/dR,subW=CSIZ/dC;
              return(
                <div key={sKey} style={{background:slot?`${pClr}3a`:(ct?ct.bg:'rgba(255,255,255,.04)'),border:`1px solid ${ct?(ct.bdr+'55'):BDR}`,borderRadius:2,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',overflow:'hidden',boxSizing:'border-box',padding:1}}>
                  {slot&&<><div style={{width:Math.min(7,subW*.3),height:Math.min(7,subH*.3),borderRadius:'50%',background:pClr,flexShrink:0}}/>{subH>26&&subW>18&&<div style={{fontSize:Math.max(7,Math.min(9,subH*.15)),color:TX,textAlign:'center',lineHeight:1.1,overflow:'hidden',width:'100%',marginTop:1,padding:'0 1px'}}>{slot.name.slice(0,Math.max(2,Math.floor(subW/7)))}</div>}</>}
                </div>
              );
            })}
          </div>
        );
      }))}
    </div>
  );
}

// ═══ 내보내기 모달 ═══════════════════════════════════════════════
function ExportModal({wh,onUpdate,onClose}){
  const sheets=[
    {label:'현재 상태',cells:wh.cells,stats:calcSt(wh)},
    ...[...wh.history].reverse().map(h=>({label:h.label,cells:h.cells,stats:h.stats}))
  ];
  const [idx,setIdx]=useState(0);
  const [copied,setCopied]=useState(false);
  const [gasOpen,setGasOpen]=useState(false);
  const [gasCopied,setGasCopied]=useState(false);
  const [url,setUrl]=useState(wh.sheetsUrl||'');
  const [urlSaved,setUrlSaved]=useState(!!wh.sheetsUrl);

  const tsv=buildTSV(wh,sheets[idx].cells,sheets[idx].stats,sheets[idx].label);

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.82)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:400}} onClick={onClose}>
      <div style={{background:CARD,borderRadius:'18px 18px 0 0',width:'100%',maxWidth:540,maxHeight:'90vh',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'16px 18px 12px',display:'flex',alignItems:'center',gap:10,borderBottom:`1px solid ${BDR}`,flexShrink:0}}>
          <div style={{flex:1,fontWeight:700,fontSize:16}}>📊 데이터 내보내기</div>
          <button style={B('rgba(255,255,255,.07)',TX,{padding:'5px 10px',fontSize:12})} onClick={onClose}>✕ 닫기</button>
        </div>
        <div style={{flex:1,overflow:'auto',padding:18}}>
          {/* 시트 선택 */}
          <div style={{fontSize:12,color:SUB,marginBottom:8,fontWeight:600}}>📋 시트 선택</div>
          <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:14}}>
            {sheets.map((s,i)=>(
              <button key={i} onClick={()=>{setIdx(i);setCopied(false);}}
                style={B(idx===i?'rgba(16,185,129,.2)':'rgba(255,255,255,.06)',idx===i?'#34D399':SUB,
                  {padding:'5px 11px',fontSize:11,border:`1px solid ${idx===i?'rgba(16,185,129,.4)':'transparent'}`})}>
                {s.label.slice(0,20)}
              </button>
            ))}
          </div>
          {/* STEP 1 */}
          <div style={{background:'rgba(16,185,129,.07)',border:'1px solid rgba(16,185,129,.25)',borderRadius:10,padding:14,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:'#34D399',marginBottom:8}}>STEP 1 — 복사 후 구글시트/엑셀에 붙여넣기</div>
            <textarea readOnly value={tsv} onFocus={e=>e.target.select()}
              style={{width:'100%',height:110,background:'#0D1117',border:`1px solid ${BDR}`,borderRadius:7,padding:10,color:'#7EE787',fontSize:10,fontFamily:'monospace',lineHeight:1.5,resize:'none',outline:'none',boxSizing:'border-box'}}/>
            <button style={B(copied?'#059669':'#3B82F6','#fff',{padding:10,fontSize:14,width:'100%',borderRadius:8,marginTop:8})}
              onClick={()=>doCopy(tsv,()=>setCopied(true),()=>alert('텍스트박스 클릭 후 Ctrl+A, Ctrl+C로 직접 복사하세요.'))}>
              {copied?'✅ 복사 완료! → 구글시트 A1에 Ctrl+V':'📋 데이터 복사하기'}
            </button>
            {copied&&<div style={{marginTop:8,fontSize:12,color:'#34D399',textAlign:'center',fontWeight:600}}>구글시트 A1 클릭 → Ctrl+V 🎉</div>}
          </div>
          {/* STEP 2 */}
          <div style={{background:'rgba(59,130,246,.07)',border:'1px solid rgba(59,130,246,.25)',borderRadius:10,padding:14}}>
            <div style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}} onClick={()=>setGasOpen(v=>!v)}>
              <div style={{fontSize:12,fontWeight:700,color:'#60A5FA',flex:1}}>STEP 2 (선택) — Apps Script 자동 연동</div>
              <span style={{color:SUB}}>{gasOpen?'▲':'▼'}</span>
            </div>
            {gasOpen&&(
              <div style={{marginTop:12,display:'flex',flexDirection:'column',gap:10}}>
                <div style={{fontSize:11,color:SUB,lineHeight:1.7}}>
                  1. 구글시트 → <strong style={{color:TX}}>확장 프로그램 → Apps Script</strong><br/>
                  2. 아래 코드 전체 교체 후 저장 (Ctrl+S)<br/>
                  3. 배포 → 웹앱 → 액세스: 모든 사용자 → URL 복사
                </div>
                <textarea readOnly value={GAS} onFocus={e=>e.target.select()}
                  style={{width:'100%',height:130,background:'#0D1117',border:`1px solid ${BDR}`,borderRadius:7,padding:10,color:'#7EE787',fontSize:10,fontFamily:'monospace',lineHeight:1.5,resize:'none',outline:'none',boxSizing:'border-box'}}/>
                <button style={B(gasCopied?'#059669':'rgba(99,102,241,.3)',gasCopied?'#fff':'#A5B4FC',{padding:10,fontSize:13,width:'100%',borderRadius:8})}
                  onClick={()=>doCopy(GAS,()=>setGasCopied(true),()=>alert('텍스트박스 클릭 후 직접 복사하세요.'))}>
                  {gasCopied?'✅ 코드 복사 완료':'📋 Apps Script 코드 복사'}
                </button>
                <Inp lbl="웹앱 배포 URL" val={url} set={setUrl} ph="https://script.google.com/macros/s/.../exec"/>
                <button style={B('#3B82F6','#fff',{padding:10,fontSize:13,width:'100%',borderRadius:8})}
                  onClick={()=>{if(!url.includes('script.google.com')){alert('올바른 URL이 아닙니다.');return;}onUpdate(w=>({...w,sheetsUrl:url.trim()}));setUrlSaved(true);}}>
                  💾 URL 저장
                </button>
                {urlSaved&&<div style={{fontSize:12,color:'#34D399',textAlign:'center'}}>✅ URL 저장됨</div>}
                {url.includes('script.google.com')&&(
                  <a href={url} target="_blank" rel="noreferrer"
                    style={{display:'block',textAlign:'center',padding:9,background:'rgba(99,102,241,.15)',border:'1px solid rgba(99,102,241,.3)',borderRadius:9,color:'#A5B4FC',fontSize:12,fontWeight:600}}>
                    🔗 새 탭에서 연결 확인
                  </a>
                )}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}
