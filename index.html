/* ── 창고 헬퍼 ── */

function calcSt(wh){var tot=0,used=0;Object.values(wh.cells).forEach(function(c){if(c.type==='rack'||c.type==='shelf'){tot+=c.divR*c.divC;used+=Object.values(c.slots).filter(Boolean).length;}});return{tot:tot,used:used,free:tot-used};}

function pickClr(wh,name){if(wh.pColors[name])return wh.pColors[name];var used=new Set(Object.values(wh.pColors));return PALETTE.find(function(c){return !used.has(c);})||PALETTE[0];}
function buildTSV(wh,cells,stats,label){var tl={rack:'랙',empty:'빈공간',unused:'미사용',shelf:'보관'};function esc(v){return String(v||'').replace(/\t/g,' ').replace(/\n/g,' ');}var rows=[['창고:'+esc(wh.name),'저장:'+esc(label||'현재'),'전체:'+stats.tot,'사용:'+stats.used,'여유:'+stats.free],[],[''].concat(Array.from({length:wh.cols},function(_,i){return 'C'+(i+1);}))];for(var r=0;r<wh.rows;r++){var row=['R'+(r+1)];for(var c=0;c<wh.cols;c++){var cell=cells&&cells[r+'-'+c];if(!cell||!cell.type){row.push('');continue;}var slots=Object.values(cell.slots||{}).filter(Boolean);if(!slots.length){row.push('['+(tl[cell.type]||cell.type)+']');continue;}row.push(slots.map(function(s){return esc(s.name)+(s.exp?' ~'+fmtExp(s.exp):'')+' ('+s.qty+'개)';}).join(' / '));}rows.push(row);}return rows.map(function(r){return r.join('\t');}).join('\n');}

      h('div',{style:{textAlign:'center',marginBottom:28}},h('div',{style:{fontSize:44,marginBottom:10}},'📦'),h('div',{style:{fontSize:20,fontWeight:700,color:TX}},'메이크창고 WMS'),h('div',{style:{fontSize:13,color:'#94A3B8',marginTop:2,fontWeight:500}},'창고관리 시스템 ver 01'),h('div',{style:{fontSize:11,color:SUB,marginTop:4}},'최초 비밀번호를 설정해주세요')),
