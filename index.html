<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>WMS 창고관리 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0F172A;font-family:system-ui,sans-serif;color:#E2E8F0;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#334155;border-radius:2px;}
input,button,textarea{font-family:inherit;}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
'use strict';
var h=React.createElement;
var useState=React.useState;
var useEffect=React.useEffect;
var Fragment=React.Fragment;

/* ── Firebase REST ── */
var DB='https://makemine-wms-default-rtdb.asia-southeast1.firebasedatabase.app/wms/data.json';
var _pollT=null, _lastTs=null;

function dbSave(data){
  var body=JSON.stringify({j:JSON.stringify(data),t:Date.now()});
  fetch(DB,{method:'PUT',headers:{'Content-Type':'application/json'},body:body})
    .then(function(r){return r.json();})
    .then(function(){console.log('저장완료');})
    .catch(function(e){console.warn('Firebase저장실패,localStorage백업',e);});
}
function dbListen(cb){
  function run(){
    fetch(DB)
      .then(function(r){return r.json();})
      .then(function(v){
        if(v&&v.j&&v.t!==_lastTs){
          _lastTs=v.t;
          try{cb(JSON.parse(v.j));}catch(e){cb([]);}
        } else if(!v||!v.j){
          cb([]);
        }
      })
      .catch(function(e){console.warn('Firebase읽기실패',e);});
  }
  run();
  _pollT=setInterval(run,3000);
}
function dbOff(){if(_pollT){clearInterval(_pollT);_pollT=null;}}

/* ── 유틸 ── */
function uid(){return Math.random().toString(36).slice(2,9);}
function dayLabel(){
  var d=new Date(),W=['일','월','화','수','목','금','토'];
  return d.getFullYear()+'.'+pad(d.getMonth()+1)+'.'+pad(d.getDate())+' ('+W[d.getDay()]+')';
}
function pad(n){return String(n).padStart(2,'0');}
function fmtExp(s){return s&&s.length===6?'20'+s.slice(0,2)+'.'+s.slice(2,4)+'.'+s.slice(4,6):(s||'');}
function deep(o){return JSON.parse(JSON.stringify(o));}
function copyText(t){
  var ta=document.createElement('textarea');
  ta.value=t;ta.style.cssText='position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,99999999);
  var ok=document.execCommand('copy');document.body.removeChild(ta);return ok;
}

/* ── 상수 ── */
var CT={
  rack:  {lbl:'랙',    clr:'#60A5FA',bg:'rgba(59,130,246,.20)',bdr:'#3B82F6'},
  empty: {lbl:'빈공간',clr:'#34D399',bg:'rgba(16,185,129,.11)',bdr:'#10B981'},
  unused:{lbl:'미사용',clr:'#6B7280',bg:'rgba(100,116,139,.09)',bdr:'#475569'},
  shelf: {lbl:'선반',  clr:'#FBBF24',bg:'rgba(245,158,11,.16)',bdr:'#F59E0B'}
};
var PC=['#F87171','#FB923C','#FBBF24','#4ADE80','#34D399','#60A5FA','#A78BFA','#F472B6','#2DD4BF','#38BDF8'];
var BG='#0F172A',CARD='#1E293B',BDR='#334155',TX='#E2E8F0',SUB='#64748B';
function S(bg,clr,ex){return Object.assign({background:bg,color:clr,border:'none',borderRadius:7,padding:'7px 14px',fontSize:13,fontWeight:600,cursor:'pointer'},ex||{});}

/* ── 창고 헬퍼 ── */
function mkSlots(r,c){var s={};for(var i=0;i<r;i++)for(var j=0;j<c;j++)s[i+'-'+j]=null;return s;}
function mkCell(type,dr,dc){return{type:type,divR:dr,divC:dc,slots:mkSlots(dr,dc)};}
function mkWH(name,rows,cols){
  var cells={};
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)cells[r+'-'+c]={type:null,divR:1,divC:1,slots:{'0-0':null}};
  return{id:uid(),name:name,rows:rows,cols:cols,cells:cells,inQ:[],history:[],undoStack:[],pColors:{},sheetsUrl:'',typeColors:{rack:'#3B82F6',shelf:'#F59E0B',empty:'#10B981',unused:'#475569'}};
}
function calcSt(wh){
  var tot=0,used=0;
  Object.values(wh.cells).forEach(function(c){
    if(c.type==='rack'||c.type==='shelf'){tot+=c.divR*c.divC;used+=Object.values(c.slots).filter(Boolean).length;}
  });
  return{tot:tot,used:used,free:tot-used};
}
function getPG(wh,cells){
  var src=cells||wh.cells,m={};
  Object.values(src).forEach(function(c){
    Object.values(c.slots).forEach(function(s){
      if(!s)return;
      var clr=wh.pColors[s.name]||'#94A3B8';
      if(!m[s.name])m[s.name]={name:s.name,cnt:0,totalQty:0,clr:clr,exps:{}};
      m[s.name].cnt++;m[s.name].totalQty+=s.qty||0;
      var ek=s.exp||'';
      if(!m[s.name].exps[ek])m[s.name].exps[ek]={exp:ek,cnt:0,totalQty:0};
      m[s.name].exps[ek].cnt++;m[s.name].exps[ek].totalQty+=s.qty||0;
    });
  });
  return Object.values(m).map(function(p){
    return Object.assign({},p,{exps:Object.values(p.exps).sort(function(a,b){return !a.exp?1:!b.exp?-1:a.exp.localeCompare(b.exp);})});
  });
}
function pickClr(wh,name){
  if(wh.pColors[name])return wh.pColors[name];
  var used=new Set(Object.values(wh.pColors));
  return PC.find(function(c){return !used.has(c);})||PC[0];
}

/* ── TSV ── */
function buildTSV(wh,cells,stats,label){
  var tl={rack:'랙',empty:'빈공간',unused:'미사용',shelf:'선반'};
  function esc(v){return String(v||'').replace(/\t/g,' ').replace(/\n/g,' ');}
  var rows=[
    ['창고:'+esc(wh.name),'저장:'+esc(label||'현재'),'전체:'+stats.tot,'사용:'+stats.used,'여유:'+stats.free],
    [],
    [''].concat(Array.from({length:wh.cols},function(_,i){return 'C'+(i+1);}))
  ];
  for(var r=0;r<wh.rows;r++){
    var row=['R'+(r+1)];
    for(var c=0;c<wh.cols;c++){
      var cell=cells&&cells[r+'-'+c];
      if(!cell||!cell.type){row.push('');continue;}
      var slots=Object.values(cell.slots||{}).filter(Boolean);
      if(!slots.length){row.push('['+( tl[cell.type]||cell.type)+']');continue;}
      row.push(slots.map(function(s){return esc(s.name)+(s.exp?' ~'+fmtExp(s.exp):'')+' ('+s.qty+'개)';}).join(' / '));
    }
    rows.push(row);
  }
  return rows.map(function(r){return r.join('\t');}).join('\n');
}

/* ── 공통 UI ── */
function Inp(p){
  return h('label',{style:{display:'flex',flexDirection:'column',gap:4,fontSize:12,color:SUB}},p.lbl,
    h('input',{type:p.type||'text',value:p.val,placeholder:p.ph||'',onChange:function(e){p.set(e.target.value);},
      style:{background:BG,border:'1px solid '+BDR,borderRadius:7,padding:'8px 10px',color:TX,fontSize:14,outline:'none',width:'100%'}}));
}
function DivPicker(p){
  var sv=useState(null),hov=sv[0],setHov=sv[1];
  var hi=hov||p.val;
  var cells=[];
  for(var r=0;r<4;r++)for(var c=0;c<4;c++){
    var act=hi.r>=r+1&&hi.c>=c+1,sel=p.val.r>=r+1&&p.val.c>=c+1;
    cells.push(h('div',{key:r+'-'+c,
      style:{width:22,height:22,borderRadius:3,cursor:'pointer',
        background:act?'rgba(99,102,241,.55)':sel?'rgba(99,102,241,.2)':'rgba(255,255,255,.06)',
        border:'1px solid '+(act?'#818CF8':sel?'#6366F1':'rgba(255,255,255,.1)')},
      onMouseEnter:(function(rr,cc){return function(){setHov({r:rr+1,c:cc+1});};})(r,c),
      onMouseLeave:function(){setHov(null);},
      onClick:(function(rr,cc){return function(){p.set({r:rr+1,c:cc+1});};})(r,c)
    }));
  }
  return h('div',null,
    h('div',{style:{fontSize:11,color:SUB,marginBottom:5}},'분할 '+p.val.r+'x'+p.val.c),
    h('div',{style:{display:'inline-grid',gridTemplateColumns:'repeat(4,22px)',gap:2}},cells));
}

/* ════════════ APP ════════════ */
function App(){
  var sw=useState([]),whs=sw[0],setWhs=sw[1];
  var si=useState(null),whId=si[0],setWhId=si[1];
  var sr=useState(false),ready=sr[0],setReady=sr[1];
  var sl=useState(false),loggedIn=sl[0],setLoggedIn=sl[1];
  var sp=useState(''),inputPw=sp[0],setInputPw=sp[1];
  var se=useState(''),pwErr=se[0],setPwErr=se[1];
  var sns=useState(false),needSetup=sns[0],setNeedSetup=sns[1];
  var snp=useState(''),newPw=snp[0],setNewPw=snp[1];
  var snp2=useState(''),newPw2=snp2[0],setNewPw2=snp2[1];
  var spe=useState(''),setupErr=spe[0],setSetupErr=spe[1];

  var STORED_ID='makechango';

  useEffect(function(){
    var savedPw=localStorage.getItem('wms_pw');
    if(!savedPw){
      // 비번 미설정 상태 → 설정 화면
      setNeedSetup(true);
      setReady(true);
      return;
    }
    // 비번 있으면 로그인 화면
    setReady(true);
    // 로컬 백업 먼저 표시
    try{var bak=localStorage.getItem('wms_bak');if(bak){setWhs(JSON.parse(bak));}}catch(e){}
    dbListen(function(data){setWhs(data||[]);});
    return function(){dbOff();};
  },[]);

  function handleSetupPw(){
    if(!newPw||newPw.length<4){setSetupErr('비밀번호는 4자리 이상으로 설정해주세요');return;}
    if(newPw!==newPw2){setSetupErr('비밀번호가 일치하지 않습니다');return;}
    localStorage.setItem('wms_pw',newPw);
    setNeedSetup(false);
    setLoggedIn(true);
    dbListen(function(data){setWhs(data||[]);});
  }

  function handleLogin(){
    var savedPw=localStorage.getItem('wms_pw');
    if(inputPw===savedPw){
      setLoggedIn(true);setPwErr('');
    } else {
      setPwErr('아이디 또는 비밀번호가 올바르지 않습니다');
      setInputPw('');
    }
  }

  function persist(d){
    setWhs(d);dbSave(d);
    try{localStorage.setItem('wms_bak',JSON.stringify(d));}catch(e){}
  }
  function upWh(id,fn){persist(whs.map(function(w){return w.id===id?fn(w):w;}));}
  var cWh=whs.find(function(w){return w.id===whId;});

  if(!ready)return h('div',{style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,background:BG}},
    h('div',{style:{fontSize:48}},'📦'),h('div',{style:{color:SUB}},'로딩 중...'));

  /* 비밀번호 최초 설정 화면 */
  if(needSetup)return h('div',{style:{height:'100vh',background:BG,display:'flex',alignItems:'center',justifyContent:'center',padding:20}},
    h('div',{style:{background:CARD,borderRadius:18,padding:32,width:'100%',maxWidth:380,boxShadow:'0 8px 40px rgba(0,0,0,.5)'}},
      h('div',{style:{textAlign:'center',marginBottom:28}},
        h('div',{style:{fontSize:44,marginBottom:10}},'📦'),
        h('div',{style:{fontSize:20,fontWeight:700,color:TX}},'메이크창고 WMS'),
        h('div',{style:{fontSize:12,color:SUB,marginTop:4}},'VER 01 · 최초 비밀번호를 설정해주세요')
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
        h('div',{style:{background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.2)',borderRadius:8,padding:'10px 14px',fontSize:12,color:'#93C5FD'}},
          '아이디: ',h('strong',null,STORED_ID),' (고정)'
        ),
        h(Inp,{lbl:'새 비밀번호 (4자리 이상)',val:newPw,set:setNewPw,type:'password',ph:'비밀번호 입력'}),
        h(Inp,{lbl:'비밀번호 확인',val:newPw2,set:setNewPw2,type:'password',ph:'비밀번호 재입력'}),
        setupErr&&h('div',{style:{fontSize:12,color:'#F87171',textAlign:'center',background:'rgba(239,68,68,.08)',borderRadius:7,padding:'8px 12px'}},setupErr),
        h('button',{style:S('#3B82F6','#fff',{padding:13,fontSize:15,width:'100%',borderRadius:9,marginTop:4}),onClick:handleSetupPw},'비밀번호 설정하고 시작하기')
      )
    )
  );

  /* 로그인 화면 */
  if(!loggedIn)return h('div',{style:{height:'100vh',background:BG,display:'flex',alignItems:'center',justifyContent:'center',padding:20}},
    h('div',{style:{background:CARD,borderRadius:18,padding:32,width:'100%',maxWidth:380,boxShadow:'0 8px 40px rgba(0,0,0,.5)'}},
      h('div',{style:{textAlign:'center',marginBottom:28}},
        h('div',{style:{fontSize:44,marginBottom:10}},'📦'),
        h('div',{style:{fontSize:20,fontWeight:700,color:TX}},'메이크창고 WMS'),
        h('div',{style:{fontSize:12,color:SUB,marginTop:4}},'창고관리 시스템 · VER 01')
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
        h('div',{style:{display:'flex',flexDirection:'column',gap:4,fontSize:12,color:SUB}},
          '아이디',
          h('div',{style:{background:BG,border:'1px solid '+BDR,borderRadius:7,padding:'8px 10px',color:'#60A5FA',fontSize:14,fontWeight:600}},STORED_ID)
        ),
        h(Inp,{lbl:'비밀번호',val:inputPw,set:setInputPw,type:'password',ph:'비밀번호 입력'}),
        pwErr&&h('div',{style:{fontSize:12,color:'#F87171',textAlign:'center',background:'rgba(239,68,68,.08)',borderRadius:7,padding:'8px 12px'}},pwErr),
        h('button',{style:S('#3B82F6','#fff',{padding:13,fontSize:15,width:'100%',borderRadius:9,marginTop:4}),
          onClick:handleLogin},'로그인'),
        h('button',{style:S('transparent',SUB,{padding:'8px',fontSize:11,width:'100%',textDecoration:'underline'}),
          onClick:function(){
            if(confirm('비밀번호를 초기화하면 재설정 화면으로 이동합니다. 계속할까요?')){
              localStorage.removeItem('wms_pw');
              setNeedSetup(true);setInputPw('');setPwErr('');
            }
          }},'비밀번호를 잊으셨나요?')
      )
    )
  );

  if(cWh)return h(WHView,{wh:cWh,onUpdate:function(fn){upWh(whId,fn);},onBack:function(){setWhId(null);},onLogout:function(){setLoggedIn(false);setInputPw('');}});
  return h(MainView,{whs:whs,onPersist:persist,onEnter:setWhId,onLogout:function(){setLoggedIn(false);setInputPw('');}});
}

/* ════════════ MAIN VIEW ════════════ */
function MainView(p){
  var whs=p.whs,onPersist=p.onPersist,onEnter=p.onEnter,onLogout=p.onLogout;
  var so=useState(false),open=so[0],setOpen=so[1];
  var sn=useState(''),nm=sn[0],setNm=sn[1];
  var sr=useState('10'),rows=sr[0],setRows=sr[1];
  var sc=useState('10'),cols=sc[0],setCols=sc[1];
  var spc=useState(false),showPwChange=spc[0],setShowPwChange=spc[1];
  var scpw=useState(''),curPw=scpw[0],setCurPw=scpw[1];
  var snpw=useState(''),nPw=snpw[0],setNPw=snpw[1];
  var snpw2=useState(''),nPw2=snpw2[0],setNPw2=snpw2[1];
  var spe=useState(''),pwChErr=spe[0],setPwChErr=spe[1];

  function create(){
    if(!nm.trim())return;
    var r=Math.min(Math.max(+rows||10,2),30),c=Math.min(Math.max(+cols||10,2),30);
    onPersist(whs.concat([mkWH(nm.trim(),r,c)]));
    setOpen(false);setNm('');setRows('10');setCols('10');
  }
  function handlePwChange(){
    var saved=localStorage.getItem('wms_pw');
    if(curPw!==saved){setPwChErr('현재 비밀번호가 올바르지 않습니다');return;}
    if(!nPw||nPw.length<4){setPwChErr('새 비밀번호는 4자리 이상이어야 합니다');return;}
    if(nPw!==nPw2){setPwChErr('새 비밀번호가 일치하지 않습니다');return;}
    localStorage.setItem('wms_pw',nPw);
    setShowPwChange(false);setCurPw('');setNPw('');setNPw2('');setPwChErr('');
    alert('비밀번호가 변경되었습니다.');
  }

  return h('div',{style:{minHeight:'100vh',background:BG}},
    h('div',{style:{background:CARD,borderBottom:'1px solid '+BDR,padding:'0 16px',height:54,display:'flex',alignItems:'center',gap:10,position:'sticky',top:0,zIndex:10}},
      h('span',{style:{fontSize:22}},'📦'),
      h('div',{style:{flex:1}},
        h('div',{style:{fontWeight:700,fontSize:15}},'메이크창고 WMS 창고관리  VER 01'),
        h('div',{style:{fontSize:10,color:SUB}},'만든이 P.K.W')
      ),
      h('button',{style:S('rgba(255,255,255,.07)',SUB,{padding:'5px 9px',fontSize:11}),onClick:function(){setShowPwChange(true);}},'🔑 비번변경'),
      h('button',{style:S('rgba(255,255,255,.07)','#F87171',{padding:'5px 9px',fontSize:11}),onClick:function(){if(confirm('로그아웃 할까요?'))onLogout();}},'로그아웃'),
      h('button',{style:S('#3B82F6','#fff',{padding:'5px 12px',fontSize:12}),onClick:function(){setOpen(true);}},'+ 새 창고')
    ),
    h('div',{style:{padding:16,maxWidth:960,margin:'0 auto'}},
      whs.length===0
        ? h('div',{style:{textAlign:'center',marginTop:80,color:SUB}},h('div',{style:{fontSize:56}},'🏭'),h('div',{style:{marginTop:14,fontSize:16,color:'#94A3B8'}},'등록된 창고가 없습니다'))
        : h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12,paddingTop:8}},
            whs.map(function(wh){
              var st=calcSt(wh),pg=getPG(wh);
              return h('div',{key:wh.id,onClick:function(){onEnter(wh.id);},style:{background:CARD,borderRadius:14,padding:18,cursor:'pointer',border:'1px solid '+BDR}},
                h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}},
                  h('div',null,h('div',{style:{fontSize:18,fontWeight:700}},wh.name),h('div',{style:{fontSize:11,color:SUB,marginTop:3}},wh.rows+'x'+wh.cols+' 그리드')),
                  h('button',{style:S('rgba(239,68,68,.15)','#F87171',{padding:'4px 9px',fontSize:11,borderRadius:5}),
                    onClick:function(e){e.stopPropagation();if(confirm('삭제?'))onPersist(whs.filter(function(w){return w.id!==wh.id;}));}},'삭제')
                ),
                h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:12}},
                  [['전체',st.tot,'#94A3B8'],['사용',st.used,'#60A5FA'],['여유',st.free,'#4ADE80']].map(function(x){
                    return h('div',{key:x[0],style:{background:'rgba(255,255,255,.04)',borderRadius:7,padding:'7px 4px',textAlign:'center'}},
                      h('div',{style:{fontSize:20,fontWeight:700,color:x[2]}},x[1]),h('div',{style:{fontSize:10,color:SUB}},x[0]));
                  })
                ),
                pg.length>0&&h('div',{style:{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8}},
                  pg.slice(0,4).map(function(p2){return h('span',{key:p2.name,style:{background:p2.clr+'20',color:p2.clr,border:'1px solid '+p2.clr+'44',borderRadius:20,padding:'1px 7px',fontSize:10,fontWeight:600}},p2.name+' '+p2.cnt+'팔');})
                ),
                h('div',{style:{fontSize:10,color:SUB}},'마지막저장: '+(wh.history.length?wh.history[wh.history.length-1].label:'없음'))
              );
            })
          )
    ),
    open&&h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.72)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:100},onClick:function(){setOpen(false);}},
      h('div',{style:{background:CARD,borderRadius:'16px 16px 0 0',padding:22,width:'100%',maxWidth:460},onClick:function(e){e.stopPropagation();}},
        h('div',{style:{fontSize:17,fontWeight:700,marginBottom:16}},'새 창고 만들기'),
        h('div',{style:{display:'flex',flexDirection:'column',gap:11}},
          h(Inp,{lbl:'창고 이름',val:nm,set:setNm,ph:'예: 본창고 A동'}),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
            h(Inp,{lbl:'행 수',val:rows,set:setRows,type:'number'}),
            h(Inp,{lbl:'열 수',val:cols,set:setCols,type:'number'})
          ),
          h('div',{style:{fontSize:11,color:SUB}},'총 '+(+rows||0)*(+cols||0)+'칸'),
          h('button',{style:S('#3B82F6','#fff',{padding:13,fontSize:15,width:'100%'}),onClick:create},'생성하기')
        )
      )
    ),
    showPwChange&&h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.76)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:20},onClick:function(){setShowPwChange(false);setCurPw('');setNPw('');setNPw2('');setPwChErr('');}},
      h('div',{style:{background:CARD,borderRadius:16,padding:26,width:'100%',maxWidth:380},onClick:function(e){e.stopPropagation();}},
        h('div',{style:{fontSize:17,fontWeight:700,marginBottom:18}},'🔑 비밀번호 변경'),
        h('div',{style:{display:'flex',flexDirection:'column',gap:11}},
          h(Inp,{lbl:'현재 비밀번호',val:curPw,set:setCurPw,type:'password',ph:'현재 비밀번호'}),
          h(Inp,{lbl:'새 비밀번호 (4자리 이상)',val:nPw,set:setNPw,type:'password',ph:'새 비밀번호'}),
          h(Inp,{lbl:'새 비밀번호 확인',val:nPw2,set:setNPw2,type:'password',ph:'새 비밀번호 재입력'}),
          pwChErr&&h('div',{style:{fontSize:12,color:'#F87171',background:'rgba(239,68,68,.08)',borderRadius:7,padding:'8px 12px'}},pwChErr),
          h('div',{style:{display:'flex',gap:8}},
            h('button',{style:S('#3B82F6','#fff',{flex:1,padding:12,fontSize:14}),onClick:handlePwChange},'변경'),
            h('button',{style:S('rgba(255,255,255,.07)',SUB,{flex:1,padding:12,fontSize:14}),onClick:function(){setShowPwChange(false);setCurPw('');setNPw('');setNPw2('');setPwChErr('');}},'취소')
          )
        )
      )
    )
  );
}

/* ════════════ WH VIEW ════════════ */
function WHView(p){
  var wh=p.wh,onUpdate=p.onUpdate,onBack=p.onBack,onLogout=p.onLogout;
  var st1=useState('setup'),tab=st1[0],setTab=st1[1];
  var st2=useState(1),zoom=st2[0],setZoom=st2[1];
  var st3=useState(new Set()),sel=st3[0],setSel=st3[1];
  var st4=useState('rack'),sType=st4[0],setSType=st4[1];
  var st5=useState({r:1,c:1}),sDiv=st5[0],setSDiv=st5[1];
  var st6=useState([]),selSlots=st6[0],setSelSlots=st6[1];
  var st7=useState('idle'),opMode=st7[0],setOpMode=st7[1];
  var st8=useState(null),moveFrom=st8[0],setMoveFrom=st8[1];
  var st9=useState([]),outQ=st9[0],setOutQ=st9[1];
  var st10=useState(false),showIn=st10[0],setShowIn=st10[1];
  var st11=useState(false),showOut=st11[0],setShowOut=st11[1];
  var st12=useState({name:'',pallets:'1',qty:'1',exp:''}),inForm=st12[0],setInForm=st12[1];
  var st13=useState(null),editInfo=st13[0],setEditInfo=st13[1];
  var st14=useState(null),histView=st14[0],setHistView=st14[1];
  var st15=useState(false),showExp=st15[0],setShowExp=st15[1];
  var st16=useState(false),locked=st16[0],setLocked=st16[1];

  /* 창고별 커스텀 색상으로 CT 재정의 */
  var defaultTC={rack:'#3B82F6',shelf:'#F59E0B',empty:'#10B981',unused:'#475569'};
  var TC=Object.assign({},defaultTC,wh.typeColors||{});
  var CT={
    rack:  {lbl:'랙',    clr:TC.rack,  bg:TC.rack+'33',  bdr:TC.rack},
    shelf: {lbl:'선반',  clr:TC.shelf, bg:TC.shelf+'2a', bdr:TC.shelf},
    empty: {lbl:'빈공간',clr:TC.empty, bg:TC.empty+'1e', bdr:TC.empty},
    unused:{lbl:'미사용',clr:TC.unused,bg:TC.unused+'18',bdr:TC.unused}
  };

  var st=calcSt(wh),pg=getPG(wh);

  function withUndo(fn){
    onUpdate(function(w){
      var snap={cells:deep(w.cells),inQ:w.inQ.slice()};
      var nw=fn(Object.assign({},w,{cells:deep(w.cells)}));
      return Object.assign({},nw,{undoStack:(w.undoStack||[]).slice(-29).concat([snap])});
    });
  }
  function doUndo(){
    onUpdate(function(w){
      if(!w.undoStack||!w.undoStack.length)return w;
      var stack=w.undoStack.slice(),prev=stack.pop();
      return Object.assign({},w,prev,{undoStack:stack});
    });
  }
  function doSave(){
    onUpdate(function(w){
      return Object.assign({},w,{history:w.history.concat([{id:uid(),label:dayLabel(),cells:deep(w.cells),stats:calcSt(w),prods:getPG(w,w.cells)}])});
    });
  }
  function toggleSel(key){setSel(function(s){var n=new Set(s);n.has(key)?n.delete(key):n.add(key);return n;});}
  function applySetup(){
    if(!sel.size)return;
    withUndo(function(w){sel.forEach(function(k){w.cells[k]=mkCell(sType,sDiv.r,sDiv.c);});return w;});
    setSel(new Set());
  }
  function submitIn(){
    var nm2=inForm.name;if(!nm2.trim())return;
    var n=Math.max(1,+inForm.pallets||1),clr=pickClr(wh,nm2.trim());
    var items=Array.from({length:n},function(){return{id:uid(),name:nm2.trim(),qty:+inForm.qty||1,exp:inForm.exp.trim()};});
    withUndo(function(w){return Object.assign({},w,{inQ:w.inQ.concat(items),pColors:Object.assign({},w.pColors,{[nm2.trim()]:clr})});});
    setShowIn(false);setInForm({name:'',pallets:'1',qty:'1',exp:''});setTab('ops');
  }
  function clickSlot(cKey,sKey){
    var cell=wh.cells[cKey];if(!cell||!cell.type||cell.type==='unused')return;
    var slot=cell.slots[sKey];
    if(opMode==='outbound'){
      if(!slot)return;
      setOutQ(function(q){return q.concat([Object.assign({},slot,{cKey:cKey,sKey:sKey,qid:uid()})]);});
      withUndo(function(w){w.cells[cKey].slots[sKey]=null;return w;});
      return;
    }
    if(moveFrom){
      if(moveFrom.cKey===cKey&&moveFrom.sKey===sKey){setMoveFrom(null);return;}
      if(!slot){withUndo(function(w){w.cells[cKey].slots[sKey]=moveFrom.slot;w.cells[moveFrom.cKey].slots[moveFrom.sKey]=null;return w;});}
      setMoveFrom(null);return;
    }
    if(slot&&selSlots.length===0){setMoveFrom({cKey:cKey,sKey:sKey,slot:slot});return;}
    if(!slot&&(cell.type==='rack'||cell.type==='shelf')){
      var idx=selSlots.findIndex(function(s){return s.cKey===cKey&&s.sKey===sKey;});
      if(idx>=0)setSelSlots(function(s){return s.filter(function(_,i){return i!==idx;});});
      else setSelSlots(function(s){return s.concat([{cKey:cKey,sKey:sKey}]);});
    }
  }
  function assignIn(item){
    if(selSlots.length===0){
      withUndo(function(w){
        var en=Object.entries(w.cells);
        for(var i=0;i<en.length;i++){
          var ck=en[i][0],cell=en[i][1];
          if(cell.type!=='rack'&&cell.type!=='shelf')continue;
          var sks=Object.keys(cell.slots);
          for(var j=0;j<sks.length;j++){
            if(!cell.slots[sks[j]]){
              w.cells[ck].slots[sks[j]]=item;
              w.inQ=w.inQ.filter(function(x){return x.id!==item.id;});
              return w;
            }
          }
        }
        return w;
      });
    } else {
      var t=selSlots[0],cell2=wh.cells[t.cKey];
      if(!cell2||cell2.slots[t.sKey]){setSelSlots(function(s){return s.slice(1);});return;}
      withUndo(function(w){w.cells[t.cKey].slots[t.sKey]=item;w.inQ=w.inQ.filter(function(x){return x.id!==item.id;});return w;});
      setSelSlots(function(s){return s.slice(1);});
    }
  }
  function dblClick(cKey,sKey){var slot=wh.cells[cKey]&&wh.cells[cKey].slots[sKey];if(slot)setEditInfo({cKey:cKey,sKey:sKey,data:Object.assign({},slot)});}
  function saveEdit(){withUndo(function(w){w.cells[editInfo.cKey].slots[editInfo.sKey]=editInfo.data;return w;});setEditInfo(null);}

  var CSIZ=Math.round(56*zoom);
  function renderGrid(ops){
    var cells=[];
    for(var r=0;r<wh.rows;r++){
      for(var c=0;c<wh.cols;c++){
        (function(r,c){
          var key=r+'-'+c,cell=wh.cells[key];if(!cell)return;
          var ct=CT[cell.type],isSel=sel.has(key);
          var dR=(!ops&&isSel)?sDiv.r:cell.divR,dC=(!ops&&isSel)?sDiv.c:cell.divC;
          var isPrev=!ops&&isSel,pCT=CT[isPrev?sType:cell.type];
          var subs=[];
          for(var sr=0;sr<dR;sr++)for(var sc=0;sc<dC;sc++){
            (function(sr,sc){
              var sKey=sr+'-'+sc,idx2=sr*dC+sc,slot=cell.slots[sKey];
              var ssIdx=selSlots.findIndex(function(s){return s.cKey===key&&s.sKey===sKey;});
              var isSS=ssIdx>=0,isMF=moveFrom&&moveFrom.cKey===key&&moveFrom.sKey===sKey;
              var pClr=slot?(wh.pColors[slot.name]||'#94A3B8'):null;
              var subH=CSIZ/dR,subW=CSIZ/dC;
              var sbg=isPrev?(idx2===0?(pCT&&pCT.bg||'rgba(255,255,255,.08)'):'rgba(255,255,255,.04)'):
                isSS?'rgba(59,130,246,.48)':isMF?'rgba(245,158,11,.38)':
                slot?(pClr+'3a'):(ct?ct.bg:'rgba(255,255,255,.04)');
              var kids=[];
              if(isPrev&&idx2===0&&subH>16)kids.push(h('div',{key:'l',style:{fontSize:Math.max(6,Math.min(9,subH*.18)),color:pCT&&pCT.clr||TX,opacity:.7,fontWeight:600}},dR+'x'+dC));
              if(!isPrev&&isSS&&!slot)kids.push(h('div',{key:'n',style:{fontSize:Math.max(8,Math.min(12,subH*.25)),fontWeight:800,color:'#60A5FA'}},ssIdx+1));
              if(!isPrev&&slot){
                kids.push(h('div',{key:'d',style:{width:Math.min(7,subW*.3),height:Math.min(7,subH*.3),borderRadius:'50%',background:pClr,flexShrink:0}}));
                if(subH>26&&subW>18)kids.push(h('div',{key:'nm',style:{fontSize:Math.max(7,Math.min(10,subH*.16)),color:TX,textAlign:'center',lineHeight:1.1,overflow:'hidden',width:'100%',marginTop:1}},slot.name.slice(0,Math.max(2,Math.floor(subW/7)))));
              }
              subs.push(h('div',{key:sKey,
                style:{background:sbg,border:'1px solid '+(isSS?'#60A5FA':isMF?'#F59E0B':ct?(ct.bdr+'55'):BDR),borderRadius:2,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',overflow:'hidden',cursor:ops?'pointer':'default',boxSizing:'border-box',padding:1},
                onClick:ops?(function(k,sk){return function(){clickSlot(k,sk);};})(key,sKey):undefined,
                onDoubleClick:ops?(function(k,sk){return function(){dblClick(k,sk);};})(key,sKey):undefined
              },kids));
            })(sr,sc);
          }
          cells.push(h('div',{key:key,
            style:{width:CSIZ,height:CSIZ,background:pCT?(pCT.bdr+'22'):'rgba(255,255,255,.03)',border:'1.5px solid '+(isSel?(pCT&&pCT.bdr||'#F1F5F9'):(ct?ct.bdr:BDR)),outline:isSel?('2px solid '+(pCT&&pCT.bdr||'#e2e8f0')):'none',borderRadius:4,overflow:'hidden',cursor:'pointer',boxSizing:'border-box',display:'grid',gridTemplateColumns:'repeat('+dC+',1fr)',gridTemplateRows:'repeat('+dR+',1fr)',gap:2,padding:2},
            onClick:!ops?(function(k){return function(){toggleSel(k);};})(key):undefined
          },subs));
        })(r,c);
      }
    }
    return h('div',{style:{display:'inline-grid',gridTemplateColumns:'repeat('+wh.cols+','+CSIZ+'px)',gap:2,padding:8,userSelect:'none'}},cells);
  }

  var statusMsg=selSlots.length>0?('슬롯 '+selSlots.length+'개 선택 > 품목 탭'):
    opMode==='outbound'?'출고할 슬롯을 탭하세요':
    moveFrom?('이동중: "'+moveFrom.slot.name+'"'+(moveFrom.slot.exp?' 유통기한 '+fmtExp(moveFrom.slot.exp):'')+' '+((moveFrom.slot.qty||0).toLocaleString())+'개 > 빈슬롯 탭'):
    wh.inQ.length>0?'빈슬롯 탭(다중) > 위치지정 후 품목탭':'점유슬롯 탭탭 > 이동 / 더블탭 > 수정';

  return h('div',{style:{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden',background:BG}},
    /* 상단바 */
    h('div',{style:{background:CARD,borderBottom:'1px solid '+BDR,padding:'0 10px',height:50,display:'flex',alignItems:'center',gap:6,flexShrink:0}},
      h('button',{style:S('rgba(255,255,255,.07)',TX,{padding:'5px 9px',fontSize:12}),onClick:onBack},'< 목록'),
      h('div',{style:{flex:1,fontWeight:700,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},wh.name),
      h('button',{style:S('rgba(255,255,255,.07)','#F87171',{padding:'5px 8px',fontSize:11}),onClick:function(){if(confirm('로그아웃?'))onLogout();}},'로그아웃'),
      h('button',{style:S('rgba(16,185,129,.2)','#34D399',{padding:'5px 9px',fontSize:12}),onClick:function(){setShowExp(true);}},'내보내기'),
      h('button',{style:S('rgba(255,255,255,.07)','#FBBF24',{padding:'5px 8px',fontSize:14}),onClick:doUndo},'<'),
      h('button',{style:S('rgba(59,130,246,.2)','#60A5FA',{padding:'5px 9px',fontSize:12}),onClick:doSave},'저장'),
      h('button',{style:S('rgba(255,255,255,.07)',TX,{padding:'5px 8px',fontSize:13}),onClick:function(){setZoom(function(z){return Math.min(z+.25,3);});}},'[+]'),
      h('span',{style:{fontSize:10,color:SUB,minWidth:28,textAlign:'center'}},Math.round(zoom*100)+'%'),
      h('button',{style:S('rgba(255,255,255,.07)',TX,{padding:'5px 8px',fontSize:13}),onClick:function(){setZoom(function(z){return Math.max(z-.25,.3);});}},'[-]')
    ),
    /* 요약바 */
    tab!=='setup'&&h('div',{style:{background:'rgba(15,23,42,.97)',borderBottom:'1px solid '+BDR,padding:'5px 12px',display:'flex',gap:14,alignItems:'center',flexWrap:'wrap',flexShrink:0}},
      h('div',{style:{display:'flex',gap:10}},
        [['전체',st.tot,'#94A3B8'],['사용',st.used,'#60A5FA'],['여유',st.free,'#4ADE80']].map(function(x){return h('div',{key:x[0]},h('span',{style:{fontWeight:700,fontSize:15,color:x[2]}},x[1]),h('span',{style:{fontSize:10,color:SUB,marginLeft:3}},x[0]));})
      ),
      h('div',{style:{flex:1,display:'flex',gap:4,flexWrap:'wrap'}},
        pg.map(function(p2){return h('span',{key:p2.name,style:{background:p2.clr+'1e',border:'1px solid '+p2.clr+'44',color:p2.clr,borderRadius:20,padding:'2px 8px',fontSize:10,fontWeight:600}},p2.name+' '+p2.cnt+'팔 '+p2.totalQty.toLocaleString()+'개');})
      ),
      wh.inQ.length>0&&h('span',{style:{fontSize:10,color:'#FBBF24',fontWeight:600}},'입고대기 '+wh.inQ.length)
    ),
    /* 탭바 */
    h('div',{style:{background:CARD,borderBottom:'1px solid '+BDR,display:'flex',flexShrink:0}},
      [['ops','📋 작업'],['status','📊 현황'],['history','🗂 기록']].map(function(x){
        return h('button',{key:x[0],onClick:function(){setTab(x[0]);},style:Object.assign({},S('transparent',tab===x[0]?'#60A5FA':SUB),{borderRadius:0,padding:'9px 14px',fontSize:12,borderBottom:tab===x[0]?'2px solid #3B82F6':'2px solid transparent',flexShrink:0})},x[1]);
      }),
      h('div',{style:{flex:1}}),
      h('button',{key:'setup',onClick:function(){setTab('setup');},style:Object.assign({},S(tab==='setup'?'rgba(99,102,241,.15)':'transparent',tab==='setup'?'#A5B4FC':SUB),{borderRadius:0,padding:'9px 14px',fontSize:12,borderBottom:tab==='setup'?'2px solid #818CF8':'2px solid transparent',borderLeft:'1px solid '+BDR,flexShrink:0})},'⚙️ 설정')
    ),

    /* 설정 */
    tab==='setup'&&h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
      h('div',{style:{background:CARD,borderBottom:'1px solid '+BDR,padding:'8px 12px',display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-end',flexShrink:0}},
        h('div',null,
          h('div',{style:{fontSize:11,color:SUB,marginBottom:5}},'유형'),
          h('div',{style:{display:'flex',gap:5}},Object.entries(CT).map(function(e){return h('button',{key:e[0],onClick:function(){setSType(e[0]);},style:S(sType===e[0]?e[1].bg:'rgba(255,255,255,.05)',sType===e[0]?e[1].clr:SUB,{border:'1px solid '+(sType===e[0]?e[1].bdr:'transparent'),padding:'5px 10px',fontSize:12})},e[1].lbl);}))
        ),
        h(DivPicker,{val:sDiv,set:setSDiv}),
        h('div',{style:{display:'flex',gap:5,alignItems:'flex-end'}},
          h('button',{style:S('#3B82F6','#fff',{padding:'6px 12px',fontSize:12}),onClick:applySetup},'적용 ('+sel.size+'칸)'),
          h('button',{style:S('rgba(255,255,255,.06)',SUB,{padding:'6px 10px',fontSize:12}),onClick:function(){var a=new Set();for(var r=0;r<wh.rows;r++)for(var c=0;c<wh.cols;c++)a.add(r+'-'+c);setSel(a);}},'전체선택'),
          h('button',{style:S('rgba(255,255,255,.06)',SUB,{padding:'6px 10px',fontSize:12}),onClick:function(){setSel(new Set());}},'전체해제')
        )
      ),
      h('div',{style:{flex:1,overflow:'auto'}},renderGrid(false)),
      h('div',{style:{padding:'5px 12px',fontSize:11,color:SUB,background:CARD,borderTop:'1px solid '+BDR,flexShrink:0}},
        '셀 탭>선택 | 유형/분할 설정 후 [적용]  ',Object.entries(CT).map(function(e){return h('span',{key:e[0],style:{color:e[1].clr,marginRight:8}},'■ '+e[1].lbl);}))
    ),

    /* 작업 */
    tab==='ops'&&h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
      h('div',{style:{background:CARD,borderBottom:'1px solid '+BDR,padding:'7px 12px',display:'flex',gap:6,alignItems:'center',flexShrink:0}},
        (opMode!=='idle'||moveFrom||selSlots.length>0)&&h('button',{style:S('rgba(255,255,255,.07)',SUB,{padding:'4px 9px',fontSize:12}),onClick:function(){setOpMode('idle');setSelSlots([]);setMoveFrom(null);}},'취소'),
        h('div',{style:{flex:1,fontSize:11,color:selSlots.length>0?'#60A5FA':opMode==='outbound'?'#F87171':moveFrom?'#F59E0B':SUB,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},statusMsg),
        h('button',{style:S('#059669','#fff',{padding:'5px 12px',fontSize:12}),onClick:function(){setShowIn(true);}},'입고'),
        h('button',{style:S(opMode==='outbound'?'#DC2626':'rgba(239,68,68,.2)',opMode==='outbound'?'#fff':'#F87171',{padding:'5px 12px',fontSize:12}),
          onClick:function(){if(opMode==='outbound'){setOpMode('idle');setShowOut(false);}else{setOpMode('outbound');setShowOut(true);setSelSlots([]);setMoveFrom(null);}}},'출고')
      ),
      h('div',{style:{flex:1,overflow:'auto'}},renderGrid(true)),
      wh.inQ.length>0&&h('div',{style:{background:'rgba(10,20,38,.98)',borderTop:'2px solid #3B82F6',padding:10,maxHeight:160,overflow:'auto',flexShrink:0}},
        h('div',{style:{fontSize:11,fontWeight:700,marginBottom:7,color:'#60A5FA',display:'flex',alignItems:'center',gap:8}},
          '입고대기 '+wh.inQ.length+'건',
          selSlots.length>0?h('span',{style:{color:'#4ADE80',fontWeight:700}},selSlots.length+'개 선택 > 품목탭으로 순서배치'):h('span',{style:{color:SUB,fontSize:10}},'빈슬롯탭(다중) > 위치지정, 품목탭시 자동배치')
        ),
