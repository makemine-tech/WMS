<script>
'use strict';
const {createElement:h,useState,useEffect,Fragment}=React;

// ── 유틸 ────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9);
const dayLabel=()=>{const d=new Date(),W=['일','월','화','수','목','금','토'];return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${W[d.getDay()]})`};
const fmtExp=s=>s&&s.length===6?`20${s.slice(0,2)}.${s.slice(2,4)}.${s.slice(4,6)}`:(s||'');
const deep=o=>JSON.parse(JSON.stringify(o));

// ── 상수 ────────────────────────────────────────────────────────
const CT={
  rack:  {lbl:'랙',    clr:'#60A5FA',bg:'rgba(59,130,246,.20)',bdr:'#3B82F6'},
  empty: {lbl:'빈공간',clr:'#34D399',bg:'rgba(16,185,129,.11)',bdr:'#10B981'},
  unused:{lbl:'미사용',clr:'#6B7280',bg:'rgba(100,116,139,.09)',bdr:'#475569'},
  shelf: {lbl:'선반',  clr:'#FBBF24',bg:'rgba(245,158,11,.16)',bdr:'#F59E0B'},
};
const PC=['#F87171','#FB923C','#FBBF24','#4ADE80','#34D399','#60A5FA','#A78BFA','#F472B6','#2DD4BF','#38BDF8'];
const BG='#0F172A',CARD='#1E293B',BDR='#334155',TX='#E2E8F0',SUB='#64748B';
const S=(bg,clr,ex)=>Object.assign({background:bg,color:clr,border:'none',borderRadius:7,padding:'7px 14px',fontSize:13,fontWeight:600,cursor:'pointer'},ex||{});

// ── 창고 헬퍼 ───────────────────────────────────────────────────
const mkSlots=(r,c)=>{const s={};for(let ri=0;ri<r;ri++)for(let ci=0;ci<c;ci++)s[`${ri}-${ci}`]=null;return s;};
const mkCell=(type,dr,dc)=>({type,divR:dr,divC:dc,slots:mkSlots(dr,dc)});
const mkWH=(name,rows,cols)=>{
  const cells={};
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)cells[`${r}-${c}`]={type:null,divR:1,divC:1,slots:{'0-0':null}};
  return{id:uid(),name,rows,cols,cells,inQ:[],history:[],undoStack:[],pColors:{},sheetsUrl:''};
};
const calcSt=wh=>{let tot=0,used=0;Object.values(wh.cells).forEach(c=>{if(c.type==='rack'||c.type==='shelf'){tot+=c.divR*c.divC;used+=Object.values(c.slots).filter(Boolean).length;}});return{tot,used,free:tot-used};};
const getPG=(wh,cells)=>{
  const src=cells||wh.cells,m={};
  Object.values(src).forEach(c=>Object.values(c.slots).forEach(s=>{
    if(!s)return;const clr=wh.pColors[s.name]||'#94A3B8';
    if(!m[s.name])m[s.name]={name:s.name,cnt:0,totalQty:0,clr,exps:{}};
    m[s.name].cnt++;m[s.name].totalQty+=s.qty||0;
    const ek=s.exp||'';if(!m[s.name].exps[ek])m[s.name].exps[ek]={exp:ek,cnt:0,totalQty:0};
    m[s.name].exps[ek].cnt++;m[s.name].exps[ek].totalQty+=s.qty||0;
  }));
  return Object.values(m).map(p=>Object.assign({},p,{exps:Object.values(p.exps).sort((a,b)=>!a.exp?1:!b.exp?-1:a.exp.localeCompare(b.exp))}));
};
const pickClr=(wh,name)=>{if(wh.pColors[name])return wh.pColors[name];const used=new Set(Object.values(wh.pColors));return PC.find(c=>!used.has(c))||PC[0];};

// ── TSV 생성 ────────────────────────────────────────────────────
function buildTSV(wh,cells,stats,label){
  const esc=v=>String(v||'').replace(/\t/g,' ').replace(/\n/g,' ');
  const tl={rack:'랙',empty:'빈공간',unused:'미사용',shelf:'선반'};
  const rows=[
    ['창고:'+esc(wh.name),'저장:'+esc(label||'현재'),'전체:'+stats.tot,'사용:'+stats.used,'여유:'+stats.free],
    [],
    [''].concat(Array.from({length:wh.cols},(_,i)=>'C'+(i+1)))
  ];
  for(let r=0;r<wh.rows;r++){
    const row=['R'+(r+1)];
    for(let c=0;c<wh.cols;c++){
      const cell=cells&&cells[`${r}-${c}`];
      if(!cell||!cell.type){row.push('');continue;}
      const slots=Object.values(cell.slots||{}).filter(Boolean);
      if(!slots.length){row.push('['+( tl[cell.type]||cell.type)+']');continue;}
      row.push(slots.map(s=>esc(s.name)+(s.exp?' ~'+fmtExp(s.exp):'')+' ('+s.qty+'개)').join(' / '));
    }
    rows.push(row);
  }
  return rows.map(r=>r.join('\t')).join('\n');
}

function copyText(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,9999999);
  const ok=document.execCommand('copy');document.body.removeChild(ta);
  return ok;
}

  '}',
  'function doGet(e){',
  '  var out=ContentService.createTextOutput(JSON.stringify({status:"WMS connected"}));',
  '  out.setMimeType(ContentService.MimeType.JSON); return out;',

// ────────────────────────────────────────────────────────────────
// 공통 컴포넌트
// ────────────────────────────────────────────────────────────────
function Inp({lbl,val,set,ph,type}){
  return h('label',{style:{display:'flex',flexDirection:'column',gap:4,fontSize:12,color:SUB}},
    lbl,
    h('input',{type:type||'text',value:val,placeholder:ph||'',
      onChange:e=>set(e.target.value),
      style:{background:BG,border:`1px solid ${BDR}`,borderRadius:7,padding:'8px 10px',color:TX,fontSize:14,outline:'none',width:'100%'}})
  );
}

function DivPicker({val,set}){
  const [hov,setHov]=useState(null);
  const hi=hov||val;
  const cells=[];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    const act=hi.r>=r+1&&hi.c>=c+1,sel=val.r>=r+1&&val.c>=c+1;
    const key=`${r}-${c}`;
    cells.push(h('div',{key,
      style:{width:22,height:22,borderRadius:3,cursor:'pointer',
        background:act?'rgba(99,102,241,.55)':sel?'rgba(99,102,241,.2)':'rgba(255,255,255,.06)',
        border:`1px solid ${act?'#818CF8':sel?'#6366F1':'rgba(255,255,255,.1)'}`},
      onMouseEnter:()=>setHov({r:r+1,c:c+1}),
      onMouseLeave:()=>setHov(null),
      onClick:()=>set({r:r+1,c:c+1})
    }));
  }
  return h('div',null,
    h('div',{style:{fontSize:11,color:SUB,marginBottom:5}},`분할 ${val.r}×${val.c}`),
    h('div',{style:{display:'inline-grid',gridTemplateColumns:'repeat(4,22px)',gap:2}},cells)
  );
}

// ────────────────────────────────────────────────────────────────
// APP
// ────────────────────────────────────────────────────────────────
function App(){
  const [whs,setWhs]=useState([]);
  const [whId,setWhId]=useState(null);
  const [ready,setReady]=useState(false);
  useEffect(()=>{
    try{const d=localStorage.getItem('wms_v1');if(d)setWhs(JSON.parse(d));}catch(e){}
    setReady(true);
  },[]);
  const persist=d=>{setWhs(d);try{localStorage.setItem('wms_v1',JSON.stringify(d));}catch(e){}};
  const upWh=(id,fn)=>persist(whs.map(w=>w.id===id?fn(w):w));
  const cWh=whs.find(w=>w.id===whId);
  if(!ready)return h('div',{style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}},
    h('div',{style:{fontSize:48}},'📦'),h('div',{style:{color:SUB}},'로딩 중...'));
  if(cWh)return h(WHView,{wh:cWh,onUpdate:fn=>upWh(whId,fn),onBack:()=>setWhId(null)});
  return h(MainView,{whs,onPersist:persist,onEnter:setWhId});
}

// ────────────────────────────────────────────────────────────────
// MAIN VIEW
// ────────────────────────────────────────────────────────────────
function MainView({whs,onPersist,onEnter}){
  const [open,setOpen]=useState(false);
  const [nm,setNm]=useState('');
  const [rows,setRows]=useState('10');
  const [cols,setCols]=useState('10');
  const create=()=>{
    if(!nm.trim())return;
    const r=Math.min(Math.max(+rows||10,2),30),c=Math.min(Math.max(+cols||10,2),30);
    onPersist([...whs,mkWH(nm.trim(),r,c)]);
    setOpen(false);setNm('');setRows('10');setCols('10');
  };
  return h('div',{style:{minHeight:'100vh',background:BG}},
    // 헤더
    h('div',{style:{background:CARD,borderBottom:`1px solid ${BDR}`,padding:'0 16px',height:54,display:'flex',alignItems:'center',gap:10,position:'sticky',top:0,zIndex:10}},
      h('span',{style:{fontSize:24}},'📦'),
      h('div',{style:{flex:1}},
        h('div',{style:{fontWeight:700,fontSize:17}},'WMS 창고관리'),
        h('div',{style:{fontSize:10,color:SUB}},'Warehouse Management System')
      ),
      h('button',{style:S('#3B82F6','#fff'),onClick:()=>setOpen(true)},'+ 새 창고')
    ),
    // 목록
    h('div',{style:{padding:16,maxWidth:960,margin:'0 auto'}},
      whs.length===0
        ? h('div',{style:{textAlign:'center',marginTop:80,color:SUB}},
            h('div',{style:{fontSize:56}},'🏭'),
            h('div',{style:{marginTop:14,fontSize:16,color:'#94A3B8'}},'등록된 창고가 없습니다'),
            h('div',{style:{marginTop:4,fontSize:13}},'새 창고를 추가해 시작하세요')
          )
        : h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12,paddingTop:8}},
            whs.map(wh=>{
              const st=calcSt(wh),pg=getPG(wh);
              return h('div',{key:wh.id,onClick:()=>onEnter(wh.id),
                style:{background:CARD,borderRadius:14,padding:18,cursor:'pointer',border:`1px solid ${BDR}`,transition:'border-color .15s'}},
                h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}},
                  h('div',null,
                    h('div',{style:{fontSize:18,fontWeight:700}},wh.name),
                    h('div',{style:{fontSize:11,color:SUB,marginTop:3}},`${wh.rows}×${wh.cols} 그리드`)
                  ),
                  h('button',{style:S('rgba(239,68,68,.15)','#F87171',{padding:'4px 9px',fontSize:11,borderRadius:5}),
                    onClick:e=>{e.stopPropagation();if(confirm('이 창고를 삭제할까요?'))onPersist(whs.filter(w=>w.id!==wh.id));}},'삭제')
                ),
                h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:12}},
                  [['전체',st.tot,'#94A3B8'],['사용중',st.used,'#60A5FA'],['여유',st.free,'#4ADE80']].map(([l,v,c])=>
                    h('div',{key:l,style:{background:'rgba(255,255,255,.04)',borderRadius:7,padding:'7px 4px',textAlign:'center'}},
                      h('div',{style:{fontSize:20,fontWeight:700,color:c}},v),
                      h('div',{style:{fontSize:10,color:SUB}},l)
                    )
                  )
                ),
                pg.length>0&&h('div',{style:{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8}},
                  pg.slice(0,4).map(p=>h('span',{key:p.name,style:{background:`${p.clr}20`,color:p.clr,border:`1px solid ${p.clr}44`,borderRadius:20,padding:'1px 7px',fontSize:10,fontWeight:600}},`${p.name} ${p.cnt}팔`))
                ),
                h('div',{style:{fontSize:10,color:SUB}},`마지막 저장: ${wh.history.at(-1)?.label||'없음'}`)
              );
            })
          )
    ),
    // 새 창고 모달
    open&&h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.72)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:100},onClick:()=>setOpen(false)},
      h('div',{style:{background:CARD,borderRadius:'16px 16px 0 0',padding:22,width:'100%',maxWidth:460},onClick:e=>e.stopPropagation()},
        h('div',{style:{fontSize:17,fontWeight:700,marginBottom:16}},'🏭 새 창고 만들기'),
        h('div',{style:{display:'flex',flexDirection:'column',gap:11}},
          h(Inp,{lbl:'창고 이름',val:nm,set:setNm,ph:'예: 본창고 A동'}),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
            h(Inp,{lbl:'행 수 (2~30)',val:rows,set:setRows,type:'number'}),
            h(Inp,{lbl:'열 수 (2~30)',val:cols,set:setCols,type:'number'})
          ),
          h('div',{style:{fontSize:11,color:SUB}},`총 ${(+rows||0)*(+cols||0)}칸 그리드 생성`),
          h('button',{style:S('#3B82F6','#fff',{padding:13,fontSize:15,width:'100%'}),onClick:create},'생성하기')
        )
      )
    )
  );
}

// ────────────────────────────────────────────────────────────────
// WH VIEW
// ────────────────────────────────────────────────────────────────
function WHView({wh,onUpdate,onBack}){
  const [tab,setTab]=useState('setup');
  const [zoom,setZoom]=useState(1);
  const [sel,setSel]=useState(new Set());
  const [sType,setSType]=useState('rack');
  const [sDiv,setSDiv]=useState({r:1,c:1});
  const [selSlots,setSelSlots]=useState([]);
  const [opMode,setOpMode]=useState('idle');
  const [moveFrom,setMoveFrom]=useState(null);
  const [outQ,setOutQ]=useState([]);
  const [showInForm,setShowInForm]=useState(false);
  const [showOutPanel,setShowOutPanel]=useState(false);
  const [inForm,setInForm]=useState({name:'',pallets:'1',qty:'1',exp:''});
  const [editInfo,setEditInfo]=useState(null);
  const [histView,setHistView]=useState(null);
  const [showExport,setShowExport]=useState(false);

  const st=calcSt(wh),pg=getPG(wh);

  const withUndo=fn=>onUpdate(w=>{
    const snap={cells:deep(w.cells),inQ:[...w.inQ]};
    const nw=fn(Object.assign({},w,{cells:deep(w.cells)}));
    return Object.assign({},nw,{undoStack:[...(w.undoStack||[]).slice(-29),snap]});
  });
  const doUndo=()=>onUpdate(w=>{
    if(!w.undoStack||!w.undoStack.length)return w;
    const stack=[...w.undoStack],prev=stack.pop();
    return Object.assign({},w,prev,{undoStack:stack});
  });
  const doSave=()=>onUpdate(w=>Object.assign({},w,{history:[...w.history,{id:uid(),label:dayLabel(),cells:deep(w.cells),stats:calcSt(w),prods:getPG(w,w.cells)}]}));

  const toggleSel=key=>setSel(s=>{const n=new Set(s);n.has(key)?n.delete(key):n.add(key);return n;});
  const applySetup=()=>{
    if(!sel.size)return;
    withUndo(w=>{sel.forEach(k=>{w.cells[k]=mkCell(sType,sDiv.r,sDiv.c);});return w;});
    setSel(new Set());
  };
  const submitIn=()=>{
    const {name,pallets,qty,exp}=inForm;if(!name.trim())return;
    const n=Math.max(1,+pallets||1),clr=pickClr(wh,name.trim());
    const items=Array.from({length:n},()=>({id:uid(),name:name.trim(),qty:+qty||1,exp:exp.trim()}));
    withUndo(w=>Object.assign({},w,{inQ:[...w.inQ,...items],pColors:Object.assign({},w.pColors,{[name.trim()]:clr})}));
    setShowInForm(false);setInForm({name:'',pallets:'1',qty:'1',exp:''});setTab('ops');
  };
  const clickSlot=(cKey,sKey)=>{
    const cell=wh.cells[cKey];if(!cell||!cell.type||cell.type==='unused')return;
    const slot=cell.slots[sKey];
    if(opMode==='outbound'){if(!slot)return;setOutQ(q=>[...q,Object.assign({},slot,{cKey,sKey,qid:uid()})]);withUndo(w=>{w.cells[cKey].slots[sKey]=null;return w;});return;}
    if(moveFrom){
      if(moveFrom.cKey===cKey&&moveFrom.sKey===sKey){setMoveFrom(null);return;}
      if(!slot){withUndo(w=>{w.cells[cKey].slots[sKey]=moveFrom.slot;w.cells[moveFrom.cKey].slots[moveFrom.sKey]=null;return w;});}
      setMoveFrom(null);return;
    }
    if(slot&&selSlots.length===0){setMoveFrom({cKey,sKey,slot});return;}
    if(!slot&&(cell.type==='rack'||cell.type==='shelf')){
      const idx=selSlots.findIndex(s=>s.cKey===cKey&&s.sKey===sKey);
      if(idx>=0)setSelSlots(s=>s.filter((_,i)=>i!==idx));
      else setSelSlots(s=>[...s,{cKey,sKey}]);
    }
  };
  const assignIn=item=>{
    if(selSlots.length===0){
      withUndo(w=>{
        for(const[ck,cell]of Object.entries(w.cells)){
          if(cell.type!=='rack'&&cell.type!=='shelf')continue;
          for(const sk of Object.keys(cell.slots)){if(!cell.slots[sk]){w.cells[ck].slots[sk]=item;w.inQ=w.inQ.filter(i=>i.id!==item.id);return w;}}
        }return w;
      });
    }else{
      const t=selSlots[0];const cell=wh.cells[t.cKey];
      if(!cell||cell.slots[t.sKey]){setSelSlots(s=>s.slice(1));return;}
      withUndo(w=>{w.cells[t.cKey].slots[t.sKey]=item;w.inQ=w.inQ.filter(i=>i.id!==item.id);return w;});
      setSelSlots(s=>s.slice(1));
    }
  };
  const dblClickSlot=(cKey,sKey)=>{const slot=wh.cells[cKey]&&wh.cells[cKey].slots[sKey];if(slot)setEditInfo({cKey,sKey,data:Object.assign({},slot)});};
  const saveEdit=()=>{withUndo(w=>{w.cells[editInfo.cKey].slots[editInfo.sKey]=editInfo.data;return w;});setEditInfo(null);};

  const CSIZ=Math.round(56*zoom);

  function renderGrid(ops){
    const gridCells=[];
    for(let r=0;r<wh.rows;r++){
      for(let c=0;c<wh.cols;c++){
        const key=`${r}-${c}`,cell=wh.cells[key];if(!cell)continue;
        const ct=CT[cell.type],isSel=sel.has(key);
        const dR=(!ops&&isSel)?sDiv.r:cell.divR,dC=(!ops&&isSel)?sDiv.c:cell.divC;
        const isPrev=!ops&&isSel,pCT=CT[isPrev?sType:cell.type];
        const subCells=[];
        for(let sr=0;sr<dR;sr++){
          for(let sc=0;sc<dC;sc++){
            const sKey=`${sr}-${sc}`,idx=sr*dC+sc;
            const slot=cell.slots[sKey];
            const ssIdx=selSlots.findIndex(s=>s.cKey===key&&s.sKey===sKey);
            const isSS=ssIdx>=0,isMF=moveFrom&&moveFrom.cKey===key&&moveFrom.sKey===sKey;
            const pClr=slot?(wh.pColors[slot.name]||'#94A3B8'):null;
            const subH=CSIZ/dR,subW=CSIZ/dC;

            h(Inp,{lbl:'파렛트 수',val:inForm.pallets,set:v=>setInForm(f=>Object.assign({},f,{pallets:v})),type:'number'}),
            h(Inp,{lbl:'파렛트당 수량',val:inForm.qty,set:v=>setInForm(f=>Object.assign({},f,{qty:v})),type:'number'})
          ),
          h(Inp,{lbl:'유통기한 (YYMMDD)',val:inForm.exp,set:v=>setInForm(f=>Object.assign({},f,{exp:v})),ph:'예: 260505'}),
          inForm.exp.length===6&&h('div',{style:{fontSize:12,color:'#4ADE80'}},'→ '+fmtExp(inForm.exp)),
          h('button',{style:S('#059669','#fff',{padding:13,fontSize:15,width:'100%'}),onClick:submitIn},'입고 등록')
        )
      )
    ),
    editInfo&&h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.76)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:16},onClick:()=>setEditInfo(null)},
      h('div',{style:{background:CARD,borderRadius:14,padding:22,width:'100%',maxWidth:380},onClick:e=>e.stopPropagation()},
        h('div',{style:{fontSize:17,fontWeight:700,marginBottom:16}},'✏️ 슬롯 수정'),
        h('div',{style:{display:'flex',flexDirection:'column',gap:11}},
          h(Inp,{lbl:'상품명',val:editInfo.data.name,set:v=>setEditInfo(i=>Object.assign({},i,{data:Object.assign({},i.data,{name:v})}))}),
          h(Inp,{lbl:'수량',val:String(editInfo.data.qty),set:v=>setEditInfo(i=>Object.assign({},i,{data:Object.assign({},i.data,{qty:+v})})),type:'number'}),
          h(Inp,{lbl:'유통기한 (YYMMDD)',val:editInfo.data.exp||'',set:v=>setEditInfo(i=>Object.assign({},i,{data:Object.assign({},i.data,{exp:v})})),ph:'YYMMDD'}),
          editInfo.data.exp&&editInfo.data.exp.length===6&&h('div',{style:{fontSize:12,color:'#4ADE80'}},'→ '+fmtExp(editInfo.data.exp)),
          h('div',{style:{display:'flex',gap:8}},
            h('button',{style:S('#3B82F6','#fff',{flex:1,padding:12,fontSize:14}),onClick:saveEdit},'저장'),
            h('button',{style:S('rgba(239,68,68,.2)','#F87171',{flex:1,padding:12,fontSize:14}),onClick:()=>{withUndo(w=>{w.cells[editInfo.cKey].slots[editInfo.sKey]=null;return w;});setEditInfo(null);}},'삭제')
          )
        )
      )
    )
  );
}

// ────────────────────────────────────────────────────────────────
// 히스토리 배치도 모달
// ────────────────────────────────────────────────────────────────
function HistViewModal({wh,histView,onClose,withUndo,zoom}){
  const CSIZ=Math.round(56*zoom);
  const gridCells=[];
  for(let r=0;r<wh.rows;r++){
    for(let c=0;c<wh.cols;c++){
      const key=`${r}-${c}`,cell=histView.cells[key];if(!cell)continue;
      const ct=CT[cell.type],dR=cell.divR||1,dC=cell.divC||1;
      const subs=[];
      for(let sr=0;sr<dR;sr++)for(let sc=0;sc<dC;sc++){
        const sKey=`${sr}-${sc}`,slot=cell.slots&&cell.slots[sKey];
        const pClr=slot?(wh.pColors[slot.name]||'#94A3B8'):null;
        const subH=CSIZ/dR,subW=CSIZ/dC;
        subs.push(h('div',{key:sKey,style:{background:slot?`${pClr}3a`:(ct?ct.bg:'rgba(255,255,255,.04)'),border:`1px solid ${ct?(ct.bdr+'55'):BDR}`,borderRadius:2,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',overflow:'hidden',boxSizing:'border-box',padding:1}},
          slot&&h(Fragment,null,h('div',{style:{width:Math.min(7,subW*.3),height:Math.min(7,subH*.3),borderRadius:'50%',background:pClr,flexShrink:0}}),subH>26&&subW>18&&h('div',{style:{fontSize:Math.max(7,Math.min(9,subH*.15)),color:TX,textAlign:'center',lineHeight:1.1,overflow:'hidden',width:'100%',marginTop:1}},slot.name.slice(0,Math.max(2,Math.floor(subW/7)))))
        ));
      }
      gridCells.push(h('div',{key,style:{width:CSIZ,height:CSIZ,background:ct?ct.bdr+'22':'rgba(255,255,255,.03)',border:`1.5px solid ${ct?ct.bdr:BDR}`,borderRadius:4,overflow:'hidden',boxSizing:'border-box',display:'grid',gridTemplateColumns:`repeat(${dC},1fr)`,gridTemplateRows:`repeat(${dR},1fr)`,gap:2,padding:2}},subs));
    }
  }
  return h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.88)',display:'flex',flexDirection:'column',zIndex:300}},
    h('div',{style:{background:CARD,borderBottom:`1px solid ${BDR}`,padding:'10px 14px',display:'flex',alignItems:'center',gap:10,flexShrink:0}},
      h('div',{style:{flex:1}},h('div',{style:{fontWeight:700,fontSize:15}},'📐 배치도 — '+histView.label),h('div',{style:{fontSize:11,color:SUB,marginTop:2}},`슬롯 ${histView.stats&&histView.stats.tot||0} · 사용 ${histView.stats&&histView.stats.used||0} · 여유 ${histView.stats&&histView.stats.free||0}`)),
      h('button',{style:S('rgba(59,130,246,.2)','#60A5FA',{padding:'5px 10px',fontSize:12}),onClick:()=>{if(confirm('복원?')){withUndo(()=>Object.assign({},wh,{cells:deep(histView.cells)}));onClose();}}},'복원'),
      h('button',{style:S('rgba(255,255,255,.08)',TX,{padding:'5px 10px',fontSize:12}),onClick:onClose},'✕')
    ),
    histView.prods&&histView.prods.length>0&&h('div',{style:{background:'rgba(15,23,42,.97)',borderBottom:`1px solid ${BDR}`,padding:'6px 14px',display:'flex',gap:8,flexWrap:'wrap',flexShrink:0}},
      histView.prods.map(p=>h('span',{key:p.name,style:{background:`${p.clr}1e`,border:`1px solid ${p.clr}44`,color:p.clr,borderRadius:20,padding:'2px 9px',fontSize:11,fontWeight:600}},`${p.name} ${p.cnt}팔 ${(p.totalQty||0).toLocaleString()}개`))
    ),
    h('div',{style:{flex:1,overflow:'auto',padding:8}},
      h('div',{style:{display:'inline-grid',gridTemplateColumns:`repeat(${wh.cols},${CSIZ}px)`,gap:2,userSelect:'none'}},gridCells)
    )
  );
}

// ────────────────────────────────────────────────────────────────
// 내보내기 모달
// ────────────────────────────────────────────────────────────────
function ExportModal({wh,onUpdate,onClose}){
  const sheets=[
    {label:'현재 상태',cells:wh.cells,stats:calcSt(wh)},
    ...[...wh.history].reverse().map(h2=>({label:h2.label,cells:h2.cells,stats:h2.stats}))
  ];
  const [idx,setIdx]=useState(0);
  const [copied,setCopied]=useState(false);
  const [gasOpen,setGasOpen]=useState(false);
  const [gasCopied,setGasCopied]=useState(false);
  const [url,setUrl]=useState(wh.sheetsUrl||'');
  const [urlSaved,setUrlSaved]=useState(!!wh.sheetsUrl);
  const tsv=buildTSV(wh,sheets[idx].cells,sheets[idx].stats,sheets[idx].label);

  return h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.82)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:400},onClick:onClose},
    h('div',{style:{background:CARD,borderRadius:'18px 18px 0 0',width:'100%',maxWidth:540,maxHeight:'90vh',display:'flex',flexDirection:'column'},onClick:e=>e.stopPropagation()},
      h('div',{style:{padding:'16px 18px 12px',display:'flex',alignItems:'center',gap:10,borderBottom:`1px solid ${BDR}`,flexShrink:0}},
        h('div',{style:{flex:1,fontWeight:700,fontSize:16}},'📊 데이터 내보내기'),
        h('button',{style:S('rgba(255,255,255,.07)',TX,{padding:'5px 10px',fontSize:12}),onClick:onClose},'✕ 닫기')
      ),
      h('div',{style:{flex:1,overflow:'auto',padding:18}},
        // 시트 선택
        h('div',{style:{fontSize:12,color:SUB,marginBottom:8,fontWeight:600}},'📋 시트 선택'),
        h('div',{style:{display:'flex',gap:5,flexWrap:'wrap',marginBottom:14}},
          sheets.map((s,i)=>h('button',{key:i,onClick:()=>{setIdx(i);setCopied(false);},style:S(idx===i?'rgba(16,185,129,.2)':'rgba(255,255,255,.06)',idx===i?'#34D399':SUB,{padding:'5px 11px',fontSize:11,border:`1px solid ${idx===i?'rgba(16,185,129,.4)':'transparent'}`})},s.label.slice(0,20)))
        ),
        // STEP 1
        h('div',{style:{background:'rgba(16,185,129,.07)',border:'1px solid rgba(16,185,129,.25)',borderRadius:10,padding:14,marginBottom:14}},
          h('div',{style:{fontSize:12,fontWeight:700,color:'#34D399',marginBottom:8}},'STEP 1 — 복사 후 구글시트/엑셀에 붙여넣기'),
          h('textarea',{readOnly:true,value:tsv,onFocus:e=>e.target.select(),style:{width:'100%',height:110,background:'#0D1117',border:`1px solid ${BDR}`,borderRadius:7,padding:10,color:'#7EE787',fontSize:10,fontFamily:'monospace',lineHeight:1.5,resize:'none',outline:'none',boxSizing:'border-box'}}),
          h('button',{style:S(copied?'#059669':'#3B82F6','#fff',{padding:10,fontSize:14,width:'100%',borderRadius:8,marginTop:8}),onClick:()=>{const ok=copyText(tsv);if(ok)setCopied(true);else alert('텍스트박스 클릭 후 Ctrl+A, Ctrl+C로 직접 복사하세요.');}},copied?'✅ 복사 완료! → 구글시트 A1에 Ctrl+V':'📋 데이터 복사하기'),
          copied&&h('div',{style:{marginTop:8,fontSize:12,color:'#34D399',textAlign:'center',fontWeight:600}},'구글시트 A1 클릭 → Ctrl+V 🎉')
        ),
        // STEP 2
        h('div',{style:{background:'rgba(59,130,246,.07)',border:'1px solid rgba(59,130,246,.25)',borderRadius:10,padding:14}},
          h('div',{style:{display:'flex',alignItems:'center',gap:8,cursor:'pointer'},onClick:()=>setGasOpen(v=>!v)},
            h('div',{style:{fontSize:12,fontWeight:700,color:'#60A5FA',flex:1}},'STEP 2 (선택) — Apps Script 자동 연동'),
            h('span',{style:{color:SUB}},gasOpen?'▲':'▼')
          ),
          gasOpen&&h('div',{style:{marginTop:12,display:'flex',flexDirection:'column',gap:10}},
            h('div',{style:{fontSize:11,color:SUB,lineHeight:1.7}},
              '1. 구글시트 → ',h('strong',{style:{color:TX}},'확장 프로그램 → Apps Script'),' 클릭',h('br'),
              '2. 아래 코드 전체 교체 후 저장 (Ctrl+S)',h('br'),
              '3. 배포 → 웹앱 → 액세스: 모든 사용자 → URL 복사'
            ),
            h('textarea',{readOnly:true,value:GAS,onFocus:e=>e.target.select(),style:{width:'100%',height:130,background:'#0D1117',border:`1px solid ${BDR}`,borderRadius:7,padding:10,color:'#7EE787',fontSize:10,fontFamily:'monospace',lineHeight:1.5,resize:'none',outline:'none',boxSizing:'border-box'}}),
            h('button',{style:S(gasCopied?'#059669':'rgba(99,102,241,.3)',gasCopied?'#fff':'#A5B4FC',{padding:10,fontSize:13,width:'100%',borderRadius:8}),onClick:()=>{const ok=copyText(GAS);if(ok)setGasCopied(true);}},gasCopied?'✅ 코드 복사 완료':'📋 Apps Script 코드 복사'),
            h(Inp,{lbl:'웹앱 배포 URL',val:url,set:setUrl,ph:'https://script.google.com/macros/s/.../exec'}),
            h('button',{style:S('#3B82F6','#fff',{padding:10,fontSize:13,width:'100%',borderRadius:8}),onClick:()=>{if(!url.includes('script.google.com')){alert('올바른 URL이 아닙니다.');return;}onUpdate(w=>Object.assign({},w,{sheetsUrl:url.trim()}));setUrlSaved(true);}},'💾 URL 저장'),
            urlSaved&&h('div',{style:{fontSize:12,color:'#34D399',textAlign:'center'}},'✅ URL 저장됨'),
            url.includes('script.google.com')&&h('a',{href:url,target:'_blank',rel:'noreferrer',style:{display:'block',textAlign:'center',padding:9,background:'rgba(99,102,241,.15)',border:'1px solid rgba(99,102,241,.3)',borderRadius:9,color:'#A5B4FC',fontSize:12,fontWeight:600,textDecoration:'none'}},'🔗 새 탭에서 연결 확인')
          )
        )
      )
    )
  );
}

// ── 렌더 ────────────────────────────────────────────────────────
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
