/* ── Firebase ── */
var DB='https://makemine-wms-default-rtdb.asia-southeast1.firebasedatabase.app/wms/data.json';
var _pt=null,_lt=null;
function dbSave(d){
  fetch(DB,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({j:JSON.stringify(d),t:Date.now()})}).catch(function(e){console.warn(e);});
}
function dbListen(cb){
  function run(){
    fetch(DB).then(function(r){return r.json();}).then(function(v){
      if(v&&v.j&&v.t!==_lt){_lt=v.t;try{cb(JSON.parse(v.j));}catch(e){cb([]);}}
      else if(!v||!v.j){cb([]);}
    }).catch(function(e){console.warn(e);});
  }
  run();_pt=setInterval(run,3000);
}
function dbOff(){if(_pt){clearInterval(_pt);_pt=null;}}

/* ── 유틸 ── */
function uid(){return Math.random().toString(36).slice(2,9);}
function dayLabel(){
  var d=new Date(),W=['일','월','화','수','목','금','토'];
  return d.getFullYear()+'.'+pad(d.getMonth()+1)+'.'+pad(d.getDate())+' ('+W[d.getDay()]+')';
}
function pad(n){return String(n).padStart(2,'0');}
function fmtExp(s){return s&&s.length===6?'20'+s.slice(0,2)+'.'+s.slice(2,4)+'.'+s.slice(4,6):(s||'');}
function fmtShort(s){return s&&s.length===6?s.slice(2,4)+'/'+s.slice(4,6):'';}
function deep(o){return JSON.parse(JSON.stringify(o));}
function copyText(t){
  var ta=document.createElement('textarea');ta.value=t;
  ta.style.cssText='position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,99999999);
  var ok=document.execCommand('copy');document.body.removeChild(ta);return ok;
}

/* ── 유통기한 ── */
function getExpSt(exp){
  if(!exp||exp.length!==6)return 'ok';
  var d=new Date('20'+exp.slice(0,2)+'-'+exp.slice(2,4)+'-'+exp.slice(4,6));
  var now=new Date();now.setHours(0,0,0,0);
  if(d<now)return 'expired';
  if((d-now)/86400000<=90)return 'imminent';
  return 'ok';
}

/* ── 창고 헬퍼 ── */
function mkSlots(r,c){
  var s={};
  for(var i=0;i<r;i++)for(var j=0;j<c;j++)s[i+'-'+j]=null;
  return s;
}
function mkCell(tp,dr,dc){return{type:tp,divR:dr,divC:dc,slots:mkSlots(dr,dc)};}
function mkWH(name,rows,cols){
  var cells={};
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)cells[r+'-'+c]={type:null,divR:1,divC:1,slots:{'0-0':null}};
  return{id:uid(),name:name,rows:rows,cols:cols,cells:cells,inQ:[],history:[],undoStack:[],pColors:{},sheetsUrl:''};
}
function calcSt(wh){
  var tot=0,used=0;
  Object.values(wh.cells).forEach(function(c){
    if(c.type==='rack'||c.type==='shelf'){tot+=c.divR*c.divC;used+=Object.values(c.slots).filter(Boolean).length;}
  });
  return{tot:tot,used:used,free:tot-used};
}
function getPG(wh,cells){
  var src=cells||wh.cells,m={};
  Object.values(src).forEach(function(c){
    Object.values(c.slots).forEach(function(s){
      if(!s)return;
      var clr=wh.pColors[s.name]||'#94A3B8';
      if(!m[s.name])m[s.name]={name:s.name,cnt:0,totalQty:0,clr:clr,exps:{}};
      m[s.name].cnt++;
      m[s.name].totalQty+=s.qty||0;
      var ek=s.exp||'';
      if(!m[s.name].exps[ek])m[s.name].exps[ek]={exp:ek,cnt:0,totalQty:0};
      m[s.name].exps[ek].cnt++;
      m[s.name].exps[ek].totalQty+=s.qty||0;
    });
  });
  return Object.values(m).map(function(p){
    var sorted=Object.values(p.exps).sort(function(a,b){
      if(!a.exp)return 1;
      if(!b.exp)return -1;
      return a.exp.localeCompare(b.exp);
    });
    return Object.assign({},p,{exps:sorted});
  });
}
function pickClr(wh,name){
  if(wh.pColors[name])return wh.pColors[name];
  var used=new Set(Object.values(wh.pColors));
  return PAL.find(function(c){return !used.has(c);})||PAL[0];
}
function setColor(existing,key,val){
  var n=Object.assign({},existing);n[key]=val;return n;
}
function buildTSV(wh,cells,stats,label){
  var tl={rack:'랙',empty:'빈공간',unused:'미사용',shelf:'보관'};
  function esc(v){return String(v||'').replace(/\t/g,' ').replace(/\n/g,' ');}
  var rows=[
    ['창고:'+esc(wh.name),'저장:'+esc(label||'현재'),'전체:'+stats.tot,'사용:'+stats.used,'여유:'+stats.free],
    [],
    [''].concat(Array.from({length:wh.cols},function(_,i){return 'C'+(i+1);}))
  ];
  for(var r=0;r<wh.rows;r++){
    var row=['R'+(r+1)];
    for(var c=0;c<wh.cols;c++){
      var cell=cells&&cells[r+'-'+c];
      if(!cell||!cell.type){row.push('');continue;}
      var sv=Object.values(cell.slots||{}).filter(Boolean);
      if(!sv.length){row.push('['+(tl[cell.type]||cell.type)+']');continue;}
      row.push(sv.map(function(s){return esc(s.name)+(s.exp?' ~'+fmtExp(s.exp):'')+' ('+s.qty+'개)';}).join(' / '));
    }
    rows.push(row);
  }
  return rows.map(function(rr){return rr.join('\t');}).join('\n');
}

function DivPicker(p){
  var sh=useState(null),hov=sh[0],setHov=sh[1];
  var hi=hov||p.val;
  var cs=[];
  for(var r=0;r<4;r++){
    for(var c=0;c<4;c++){
      var act=hi.r>=r+1&&hi.c>=c+1;
      var sel2=p.val.r>=r+1&&p.val.c>=c+1;
      cs.push(h('div',{key:r+'-'+c,
        style:{width:20,height:20,borderRadius:2,cursor:'pointer',
          background:act?'rgba(99,102,241,.60)':sel2?'rgba(99,102,241,.25)':'rgba(255,255,255,.06)',
          border:'1px solid '+(act?'#818CF8':sel2?'#6366F1':'rgba(255,255,255,.1)')},
        onMouseEnter:(function(rr,cc){return function(){setHov({r:rr+1,c:cc+1});};})(r,c),
        onMouseLeave:function(){setHov(null);},
        onClick:(function(rr,cc){return function(){p.set({r:rr+1,c:cc+1});};})(r,c)
      }));
    }
  }
  return h('div',null,
    h('div',{style:{fontSize:10,color:SUB,marginBottom:4,fontWeight:600}},p.val.r+'x'+p.val.c+' 분할'),
    h('div',{style:{display:'inline-grid',gridTemplateColumns:'repeat(4,20px)',gap:2}},cs)

          h('div',{style:{fontSize:9,color:SUB,width:38,flexShrink:0,textAlign:'right',paddingRight:4}},row.lbl),
          h('div',{style:{display:'flex',gap:3}},
            row.clrs.map(function(clr){

          )
        );
      })
    )
  );
}

  var a2=useState(null),whId=a2[0],setWhId=a2[1];
  var a3=useState(false),ready=a3[0],setReady=a3[1];
  var a4=useState(false),loggedIn=a4[0],setLoggedIn=a4[1];
  var a5=useState(''),inputPw=a5[0],setInputPw=a5[1];
  var a6=useState(''),pwErr=a6[0],setPwErr=a6[1];
  var a7=useState(false),needSetup=a7[0],setNeedSetup=a7[1];
  var a8=useState(''),newPw=a8[0],setNewPw=a8[1];
  var a9=useState(''),newPw2=a9[0],setNewPw2=a9[1];
  var a10=useState(''),setupErr=a10[0],setSetupErr=a10[1];
  var ID='makechango';

  useEffect(function(){
    var sv=localStorage.getItem('wms_pw');
    if(!sv){setNeedSetup(true);setReady(true);return;}
    setReady(true);
    try{var bk=localStorage.getItem('wms_bak');if(bk)setWhs(JSON.parse(bk));}catch(e){}
    dbListen(function(d){setWhs(d||[]);});

  },[]);

  function doSetup(){
    if(!newPw||newPw.length<4){setSetupErr('4자리 이상으로 설정해주세요');return;}
    if(newPw!==newPw2){setSetupErr('비밀번호가 일치하지 않습니다');return;}
    localStorage.setItem('wms_pw',newPw);setNeedSetup(false);setLoggedIn(true);
    dbListen(function(d){setWhs(d||[]);});
  }
  function doLogin(){
    var sv=localStorage.getItem('wms_pw');
    if(inputPw===sv){setLoggedIn(true);setPwErr('');}
    else{setPwErr('비밀번호가 올바르지 않습니다');setInputPw('');}
  }
  function persist(d){setWhs(d);dbSave(d);try{localStorage.setItem('wms_bak',JSON.stringify(d));}catch(e){}}
  function upWh(id,fn){persist(whs.map(function(w){return w.id===id?fn(w):w;}));}

          h('div',{style:{fontSize:11,color:SUB,marginTop:4}},'최초 비밀번호를 설정해주세요')
        ),
        h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
          h('div',{style:{background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.2)',borderRadius:8,padding:'10px 14px',fontSize:12,color:'#93C5FD'}},'아이디: ',h('strong',null,ID),' (고정)'),

/* ═══════════ MAIN VIEW ═══════════ */
function MainView(p){
  var whs=p.whs,onPersist=p.onPersist,onEnter=p.onEnter,onLogout=p.onLogout;
  var m1=useState(false),open=m1[0],setOpen=m1[1];
  var m2=useState(''),nm=m2[0],setNm=m2[1];
  var m3=useState('10'),rows=m3[0],setRows=m3[1];
  var m4=useState('10'),cols=m4[0],setCols=m4[1];

  function create(){
    if(!nm.trim())return;
    var r=Math.min(Math.max(+rows||10,2),30);
    var c=Math.min(Math.max(+cols||10,2),30);
    onPersist(whs.concat([mkWH(nm.trim(),r,c)]));
    setOpen(false);setNm('');setRows('10');setCols('10');
  }

  return h('div',{style:{minHeight:'100vh',background:BG,paddingBottom:28}},
    h('div',{style:{background:CARD,borderBottom:'1px solid '+BDR,padding:'0 16px',height:54,display:'flex',alignItems:'center',gap:10,position:'sticky',top:0,zIndex:10}},
      h('span',{style:{fontSize:22}},'📦'),
      h('div',{style:{flex:1}},
        h('div',{style:{fontWeight:700,fontSize:15}},'메이크창고 WMS'),
        h('div',{style:{fontSize:10,color:SUB}},'창고관리 시스템 ver 01')
      ),
      h('button',{style:S('rgba(255,255,255,.07)','#F87171',{padding:'5px 9px',fontSize:11}),onClick:function(){if(confirm('로그아웃?'))onLogout();}},'로그아웃'),
      h('button',{style:S('#3B82F6','#fff',{padding:'5px 12px',fontSize:12}),onClick:function(){setOpen(true);}},'+ 새 창고')
    ),

/* ═══════════ WH VIEW ═══════════ */
function WHView(p){
  var wh=p.wh,onUpdate=p.onUpdate,onBack=p.onBack,onLogout=p.onLogout;

  /* 기본 UI 상태 */
  var v1=useState('ops'),tab=v1[0],setTab=v1[1];
  var v2=useState({s:1,x:0,y:0}),pz=v2[0],setPz=v2[1];
  var v3=useState(new Set()),sel=v3[0],setSel=v3[1];
  var v4=useState('rack'),sType=v4[0],setSType=v4[1];
  var v5=useState({r:1,c:1}),sDiv=v5[0],setSDiv=v5[1];
  var v6=useState([]),selSlots=v6[0],setSelSlots=v6[1];
  var v7=useState(null),moveFrom=v7[0],setMoveFrom=v7[1];
  var v8=useState(false),showIn=v8[0],setShowIn=v8[1];
  var v9=useState({name:'',pallets:'1',qty:'1',exp:''}),inForm=v9[0],setInForm=v9[1];
  var v10=useState(null),editInfo=v10[0],setEditInfo=v10[1];
  var v11=useState(null),histView=v11[0],setHistView=v11[1];
  var v12=useState(false),showExp=v12[0],setShowExp=v12[1];
  var v13=useState(true),locked=v13[0],setLocked=v13[1];
  var v14=useState(null),colorPick=v14[0],setColorPick=v14[1];
  var v15=useState(false),saveFlash=v15[0],setSaveFlash=v15[1];
  var v16=useState(null),hlProd=v16[0],setHlProd=v16[1];
  var toastK=useRef(0);

  /* 출고 관련 상태 */
  var o1=useState([]),pendOut=o1[0],setPendOut=o1[1];
  var o2=useState([]),confOut=o2[0],setConfOut=o2[1];
  var o3=useState(false),showOutForm=o3[0],setShowOutForm=o3[1];
  var o4=useState({date:'',loc:''}),outForm=o4[0],setOutForm=o4[1];
  var o5=useState(false),outSelMode=o5[0],setOutSelMode=o5[1];
  var o6=useState(null),outMeta=o6[0],setOutMeta=o6[1];
  var o7=useState(false),immMode=o7[0],setImmMode=o7[1];
  var o8=useState([]),outQ=o8[0],setOutQ=o8[1];
  var o9=useState(false),showOutPanel=o9[0],setShowOutPanel=o9[1];
  var o10=useState(false),showConfPanel=o10[0],setShowConfPanel=o10[1];

  /* 파생 */
  var pendSet=new Set();
  pendOut.forEach(function(x){pendSet.add(x.cKey+'||'+x.sKey);});
  var stData=calcSt(wh),pg=getPG(wh);
  var hlClr=hlProd?(wh.pColors[hlProd]||'#94A3B8'):null;
  var rootRef=useRef(null),wrapRef=useRef(null),didDrag=useRef(false);

  /* Pan/Zoom */
  useEffect(function(){
    var root=rootRef.current;if(!root)return;
    function W(){return wrapRef.current;}
    function onWheel(e){
      var w=W();if(!w||!w.contains(e.target))return;
      e.preventDefault();
      var rc=w.getBoundingClientRect();
      var cx=e.clientX-rc.left,cy=e.clientY-rc.top;
      var f=e.deltaY<0?1.12:1/1.12;
      setPz(function(q){var ns=Math.min(Math.max(q.s*f,0.25),7);return{s:ns,x:cx-(cx-q.x)*(ns/q.s),y:cy-(cy-q.y)*(ns/q.s)};});
    }
    var _md=false,_mx=0,_my=0;
    function onMD(e){var w=W();if(!w||!w.contains(e.target)||e.button!==0)return;_md=true;_mx=e.clientX;_my=e.clientY;didDrag.current=false;w.style.cursor='grabbing';}
    function onMM(e){if(!_md)return;var dx=e.clientX-_mx,dy=e.clientY-_my;_mx=e.clientX;_my=e.clientY;if(Math.abs(dx)+Math.abs(dy)>3)didDrag.current=true;setPz(function(q){return{s:q.s,x:q.x+dx,y:q.y+dy};});}
    function onMU(){if(!_md)return;_md=false;var w=W();if(w)w.style.cursor='grab';}
    var _ld=0,_lx=0,_ly=0,_pinch=false;
    function tDist(a,b){return Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);}
    function tMid(a,b){return{x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2};}
    function onTS(e){
      didDrag.current=false;
      if(e.touches.length>=2){_pinch=true;_ld=tDist(e.touches[0],e.touches[1]);var m=tMid(e.touches[0],e.touches[1]);_lx=m.x;_ly=m.y;}
      else{_pinch=false;_lx=e.touches[0].clientX;_ly=e.touches[0].clientY;}
    }
    function onTM(e){
      var w=W();if(!w)return;e.preventDefault();
      if(e.touches.length>=2){
        var dist=tDist(e.touches[0],e.touches[1]);
        var mid=tMid(e.touches[0],e.touches[1]);
        var rc=w.getBoundingClientRect();
        var cx=mid.x-rc.left,cy=mid.y-rc.top;
        var pdx=mid.x-_lx,pdy=mid.y-_ly;
        var ratio=_ld>0?dist/_ld:1;
        setPz(function(q){var ns=Math.min(Math.max(q.s*ratio,0.25),7);return{s:ns,x:cx-(cx-q.x)*(ns/q.s)+pdx,y:cy-(cy-q.y)*(ns/q.s)+pdy};});
        _ld=dist;_lx=mid.x;_ly=mid.y;didDrag.current=true;
      }else if(!_pinch){
        var dx=e.touches[0].clientX-_lx,dy=e.touches[0].clientY-_ly;
        _lx=e.touches[0].clientX;_ly=e.touches[0].clientY;
        if(Math.abs(dx)+Math.abs(dy)>5)didDrag.current=true;
        setPz(function(q){return{s:q.s,x:q.x+dx,y:q.y+dy};});
      }
    }
    function onTE(e){if(e.touches.length<2)_pinch=false;if(e.touches.length===1){_lx=e.touches[0].clientX;_ly=e.touches[0].clientY;}}
    root.addEventListener('wheel',onWheel,{passive:false});
    root.addEventListener('mousedown',onMD);
    window.addEventListener('mousemove',onMM);
    window.addEventListener('mouseup',onMU);
    root.addEventListener('touchstart',onTS,{passive:false});
    root.addEventListener('touchmove',onTM,{passive:false});
    root.addEventListener('touchend',onTE);
    return function(){
      root.removeEventListener('wheel',onWheel);root.removeEventListener('mousedown',onMD);
      window.removeEventListener('mousemove',onMM);window.removeEventListener('mouseup',onMU);
      root.removeEventListener('touchstart',onTS);root.removeEventListener('touchmove',onTM);root.removeEventListener('touchend',onTE);
    };
  },[]);

  function zBtn(f){
    var w=wrapRef.current;if(!w)return;
    var rc=w.getBoundingClientRect();var cx=rc.width/2,cy=rc.height/2;
    setPz(function(q){var ns=Math.min(Math.max(q.s*f,0.25),7);return{s:ns,x:cx-(cx-q.x)*(ns/q.s),y:cy-(cy-q.y)*(ns/q.s)};});
  }
  function resetPz(){setPz({s:1,x:0,y:0});}

  function withUndo(fn){
    onUpdate(function(w){
      var snap={cells:deep(w.cells),inQ:w.inQ.slice()};
      var nw=fn(Object.assign({},w,{cells:deep(w.cells)}));
      return Object.assign({},nw,{undoStack:(w.undoStack||[]).slice(-29).concat([snap])});
    });
  }
  function doUndo(){
    onUpdate(function(w){
      if(!w.undoStack||!w.undoStack.length)return w;
      var stack=w.undoStack.slice(),prev=stack.pop();
      return Object.assign({},w,prev,{undoStack:stack});
    });
  }
  function doSave(){
    onUpdate(function(w){
      return Object.assign({},w,{history:w.history.concat([{id:uid(),label:dayLabel(),cells:deep(w.cells),stats:calcSt(w),prods:getPG(w,w.cells)}])});
    });
    toastK.current++;setSaveFlash(true);setTimeout(function(){setSaveFlash(false);},2200);
  }
  function chgClr(name,clr){
    onUpdate(function(w){return Object.assign({},w,{pColors:setColor(w.pColors,name,clr)});});
    setColorPick(null);
  }
  function toggleSel(key){
    if(didDrag.current)return;
    setSel(function(s){var n=new Set(s);n.has(key)?n.delete(key):n.add(key);return n;});
  }
  function applySetup(){
    if(!sel.size)return;
    withUndo(function(w){sel.forEach(function(k){w.cells[k]=mkCell(sType,sDiv.r,sDiv.c);});return w;});
    setSel(new Set());
  }
  function submitIn(){
    var nm2=inForm.name.trim();if(!nm2)return;
    var n=Math.max(1,+inForm.pallets||1);
    var clr=pickClr(wh,nm2);
    var items=Array.from({length:n},function(){return{id:uid(),name:nm2,qty:+inForm.qty||1,exp:inForm.exp.trim()};});
    withUndo(function(w){return Object.assign({},w,{inQ:w.inQ.concat(items),pColors:setColor(w.pColors,nm2,clr)});});
    setShowIn(false);setInForm({name:'',pallets:'1',qty:'1',exp:''});setTab('ops');
  }

  function clickSlot(cKey,sKey){
    if(locked||didDrag.current)return;
    if(pendSet.has(cKey+'||'+sKey))return;
    var cell=wh.cells[cKey];if(!cell||!cell.type||cell.type==='unused')return;
    var slot=cell.slots[sKey];

    if(outSelMode){
      if(!slot)return;
      var meta=outMeta;
      setPendOut(function(q){
        return q.concat([{qid:uid(),date:meta.date,loc:meta.loc,cKey:cKey,sKey:sKey,slot:Object.assign({},slot)}]);
      });
      return;
    }
    if(immMode){
      if(!slot)return;
      setOutQ(function(q){return q.concat([{qid:uid(),cKey:cKey,sKey:sKey,slot:Object.assign({},slot)}]);});
      withUndo(function(w){w.cells[cKey].slots[sKey]=null;return w;});
      return;
    }
    if(moveFrom){
      if(moveFrom.cKey===cKey&&moveFrom.sKey===sKey){setMoveFrom(null);return;}
      if(!slot){withUndo(function(w){w.cells[cKey].slots[sKey]=moveFrom.slot;w.cells[moveFrom.cKey].slots[moveFrom.sKey]=null;return w;});}
      setMoveFrom(null);return;
    }
    if(slot&&selSlots.length===0){setMoveFrom({cKey:cKey,sKey:sKey,slot:slot});return;}
    if(!slot&&(cell.type==='rack'||cell.type==='shelf')){
      var idx=selSlots.findIndex(function(s){return s.cKey===cKey&&s.sKey===sKey;});
      if(idx>=0){setSelSlots(function(s){return s.filter(function(_,i){return i!==idx;});});}
      else{setSelSlots(function(s){return s.concat([{cKey:cKey,sKey:sKey}]);});}
    }
  }
  function assignIn(item){
    if(selSlots.length===0){
      withUndo(function(w){
        var en=Object.entries(w.cells);
        for(var i=0;i<en.length;i++){
          var ck=en[i][0],cc=en[i][1];
          if(cc.type!=='rack'&&cc.type!=='shelf')continue;
          var sks=Object.keys(cc.slots);
          for(var j=0;j<sks.length;j++){
            if(!cc.slots[sks[j]]){cc.slots[sks[j]]=item;w.inQ=w.inQ.filter(function(x){return x.id!==item.id;});return w;}
          }
        }
        return w;
      });
    }else{
      var t=selSlots[0];
      var cc2=wh.cells[t.cKey];
      if(!cc2||cc2.slots[t.sKey]){setSelSlots(function(s){return s.slice(1);});return;}
      withUndo(function(w){w.cells[t.cKey].slots[t.sKey]=item;w.inQ=w.inQ.filter(function(x){return x.id!==item.id;});return w;});
      setSelSlots(function(s){return s.slice(1);});
    }
  }
  function dblClick(cKey,sKey){
    if(locked||didDrag.current||pendSet.has(cKey+'||'+sKey))return;
    var slot=wh.cells[cKey]&&wh.cells[cKey].slots[sKey];
    if(slot)setEditInfo({cKey:cKey,sKey:sKey,data:Object.assign({},slot)});
  }
  function saveEdit(){withUndo(function(w){w.cells[editInfo.cKey].slots[editInfo.sKey]=editInfo.data;return w;});setEditInfo(null);}

  /* 출고대기 예약 */
  function confirmPend(qid){
    var item=pendOut.find(function(x){return x.qid===qid;});
    if(!item)return;
    withUndo(function(w){w.cells[item.cKey].slots[item.sKey]=null;return w;});
    var lbl=item.date+(item.loc?'-'+item.loc:'');
    setConfOut(function(q){return q.concat([Object.assign({},item,{label:lbl,confirmedAt:dayLabel()})]);});
    setPendOut(function(q){return q.filter(function(x){return x.qid!==qid;});});
  }
  function withdrawPend(qid){setPendOut(function(q){return q.filter(function(x){return x.qid!==qid;});});}

  /* 바로출고 */
  function confirmImm(qid){
    var item=outQ.find(function(x){return x.qid===qid;});
    if(!item)return;
    var d=new Date();
    var lbl=pad(d.getMonth()+1)+pad(d.getDate())+'-바로출고';
    setConfOut(function(q){return q.concat([Object.assign({},item,{label:lbl,confirmedAt:dayLabel()})]);});
    setOutQ(function(q){return q.filter(function(x){return x.qid!==qid;});});
  }
  function cancelImm(qid){
    var item=outQ.find(function(x){return x.qid===qid;});
    if(!item)return;
    withUndo(function(w){w.cells[item.cKey].slots[item.sKey]=item.slot;return w;});
    setOutQ(function(q){return q.filter(function(x){return x.qid!==qid;});});
  }
  function confirmAllImm(){
    var d=new Date();
    var lbl=pad(d.getMonth()+1)+pad(d.getDate())+'-바로출고';
    setConfOut(function(q){return q.concat(outQ.map(function(item){return Object.assign({},item,{label:lbl,confirmedAt:dayLabel()});}));});
    setOutQ([]);setImmMode(false);setShowOutPanel(false);
  }
  function cancelAllModes(){
    setSelSlots([]);setMoveFrom(null);setOutSelMode(false);setOutMeta(null);setImmMode(false);
  }

  /* 그리드 렌더 */
  function renderGrid(ops){
    var cells=[];
    for(var r=0;r<wh.rows;r++){
      for(var c=0;c<wh.cols;c++){
        (function(r,c){
          var key=r+'-'+c;
          var cell=wh.cells[key];if(!cell)return;
          var ct=CT[cell.type];
          var isSel=sel.has(key);
          var dR=(!ops&&isSel)?sDiv.r:cell.divR;
          var dC=(!ops&&isSel)?sDiv.c:cell.divC;
          var isPrev=!ops&&isSel;
          var pCT=CT[isPrev?sType:cell.type];
          var hasHl=hlProd&&Object.values(cell.slots).some(function(s){return s&&s.name===hlProd;});
          var isDimmed=hlProd&&!hasHl;
          var subs=[];
          for(var sr=0;sr<dR;sr++){
            for(var sc=0;sc<dC;sc++){
              (function(sr,sc){
                var sKey=sr+'-'+sc;
                var idx2=sr*dC+sc;
                var slot=cell.slots[sKey];
                var ssIdx=selSlots.findIndex(function(s){return s.cKey===key&&s.sKey===sKey;});
                var isSS=ssIdx>=0;

/* ═══════════ HIST MODAL ═══════════ */
function HistModal(p){
  var wh=p.wh,hv=p.hv,onClose=p.onClose,withUndo=p.withUndo;
  var sh=useState(0.8),hz=sh[0],setHz=sh[1];
  var CSIZ=Math.round(BASE*hz);
  var cells=[];
  for(var r=0;r<wh.rows;r++){
    for(var c=0;c<wh.cols;c++){
      (function(r,c){
        var key=r+'-'+c;
        var cell=hv.cells[key];if(!cell)return;
        var ct=CT[cell.type];
        var dR=cell.divR||1,dC=cell.divC||1;
        var subs=[];
        for(var sr=0;sr<dR;sr++){
          for(var sc=0;sc<dC;sc++){
            (function(sr,sc){
              var sKey=sr+'-'+sc;
              var slot=cell.slots&&cell.slots[sKey];
              var pClr=slot?(wh.pColors[slot.name]||'#94A3B8'):null;
              var subH=CSIZ/dR,subW=CSIZ/dC;
              var esSt=slot?getExpSt(slot.exp):'ok';
              var em=EM[esSt];
              var showD=subH>=28&&subW>=20;
              subs.push(h('div',{key:sKey,style:{background:slot?(em?em.bg:(pClr+'3a')):(ct?ct.bg:'rgba(255,255,255,.04)'),border:'1px solid '+(em?em.bdr:(ct?(ct.bdr+'55'):BDR)),borderRadius:2,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',overflow:'hidden',boxSizing:'border-box',padding:1,minWidth:0,minHeight:0}},
                slot&&h(Fragment,null,
                  h('div',{key:'d',style:{width:Math.min(5,subW*.28),height:Math.min(5,subH*.28),borderRadius:'50%',background:pClr,flexShrink:0}}),
                  showD&&h('div',{key:'n',style:{fontSize:Math.max(6,Math.min(8,subH*.15)),color:TX,textAlign:'center',lineHeight:1.1,overflow:'hidden',width:'100%',marginTop:1}},slot.name.slice(0,Math.max(2,Math.floor(subW/8)))),

}

  var e4=useState(!!wh.sheetsUrl),urlSaved=e4[0],setUrlSaved=e4[1];

          sheets.map(function(s,i){
