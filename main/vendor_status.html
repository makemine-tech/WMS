<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>재고 현황 — 메이크창고</title>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<script src="/wms_vendor_projection.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0B1220;--card:#141E33;--bd:#26344F;--tx:#E8EEF7;--sub:#8597B0;--accent:#3B82F6;--green:#34D399;--amber:#FBBF24;}
body{background:var(--bg);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:var(--tx);min-height:100vh;padding:0 0 40px;}
.wrap{max-width:860px;margin:0 auto;padding:20px 16px;}
.center{text-align:center;padding:70px 20px;color:var(--sub);font-size:14px;}
.spinner{width:26px;height:26px;border:2px solid var(--bd);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* 헤더 */
.rpt-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;border-bottom:2px solid var(--bd);padding-bottom:16px;margin-bottom:20px;}
.rpt-title{font-size:13px;color:var(--sub);font-weight:700;letter-spacing:.18em;margin-bottom:5px;}
.rpt-vendor{font-size:26px;font-weight:800;letter-spacing:-.4px;line-height:1.1;}
.rpt-meta{text-align:right;font-size:11px;color:var(--sub);line-height:1.7;flex-shrink:0;}
.rpt-meta b{color:var(--tx);font-weight:700;}
.tools{display:flex;gap:8px;margin-top:8px;justify-content:flex-end;}
.tbtn{background:rgba(255,255,255,.06);color:var(--sub);border:1px solid var(--bd);border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;}
.tbtn:hover{background:rgba(255,255,255,.1);color:var(--tx);}

/* 요약 카드 */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;}
.scard{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px 14px;text-align:center;}
.scard .v{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1;}
.scard .l{font-size:11px;color:var(--sub);margin-top:7px;font-weight:600;letter-spacing:.03em;}
.scard.a .v{color:#60A5FA;} .scard.b .v{color:var(--green);} .scard.c .v{color:var(--amber);}

/* 테이블 */
.tbl-wrap{background:var(--card);border:1px solid var(--bd);border-radius:14px;overflow-x:auto;overflow-y:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{background:rgba(255,255,255,.04);font-size:11px;color:var(--sub);font-weight:700;letter-spacing:.05em;text-align:right;padding:12px 16px;border-bottom:1px solid var(--bd);}
thead th.l{text-align:left;}
tbody td{padding:13px 16px;font-size:14px;text-align:right;border-bottom:1px solid rgba(255,255,255,.05);}
tbody td.l{text-align:left;font-weight:600;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:nth-child(even){background:rgba(255,255,255,.015);}
.num{font-variant-numeric:tabular-nums;font-weight:700;}
.num .u{font-size:11px;color:var(--sub);font-weight:600;margin-left:2px;}
tfoot td{padding:14px 16px;font-size:14px;font-weight:800;text-align:right;border-top:2px solid var(--bd);background:rgba(59,130,246,.07);}
tfoot td.l{text-align:left;letter-spacing:.04em;}
.empty{text-align:center;color:var(--sub);padding:44px 20px;font-size:14px;}

/* 정렬 바 */
.sortbar{display:flex;align-items:center;gap:6px;margin-bottom:11px;flex-wrap:wrap;}
.sortlabel{font-size:11px;color:var(--sub);font-weight:700;margin-right:2px;}
.sortbtn{background:rgba(255,255,255,.05);color:var(--sub);border:1px solid var(--bd);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;cursor:pointer;}
.sortbtn.active{background:rgba(59,130,246,.18);color:#93C5FD;border-color:rgba(59,130,246,.5);}

/* 총수량 펼침 버튼 */
.qcell{cursor:pointer;}
.pn{font-weight:600;}
.qty-toggle{background:none;border:none;color:var(--tx);font-size:14px;font-weight:700;cursor:pointer;font-variant-numeric:tabular-nums;display:inline-flex;align-items:center;gap:5px;padding:2px 0;}
.qty-toggle .u{font-size:11px;color:var(--sub);font-weight:600;margin-left:1px;}
.qty-toggle .caret{font-size:10px;color:#60A5FA;}
.qty-toggle:hover{color:#93C5FD;}

/* 세부 적재구성 */
.detail-row td{padding:0 16px 12px!important;background:rgba(255,255,255,.015);text-align:left;}
.bd-box{background:rgba(0,0,0,.22);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;}
.bd-line{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:1px dashed rgba(255,255,255,.08);font-variant-numeric:tabular-nums;}
.bd-line:last-of-type{border-bottom:none;}
.bd-l{color:var(--tx);font-weight:600;}
.bd-r{color:#93C5FD;font-weight:700;}
.bd-total{text-align:right;font-size:13px;font-weight:800;color:var(--green);margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);}
.bd-empty{font-size:12px;color:var(--sub);padding:8px 2px;}

/* 재고 부족 */
.num.low{color:#F87171;}
.lowrow td{background:rgba(239,68,68,.05);}
.restock{display:inline-flex;align-items:center;gap:4px;background:rgba(239,68,68,.16);color:#FCA5A5;border:1px solid rgba(239,68,68,.45);border-radius:20px;padding:3px 9px 3px 7px;font-size:10.5px;font-weight:800;cursor:pointer;margin-left:8px;vertical-align:middle;letter-spacing:.02em;white-space:nowrap;}
.restock:hover{background:rgba(239,68,68,.28);color:#fff;}
.restock svg{flex-shrink:0;}

/* 낱개수량 입력 */
.loose-hint{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.3);border-radius:9px;padding:8px 12px;font-size:12px;color:#C4B5FD;line-height:1.55;margin-bottom:11px;}
.loosehead{color:#C4B5FD!important;}
.loosecell{background:rgba(124,58,237,.05);}
.loose-inp{width:74px;background:#0B1220;border:1px solid #3B2E66;border-radius:7px;padding:7px 8px;color:#fff;font-size:14px;font-weight:700;text-align:right;outline:none;font-variant-numeric:tabular-nums;font-family:inherit;-moz-appearance:textfield;}
.loose-inp:focus{border-color:#7C3AED;background:#15102b;}
.loose-inp::-webkit-outer-spin-button,.loose-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.loose-inp::placeholder{color:#4B5563;font-weight:600;}
.loosero{color:var(--sub);}
.sumv{color:var(--green);font-weight:800;}
.sumcell{background:rgba(52,211,153,.05);}

.foot-note{font-size:11px;color:var(--sub);margin-top:16px;line-height:1.7;text-align:center;}
.notreg{max-width:440px;margin:40px auto;background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:32px 26px;text-align:center;}

@media print{
  body{background:#fff;color:#000;}
  .tools,.tbtn{display:none!important;}
  .scard,.tbl-wrap,.rpt-head{border-color:#bbb;}
  .scard{background:#f4f6fa;} thead th{background:#eef1f6;color:#333;}
  .rpt-vendor,.scard .v,.num{color:#000!important;}
}
@media(max-width:640px){
  .wrap{padding:14px 10px;}
  .rpt-vendor{font-size:22px;} .cards{gap:7px;} .scard{padding:14px 8px;} .scard .v{font-size:22px;} .scard .l{font-size:10px;}
  thead th,tbody td,tfoot td{padding:8px 5px;font-size:11.5px;}
  thead th{letter-spacing:0;}
  .num .u,.qty-toggle .u{display:none;}   /* 단위 숨겨 폭 절약 — 헤더로 구분 */
  .loose-inp{width:46px;padding:6px 4px;font-size:12px;}
  .qty-toggle{font-size:12px;gap:2px;}
  .pn{font-size:12px;}
  .detail-row td{padding:0 10px 10px!important;}
  .restock{font-size:9px;padding:2px 6px 2px 5px;margin-left:0;margin-top:4px;}
}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="center"><div class="spinner"></div>현황 불러오는 중...</div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAM2t9dvtStrXNam-YAiq19yD8FHwKpPmI",
  authDomain:"makewon.com",
  databaseURL:"https://makechango-wms-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"makechango-wms",
  storageBucket:"makechango-wms.firebasestorage.app",
  messagingSenderId:"333385336098",
  appId:"1:333385336098:web:94f07492421965ab32917b"
});
var auth=firebase.auth(), db=firebase.database();
var app=document.getElementById('app');

function emKey(em){ return String(em||'').trim().toLowerCase().replace(/\./g,','); }
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function nf(n){return (n==null?0:n).toLocaleString('ko-KR');}
function fmtTime(ts){
  if(!ts) return '—';
  try{ var d=new Date(ts);
    var p=function(x){return (x<10?'0':'')+x;};
    return d.getFullYear()+'.'+p(d.getMonth()+1)+'.'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());
  }catch(e){return '—';}
}

function renderNotRegistered(email){
  app.innerHTML='<div class="notreg">'
   +'<div style="font-size:46px;margin-bottom:14px;">🔒</div>'
   +'<div style="font-size:18px;font-weight:800;margin-bottom:8px;">거래처 담당자로 등록되어 있지 않습니다</div>'
   +'<div style="font-size:13px;color:var(--sub);line-height:1.7;">현재 로그인: <b style="color:var(--tx);">'+esc(email)+'</b><br>'
   +'이 이메일은 아직 어떤 업체의 담당자로 등록되지 않았습니다.<br>창고 관리자에게 담당자 등록을 요청해 주세요.</div>'
   +'<button class="tbtn" style="margin-top:22px;" onclick="doLogout()">로그아웃</button>'
   +'</div>';
}

var _sortMode='qty';     /* qty | pallet | name */
var _expanded={};        /* productKey -> true (펼침 상태 유지) */
var _lastInfo=null, _lastData=null;
var _loose={};           /* productKey -> 낱개수량 (실물조사). vendorLoose 노드 */
var _baseTotalQty=0;     /* 파렛트 기준 총수량 합 (낱개 제외) — 실시간 총합계 계산용 */
var _canEdit=false;      /* 관리자 미리보기에서만 낱개 입력 가능 */
var _rows=[];            /* 현재 표시 중인 행 (엑셀 내보내기용) */

function sortRows(rows){
  var r=rows.slice();
  if(_sortMode==='name') r.sort(function(a,b){return String(a.name).localeCompare(String(b.name),'ko');});
  else if(_sortMode==='pallet') r.sort(function(a,b){return (b.pallets||0)-(a.pallets||0);});
  else r.sort(function(a,b){return (b.totalQty||0)-(a.totalQty||0);});
  return r;
}

function detailHtml(p){
  var bd=p.breakdown;
  if(!bd || !bd.length){
    if((p.totalQty||0)===0 && (p.pallets||0)===0){ return '<div class="bd-empty" style="color:#FCA5A5;">현재 재고가 없습니다 — 보충이 필요합니다.</div>'; }
    return '<div class="bd-empty">세부 적재구성 정보가 아직 없습니다. (창고관리 갱신 후 표시)</div>';
  }
  var lines=bd.map(function(b){
    return '<div class="bd-line"><span class="bd-l">'+nf(b.qty)+'개 × '+nf(b.pallets)+'팔</span>'
      +'<span class="bd-r">= '+nf((b.qty||0)*(b.pallets||0))+'개</span></div>';
  }).join('');
  return '<div class="bd-box">'+lines
    +'<div class="bd-total">총 '+nf(p.totalQty)+'개 · '+nf(p.pallets)+'팔</div></div>';
}

function restockBtn(p){
  return '<button class="restock" title="재고 보충 요망" onclick="event.stopPropagation();restockInfo(\''+encodeURIComponent(p.name)+'\','+(p.pallets||0)+')">'
    +'<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>'
    +'재고보충요망</button>';
}

function renderReport(info, data){
  _lastInfo=info; _lastData=data;
  _canEdit=!!(info && info._admin);
  var vendorName=info.vendorName||'우리 업체';
  var products=(data && data.products) || {};
  var rows=Object.keys(products).map(function(k){ return Object.assign({_k:k}, products[k]); })
    .filter(function(p){return p && p.name;});
  rows=sortRows(rows);
  _rows=rows;

  var totQty=0, totPal=0, totLoose=0;
  rows.forEach(function(p){ totQty+=(+p.totalQty||0); totPal+=(+p.pallets||0); totLoose+=(+(_loose[p._k])||0); });
  _baseTotalQty=totQty;
  var grand=totQty+totLoose;

  function sbtn(mode,label){ return '<button class="sortbtn'+(_sortMode===mode?' active':'')+'" onclick="setSort(\''+mode+'\')">'+label+'</button>'; }
  var sortbar='<div class="sortbar"><span class="sortlabel">정렬</span>'
    +sbtn('qty','수량 많은순')+sbtn('pallet','파렛트순')+sbtn('name','이름순')+'</div>';

  var looseHint=_canEdit
    ? '<div class="loose-hint">✍ <b>낱개수량</b> 칸에 실물조사 수량을 입력하면 <b>총합계</b>에 즉시 합산·저장됩니다. (관리자 전용)</div>'
    : '';

  var body = rows.length===0
    ? '<div class="empty">현재 재고에 등록된 상품이 없습니다.<br><span style="font-size:12px;">창고에서 입고가 이루어지면 자동으로 표시됩니다.</span></div>'
    : sortbar+looseHint+'<div class="tbl-wrap"><table>'
        +'<thead><tr><th class="l">상품명</th><th>파렛트</th><th>총수량</th><th class="loosehead">낱개수량</th><th>총합계</th></tr></thead>'
        +'<tbody>'
        + rows.map(function(p,i){
            var low=(p.pallets||0)<=2;   /* 재고보충요망 임계값: 파렛트 2개 이하 */
            var open=!!_expanded[p._k];
            var loose=(+(_loose[p._k])||0);
            var rowSum=(+p.totalQty||0)+loose;
            var nameCell='<span class="pn">'+esc(p.name)+'</span>'+(low?restockBtn(p):'');
            var palCell='<span class="num'+(low?' low':'')+'">'+nf(p.pallets)+'<span class="u">팔</span></span>';
            var qtyCell='<button class="qty-toggle'+(open?' open':'')+'" onclick="toggleDetail(\''+encodeURIComponent(p._k)+'\')">'
              +nf(p.totalQty)+'<span class="u">개</span><span class="caret">'+(open?'▴':'▾')+'</span></button>';
            var looseCell=_canEdit
              ? '<input type="number" min="0" inputmode="numeric" class="loose-inp" id="loose-'+i+'" value="'+(loose||'')+'" placeholder="0" '
                +'oninput="onLooseInput('+i+',\''+encodeURIComponent(p._k)+'\','+(+p.totalQty||0)+')" onchange="saveLoose(\''+encodeURIComponent(p._k)+'\')">'
              : '<span class="num loosero">'+(loose?nf(loose):'—')+(loose?'<span class="u">개</span>':'')+'</span>';
            var sumCell='<span class="num sumv" id="sum-'+i+'">'+nf(rowSum)+'<span class="u">개</span></span>';
            var tr='<tr class="prow'+(low?' lowrow':'')+'"><td class="l">'+nameCell+'</td>'
              +'<td class="num">'+palCell+'</td>'
              +'<td class="num qcell">'+qtyCell+'</td>'
              +'<td class="num loosecell">'+looseCell+'</td>'
              +'<td class="num sumcell">'+sumCell+'</td></tr>';
            var det= open ? '<tr class="detail-row"><td colspan="5">'+detailHtml(p)+'</td></tr>' : '';
            return tr+det;
          }).join('')
        +'</tbody>'
        +'<tfoot><tr><td class="l">합계 · '+rows.length+'개 품목</td>'
          +'<td class="num">'+nf(totPal)+'<span class="u">팔</span></td>'
          +'<td class="num">'+nf(totQty)+'<span class="u">개</span></td>'
          +'<td class="num" id="footLoose">'+nf(totLoose)+'<span class="u">개</span></td>'
          +'<td class="num sumv" id="footSum">'+nf(grand)+'<span class="u">개</span></td></tr></tfoot>'
        +'</table></div>';

  var titleLine=_canEdit
    ? '<div class="rpt-title">👁 관리자 미리보기 · 재고 현황</div>'
    : '<div class="rpt-title">재고 현황 보고서</div>';
  var rightBtns=_canEdit
    ? '<button class="tbtn" onclick="exportExcel()">📊 엑셀</button>'
      +'<button class="tbtn" onclick="window.print()">🖨 인쇄</button>'
      +'<button class="tbtn" onclick="location.href=\'/wms_vendors.html?gid='+encodeURIComponent(info.gid||'')+'\'">‹ 업체관리</button>'
    : '<button class="tbtn" onclick="exportExcel()">📊 엑셀</button>'
      +'<button class="tbtn" onclick="window.print()">🖨 인쇄</button>'
      +'<button class="tbtn" onclick="doLogout()">로그아웃</button>';
  app.innerHTML=
    '<div class="rpt-head">'
    +'<div>'+titleLine+'<div class="rpt-vendor">'+esc(vendorName)+'</div></div>'
    +'<div class="rpt-meta">기준시각 <b>'+fmtTime(data&&data.updatedAt)+'</b><br>메이크창고 WMS'
    +'<div class="tools">'+rightBtns+'</div></div>'
    +'</div>'
    +'<div class="cards">'
    +'<div class="scard a"><div class="v">'+nf(rows.length)+'</div><div class="l">상품 품목</div></div>'
    +'<div class="scard b"><div class="v" id="grandTotal">'+nf(grand)+'</div><div class="l">총 재고수량 (낱개포함)</div></div>'
    +'<div class="scard c"><div class="v">'+nf(totPal)+'</div><div class="l">총 파렛트 (팔)</div></div>'
    +'</div>'
    + body
    +'<div class="foot-note">본 현황은 창고 운영 상황에 따라 갱신됩니다. 낱개수량은 실물조사 기준 관리자 입력값입니다. 유통기한·보관위치 등 상세 정보는 제공되지 않습니다.<br>© 2026 Makemine Design · 메이크창고 WMS</div>';
}

function setSort(mode){ _sortMode=mode; if(_lastInfo) renderReport(_lastInfo,_lastData); }
window.setSort=setSort;
function toggleDetail(encKey){ var k=decodeURIComponent(encKey); _expanded[k]=!_expanded[k]; if(_lastInfo) renderReport(_lastInfo,_lastData); }
window.toggleDetail=toggleDetail;
function restockInfo(encName, pallets){ var nm=decodeURIComponent(encName); alert('📦 재고 보충 요망\n\n['+nm+'] 현재 파렛트 '+pallets+'개 — 보충이 필요합니다.'); }
window.restockInfo=restockInfo;

/* 낱개수량 입력(관리자 전용) — 입력 즉시 총합계/총재고 갱신, blur 시 저장 */
function onLooseInput(i, encKey, totalQty){
  var el=document.getElementById('loose-'+i); if(!el) return;
  var v=parseInt(el.value,10); if(isNaN(v)||v<0){ v=0; }
  var k=decodeURIComponent(encKey);
  _loose[k]=v;
  var sc=document.getElementById('sum-'+i);
  if(sc) sc.innerHTML=nf((+totalQty||0)+v)+'<span class="u">개</span>';
  updateGrand();
}
window.onLooseInput=onLooseInput;

function updateGrand(){
  var sumLoose=0;
  var inps=document.querySelectorAll('.loose-inp');
  for(var j=0;j<inps.length;j++){ sumLoose += (parseInt(inps[j].value,10)||0); }
  var g=document.getElementById('grandTotal'); if(g) g.innerHTML=nf(_baseTotalQty+sumLoose);
  var fl=document.getElementById('footLoose'); if(fl) fl.innerHTML=nf(sumLoose)+'<span class="u">개</span>';
  var fs=document.getElementById('footSum'); if(fs) fs.innerHTML=nf(_baseTotalQty+sumLoose)+'<span class="u">개</span>';
}

function saveLoose(encKey){
  if(!_lastInfo || !_lastInfo.gid || !_lastInfo.vendorId) return;
  var k=decodeURIComponent(encKey);
  var v=(+_loose[k]||0);
  var ref=db.ref('vendorLoose/'+_lastInfo.gid+'/'+_lastInfo.vendorId+'/'+k);
  (v>0 ? ref.set(v) : ref.remove()).catch(function(e){ console.warn('낱개 저장 실패', e); });
}
window.saveLoose=saveLoose;

function doLogout(){ auth.signOut().then(function(){ location.replace('/wms_login.html'); }); }
window.doLogout=doLogout;

/* 현황 엑셀(.xlsx) 내보내기 — 세부 적재구성 제외, 5컬럼 + 합계만 */
function dateStamp(){ var d=new Date(); var p=function(x){return (x<10?'0':'')+x;}; return ''+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate()); }
function exportExcel(){
  if(typeof XLSX==='undefined'){ alert('엑셀 모듈을 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.'); return; }
  var info=_lastInfo||{}, data=_lastData||{};
  var vendorName=info.vendorName||'업체';
  var totPal=0, totQty=0, totLoose=0;
  var aoa=[];
  aoa.push(['재고 현황 보고서']);
  aoa.push(['업체', vendorName]);
  aoa.push(['기준시각', fmtTime(data.updatedAt)]);
  aoa.push([]);
  aoa.push(['상품명','파렛트(팔)','총수량(개)','낱개수량(개)','총합계(개)']);
  (_rows||[]).forEach(function(p){
    var loose=(+(_loose[p._k])||0);
    var pal=(+p.pallets||0), qty=(+p.totalQty||0), sum=qty+loose;
    totPal+=pal; totQty+=qty; totLoose+=loose;
    aoa.push([p.name, pal, qty, loose, sum]);
  });
  aoa.push(['합계', totPal, totQty, totLoose, totQty+totLoose]);
  var ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:24},{wch:11},{wch:12},{wch:12},{wch:14}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '재고현황');
  var fname=String(vendorName).replace(/[\\\/:*?"<>|]/g,'_')+'_재고현황_'+dateStamp()+'.xlsx';
  XLSX.writeFile(wb, fname);
}
window.exportExcel=exportExcel;

/* 업체 담당자 본인 — 이메일로 자기 업체 현황 (vendorStatus 요약본 실시간) */
function loadOwnByEmail(user){
  var ek=emKey(user.email);
  db.ref('vendorByEmail/'+ek).get().then(function(snap){
    if(!snap.exists()){ renderNotRegistered(user.email); return; }
    var info=snap.val();
    var lastStatus=null;
    function rerender(){ if(lastStatus!==null) renderReport(info, lastStatus); }
    /* 낱개수량 먼저 구독(읽기전용) */
    db.ref('vendorLoose/'+info.gid+'/'+info.vendorId).on('value', function(s){ _loose=s.val()||{}; rerender(); }, function(){ /* 낱개 읽기 실패 무시 */ });
    db.ref('vendorStatus/'+info.gid+'/'+info.vendorId).on('value', function(s){ lastStatus=s.val()||{}; rerender(); }, function(err){
      app.innerHTML='<div class="center" style="color:#F87171;">현황을 불러오지 못했습니다: '+esc(err.message)+'</div>';
    });
  }).catch(function(e){
    app.innerHTML='<div class="center" style="color:#F87171;">확인 실패: '+esc(e.message)+'</div>';
  });
}

/* 관리자·멤버 미리보기 — 창고 원본으로 즉시 계산해 담당자와 동일 화면 표시(+요약본 갱신) */
function loadAdminPreview(user, gid, vid){
  if(!window.WMSVendorProjection){ app.innerHTML='<div class="center" style="color:#F87171;">집계 모듈 로드 실패</div>'; return; }
  Promise.all([
    db.ref('vendorConfig/'+gid+'/vendors/'+vid).get(),
    db.ref('vendorConfig/'+gid+'/map').get(),
    db.ref('groups/'+gid).get(),
    db.ref('vendorLoose/'+gid+'/'+vid).get()
  ]).then(function(r){
    if(!r[0].exists()){ app.innerHTML='<div class="center" style="color:#F87171;">업체를 찾을 수 없습니다.</div>'; return; }
    var vendorName=(r[0].val()||{}).name||'업체';
    var map=r[1].val()||{};
    _loose=r[3].val()||{};
    var wids=r[2].exists()?Object.keys(r[2].val()).filter(function(k){return k!=='_init';}):[];
    Promise.all(wids.map(function(wid){ return db.ref('warehouses/'+wid).get().then(function(s){return s.val();}).catch(function(){return null;}); }))
    .then(function(whs){
      whs=whs.filter(Boolean);
      var agg=window.WMSVendorProjection.aggregate(whs), kf=window.WMSVendorProjection.keyOf;
      var products={};
      Object.keys(map).forEach(function(k){
        var e=map[k];
        if(!e || e.vendorId!==vid || !e.name) return;
        var a=agg[e.name];
        products[k]= a
          ? {name:e.name, totalQty:a.totalQty, pallets:a.pallets, breakdown:a.breakdown}
          : {name:e.name, totalQty:0, pallets:0, breakdown:[]};
      });
      renderReport({vendorName:vendorName, _admin:true, gid:gid, vendorId:vid}, {products:products, updatedAt:Date.now()});
      /* 저장된 요약본도 최신으로 갱신(담당자 화면도 같이 최신화) */
      if(window.WMSVendorProjection.sync) window.WMSVendorProjection.sync(gid, whs, db);
    });
  }).catch(function(e){
    app.innerHTML='<div class="center" style="color:#F87171;">미리보기 권한이 없거나 로드 실패: '+esc(e.message)+'</div>';
  });
}

auth.onAuthStateChanged(function(user){
  if(!user){ location.replace('/wms_login.html?return='+encodeURIComponent('/vendor_status.html'+location.search)); return; }
  var qs=new URLSearchParams(location.search), gid=qs.get('gid'), vid=qs.get('vid');
  if(gid && vid){
    /* 슈퍼관리자 또는 해당 그룹 멤버만 미리보기 — 아니면 일반 담당자 경로로 */
    db.ref('superadmins/'+user.uid).get().then(function(a){
      if(a.exists()){ loadAdminPreview(user, gid, vid); return; }
      db.ref('userGroup/'+user.uid).get().then(function(g){
        if(g.exists() && g.val()===gid){ loadAdminPreview(user, gid, vid); }
        else { loadOwnByEmail(user); }
      }).catch(function(){ loadOwnByEmail(user); });
    }).catch(function(){ loadOwnByEmail(user); });
  } else {
    loadOwnByEmail(user);
  }
});
</script>
