function normalizeWH(raw){
  if(!raw||!raw.id)return null;
  var wh=Object.assign({inQ:[],history:[],undoStack:[],pColors:{},sheetsUrl:'',pendOut:[]},raw);
  if(!Array.isArray(wh.inQ))wh.inQ=[];
  if(!Array.isArray(wh.history))wh.history=[];
  if(!Array.isArray(wh.undoStack))wh.undoStack=[];
  wh.undoStack=[];
  if(!Array.isArray(wh.pendOut))wh.pendOut=[];
  if(!wh.pColors||typeof wh.pColors!=='object')wh.pColors={};
  var cells={};
  for(var r=0;r<(wh.rows||0);r++){
    for(var c=0;c<(wh.cols||0);c++){
      var key=r+'-'+c;
      var cell=(wh.cells&&wh.cells[key])||{};
      var dR=cell.divR||1,dC=cell.divC||1;
      var slots={};
      for(var sr=0;sr<dR;sr++)for(var sc=0;sc<dC;sc++){
        var sk=sr+'-'+sc;
        slots[sk]=(cell.slots&&cell.slots[sk]!==undefined)?cell.slots[sk]:null;
      }
      cells[key]={type:cell.type||null,divR:dR,divC:dC,slots:slots};
    }
  }
  wh.cells=cells;
  return wh;
}

function dbSaveOne(wh){
  var payload=Object.assign({},wh);delete payload.undoStack;
  var ref=fbDb.ref(WH_PATH+'/'+wh.id);
  ref.child('undoStack').remove().catch(function(){});
  ref.set(payload).catch(function(e){console.warn('dbSaveOne',e);});
}
function dbDeleteOne(id){fbDb.ref(WH_PATH+'/'+id).remove().catch(function(e){console.warn('dbDeleteOne',e);});}
function dbOff(){_listeners.forEach(function(l){l.ref.off(l.evt);});_listeners=[];if(_pt){clearInterval(_pt);_pt=null;}}
function dbListen(cb){
  dbOff();

function dbListenGroup(wids,cb){

}

function calcSt(wh){var tot=0,used=0;Object.values(wh.cells||{}).forEach(function(c){if(!c)return;if(c.type==='rack'||c.type==='shelf'){tot+=((c.divR||1)*(c.divC||1));used+=Object.values(c.slots||{}).filter(Boolean).length;}});return{tot:tot,used:used,free:tot-used};}
function getPG(wh,cells){var src=cells||wh.cells||{},m={};Object.values(src).forEach(function(c){if(!c)return;Object.values(c.slots||{}).forEach(function(s){if(!s)return;var clr=(wh.pColors&&wh.pColors[s.name])||'#94A3B8';if(!m[s.name])m[s.name]={name:s.name,cnt:0,totalQty:0,clr:clr,exps:{}};m[s.name].cnt++;m[s.name].totalQty+=s.qty||0;var ek=s.exp||'';if(!m[s.name].exps[ek])m[s.name].exps[ek]={exp:ek,cnt:0,totalQty:0};m[s.name].exps[ek].cnt++;m[s.name].exps[ek].totalQty+=s.qty||0;});});return Object.values(m).map(function(p){return Object.assign({},p,{exps:Object.values(p.exps).sort(function(a,b){if(!a.exp)return 1;if(!b.exp)return -1;return a.exp.localeCompare(b.exp);})});});}

function setClrMap(existing,key,val){var n=Object.assign({},existing);n[key]=val;return n;}

function rowC(arr){return arr.map(qC).join(',');}

function buildStructureCSV(wh,cells,label){
  var src=cells||wh.cells||{};
  var CTYPE={rack:'랙',shelf:'보관',empty:'빈공간',unused:'미사용'};
  var lines=[];
  lines.push(rowC(['#'+wh.name,wh.rows,wh.cols,label||'현재상태']));
  lines.push(rowC(['행','열','셀타입','분할','상품명','유통기한','수량']));
  for(var r=0;r<wh.rows;r++){
    for(var c=0;c<wh.cols;c++){
      var cell=src[r+'-'+c];
      var colLabel=String.fromCharCode(65+c);
      if(c>=26)colLabel=String.fromCharCode(65+Math.floor(c/26)-1)+String.fromCharCode(65+(c%26));
      var rowLabel=String(r+1);
      if(!cell||!cell.type){lines.push(rowC([rowLabel,colLabel,'','','','','']));continue;}
      var typeLabel=CTYPE[cell.type]||cell.type;
      var dR=cell.divR||1,dC=cell.divC||1;
      var divLabel=dR+'×'+dC;
      if(dR===1&&dC===1){
        var slot=cell.slots&&cell.slots['0-0'];
        if(slot){lines.push(rowC([rowLabel,colLabel,typeLabel,divLabel,slot.name,slot.exp?fmtExp(slot.exp):'',slot.qty||0]));}
        else{lines.push(rowC([rowLabel,colLabel,typeLabel,divLabel,'','','']]);}
      }else{
        for(var sr=0;sr<dR;sr++){
          for(var sc=0;sc<dC;sc++){
            var slotLabel=String(sr+1)+'-'+String(sc+1);
            var divFull=divLabel+' ('+slotLabel+')';
            var s2=cell.slots&&cell.slots[sr+'-'+sc];
            if(s2){lines.push(rowC([rowLabel,colLabel,typeLabel,divFull,s2.name,s2.exp?fmtExp(s2.exp):'',s2.qty||0]));}
            else{lines.push(rowC([rowLabel,colLabel,typeLabel,divFull,'','','']));}
          }
        }
      }
    }
  }
  return '\uFEFF'+lines.join('\r\n');
}

function parseStructureCSV(text){
  var raw=text.replace(/^\uFEFF/,'');
  function parseCSVLine(line){
    var fields=[],cur='',inQ=false;
    for(var i=0;i<line.length;i++){
      var ch=line[i];
      if(inQ){if(ch==='"'&&line[i+1]==='"'){cur+='"';i++;}else if(ch==='"'){inQ=false;}else cur+=ch;}
      else{if(ch==='"'){inQ=true;}else if(ch===','){fields.push(cur);cur='';}else cur+=ch;}
    }
    fields.push(cur);
    return fields;
  }
  var lines=raw.split(/\r?\n/).filter(function(l){return l.trim();});
  if(!lines.length)return null;
  var meta=parseCSVLine(lines[0]);
  if(!meta[0]||!meta[0].startsWith('#'))return null;
  var whName=meta[0].slice(1);
  var rows=parseInt(meta[1],10),cols=parseInt(meta[2],10);
  if(isNaN(rows)||isNaN(cols)||rows<1||cols<1)return null;
  var label=meta[3]||'가져오기';
  var dataLines=lines.slice(2);
  function colIdx(lbl){
    var s=(lbl||'').trim().toUpperCase();
    if(s.length===1)return s.charCodeAt(0)-65;
    if(s.length===2)return (s.charCodeAt(0)-64)*26+(s.charCodeAt(1)-65);
    return NaN;
  }
  var cells={};
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)cells[r+'-'+c]={type:null,divR:1,divC:1,slots:{'0-0':null}};
  var RTYPE={'랙':'rack','보관':'shelf','빈공간':'empty','미사용':'unused'};
  var errors=[];
  dataLines.forEach(function(line,li){
    var p=parseCSVLine(line);
    if(p.length<4)return;
    var rowNum=parseInt(p[0],10)-1;
    var colNum=colIdx(p[1]);
    if(isNaN(rowNum)||isNaN(colNum)||rowNum<0||rowNum>=rows||colNum<0||colNum>=cols){errors.push((li+3)+'행: 좌표오류 ('+p[0]+','+p[1]+')');return;}
    var typeRaw=(p[2]||'').trim();
    var type=RTYPE[typeRaw]||null;
    var key=rowNum+'-'+colNum;
    var divRaw=(p[3]||'').trim();
    var dR=1,dC=1,sr=0,sc=0;
    var dmatch=divRaw.match(/^(\d+)[×x](\d+)/);
    if(dmatch){dR=parseInt(dmatch[1],10)||1;dC=parseInt(dmatch[2],10)||1;}
    var smatch=divRaw.match(/\((\d+)-(\d+)\)/);
    if(smatch){sr=parseInt(smatch[1],10)-1;sc=parseInt(smatch[2],10)-1;}
    var existing=cells[key];
    if(!existing.type&&type){
      var slots={};
      for(var i=0;i<dR;i++)for(var j=0;j<dC;j++)slots[i+'-'+j]=null;
      cells[key]={type:type,divR:dR,divC:dC,slots:slots};
    }
    var name=(p[4]||'').trim();
    var expRaw=(p[5]||'').trim();
    var qty=parseInt(p[6],10)||0;
    if(name&&qty>0){
      var exp='';
      if(expRaw){var em=expRaw.replace(/[.\-]/g,'');if(em.length===8)em=em.slice(2);if(/^\d{6}$/.test(em))exp=em;}
      var sKey=sr+'-'+sc;
      if(cells[key].slots)cells[key].slots[sKey]={id:uid(),name:name,qty:qty,exp:exp};
    }
  });
  return{rows:rows,cols:cols,cells:cells,label:label,whName:whName,errors:errors};
}

          }else{
            dbListen(function(arr){setWhs(arr);try{localStorage.setItem('wms_bak',JSON.stringify(arr));}catch(e){}});
