<!DOCTYPE html>
<html lang="ko">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CJKYQB2TTY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-CJKYQB2TTY');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="픽앤톡">
<meta name="theme-color" content="#0f1117">
<title>픽앤톡 · 메이크원</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#0f1117;color:#e8eaf0;user-select:none;-webkit-user-select:none}
input,textarea,select{user-select:text;-webkit-user-select:text;font-family:inherit}
:root{
  --bg:#0f1117;--s1:#161b26;--s2:#1e2333;--br:#252b3b;
  --g:#4af0a8;--y:#f0c44a;--b:#5b9cf6;--r:#f05858;--p:#c084fc;--o:#ff8c5a;--mu:#7c8399;
  --tx:#e8eaf0;--mo:'Courier New',monospace;
  --safe-top:env(safe-area-inset-top,0);
  --safe-bot:env(safe-area-inset-bottom,0);
}
.app{display:flex;flex-direction:column;height:100dvh;height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(.7rem + var(--safe-top)) 1rem .7rem;background:linear-gradient(135deg,#1f2937,#374151);color:#fff;flex-shrink:0;border-bottom:1px solid var(--br)}
.topbar-l{display:flex;align-items:center;gap:.55rem;min-width:0}
.brand-ico{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.brand-name{font-size:1rem;font-weight:900;letter-spacing:-.01em;line-height:1.1}
.brand-sub{font-size:.58rem;color:rgba(255,255,255,.5);font-family:var(--mo);letter-spacing:.05em}
.user-pill{display:flex;align-items:center;gap:.4rem;font-size:.7rem;color:rgba(255,255,255,.78);padding:.32rem .6rem;border:1px solid rgba(255,255,255,.18);border-radius:999px;max-width:170px;cursor:pointer}
.user-name{max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-dot{width:6px;height:6px;border-radius:50%;background:#666;flex-shrink:0}
.user-dot.on{background:#4af0a8}

main{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}
.tab-screen{flex:1;display:none;overflow-y:auto;padding-bottom:calc(72px + var(--safe-bot));-webkit-overflow-scrolling:touch}
.tab-screen.on{display:flex;flex-direction:column}

/* ─── 상단 필터 칩 (줄바꿈 — 1~2줄 자동) ─── */
.filter-strip{flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--br);padding:.42rem .55rem}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;justify-content:flex-start;align-content:flex-start;max-height:6rem;overflow-y:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.f-chip{flex:0 0 auto;background:var(--s2);border:1.4px solid var(--br);color:var(--mu);font-size:.7rem;font-weight:700;padding:.32rem .58rem;border-radius:999px;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:.2rem;line-height:1.15}
.f-chip.on{background:rgba(74,240,168,.12);border-color:var(--g);color:var(--g)}
/* 항목 많을 때 한 줄에 더 들어가게 — 컴팩트 모드 (10개 이상) */
.filter-row.compact .f-chip{font-size:.64rem;padding:.28rem .5rem;gap:.16rem}

/* 목록 카드 */
.list-body{padding:.6rem .8rem 0}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-bottom:.7rem}
.sum-c{background:var(--s1);border:1px solid var(--br);border-radius:9px;padding:.5rem .6rem;display:flex;flex-direction:column;align-items:center;gap:.16rem}
.sum-l{font-size:.6rem;color:var(--mu);font-family:var(--mo);letter-spacing:.04em}
.sum-v{font-size:1.3rem;font-weight:900}
.feed-list{display:flex;flex-direction:column;gap:.5rem}
.feed-card{background:var(--s1);border:1px solid var(--br);border-left:4px solid var(--mu);border-radius:10px;padding:.7rem .85rem;display:flex;flex-direction:column;gap:.42rem;position:relative}
.fc-row1{display:flex;align-items:center;justify-content:space-between;gap:.5rem;min-width:0}
.fc-cat{display:inline-flex;align-items:center;gap:.32rem;font-size:.78rem;font-weight:800;min-width:0;flex:1}
.fc-cat .ic{font-size:1rem}
.fc-cat .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fc-time{font-size:.66rem;color:var(--mu);font-family:var(--mo);flex-shrink:0}
.fc-title{font-size:.95rem;font-weight:800;color:var(--tx);line-height:1.4;letter-spacing:-.01em;word-break:break-all}
.fc-meta{display:flex;flex-wrap:wrap;gap:.32rem;font-size:.7rem}
.fc-meta .m-pill{padding:.16rem .55rem;border-radius:5px;font-weight:700;letter-spacing:-.005em}
.fc-meta .m-date{background:rgba(91,156,246,.14);color:var(--b);font-family:var(--mo)}
.fc-meta .m-time{background:rgba(91,156,246,.10);color:var(--b);font-family:var(--mo)}
.fc-meta .m-vendor{background:rgba(255,140,90,.14);color:var(--o)}
.fc-meta .m-status{background:rgba(192,132,252,.14);color:var(--p)}
.fc-meta .m-complete{background:rgba(74,240,168,.14);color:var(--g)}
.fc-note{font-size:.78rem;color:var(--tx);line-height:1.5;background:rgba(255,255,255,.03);border-radius:5px;padding:.42rem .55rem;border-left:2px solid var(--br)}
.fc-by{font-size:.64rem;color:var(--mu);font-family:var(--mo);display:flex;align-items:center;gap:.32rem;margin-top:.18rem}
.fc-by-name{color:rgba(232,234,240,.7);font-family:inherit;font-weight:700}
.fc-del{position:absolute;top:.5rem;right:.55rem;background:transparent;border:1px solid rgba(240,88,88,.4);color:var(--r);font-size:.7rem;padding:.16rem .42rem;border-radius:4px;cursor:pointer}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 1rem;color:var(--mu)}
.empty-ico{font-size:3rem;opacity:.45;margin-bottom:.7rem}
.empty-msg{font-size:.92rem;line-height:1.5}
.empty-sub{font-size:.74rem;margin-top:.45rem;color:rgba(124,131,153,.7)}
.loading{display:flex;align-items:center;justify-content:center;padding:2rem;color:var(--mu);font-size:.86rem}

/* ─── 캘린더 ─── */
.cal-head{display:flex;align-items:center;justify-content:space-between;padding:.85rem .9rem .6rem}
.cal-month{font-size:1.1rem;font-weight:900;letter-spacing:-.01em}
.cal-nav{display:flex;gap:.4rem}
.cal-nav button{background:var(--s2);border:1px solid var(--br);color:var(--tx);width:34px;height:34px;border-radius:6px;font-size:.9rem;font-weight:800;cursor:pointer}
.cal-nav button:active{transform:scale(.96)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 .55rem;background:var(--br);border-radius:8px;margin:0 .8rem;overflow:hidden}
.cal-dow,.cal-day{background:var(--s1);padding:.4rem .3rem;text-align:center;font-size:.74rem;min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;cursor:pointer;position:relative}
.cal-dow{min-height:auto;font-family:var(--mo);font-size:.6rem;color:var(--mu);font-weight:700;background:var(--s2);padding:.35rem 0;cursor:default}
.cal-dow.sun{color:var(--r)}.cal-dow.sat{color:var(--b)}
.cal-day{font-family:var(--mo);font-weight:700;color:var(--tx)}
.cal-day.mute{color:rgba(124,131,153,.5)}
.cal-day.today{background:rgba(74,240,168,.10);color:var(--g)}
.cal-day.sel{background:var(--g);color:#0f1117;font-weight:900}
.cal-day .dnum{font-size:.78rem}
.cal-day .dcnt{font-size:.6rem;font-weight:900;background:var(--b);color:#fff;border-radius:8px;padding:.04rem .35rem;margin-top:.18rem;min-width:18px}
.cal-day.sel .dcnt{background:#0f1117;color:#fff}
.cal-day.empty .dcnt{display:none}
.cal-day-list{padding:.7rem .8rem 0}
.cal-day-list-h{font-size:.76rem;font-family:var(--mo);color:var(--mu);letter-spacing:.05em;margin-bottom:.45rem}

/* ─── 설정 (정보 탭) ─── */
.set-body{padding:.8rem .8rem 0}
.set-sec{background:var(--s1);border:1px solid var(--br);border-radius:10px;padding:.85rem 1rem;margin-bottom:.8rem}
.set-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem}
.set-h-l{font-family:var(--mo);font-size:.72rem;letter-spacing:.06em;font-weight:800}
.set-add{background:var(--g);color:#0f1117;border:none;font-size:.74rem;font-weight:800;padding:.36rem .65rem;border-radius:5px;cursor:pointer}
.set-empty{padding:.6rem 0;color:var(--mu);font-size:.74rem;font-family:var(--mo)}
.set-list{display:flex;flex-direction:column;gap:.45rem}
.set-item{display:flex;align-items:center;gap:.5rem;padding:.5rem .65rem;background:var(--s2);border:1px solid var(--br);border-radius:7px}
.set-item-ic{font-size:1.1rem;flex-shrink:0}
.set-item-color{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.12)}
.set-item-name{flex:1;font-size:.86rem;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.set-item-info{font-size:.62rem;color:var(--mu);font-family:var(--mo)}
.set-item-act{display:flex;gap:.32rem}
.set-item-act button{background:transparent;border:1px solid var(--br);color:var(--mu);font-size:.7rem;padding:.18rem .45rem;border-radius:4px;cursor:pointer;font-weight:700}
.set-item-act .del{border-color:rgba(240,88,88,.4);color:var(--r)}
.set-readonly{padding:1.4rem 1rem;text-align:center;color:var(--mu);font-size:.86rem;background:var(--s1);border:1px dashed var(--br);border-radius:10px;margin:.8rem}

/* ─── 하단 탭바 (4탭 + 중앙 FAB) ─── */
.tabbar{position:fixed;left:0;right:0;bottom:0;height:calc(64px + var(--safe-bot));padding-bottom:var(--safe-bot);background:rgba(22,27,38,.92);backdrop-filter:blur(12px);border-top:1px solid var(--br);display:flex;align-items:stretch;z-index:50}
.tab-btn{flex:1;background:none;border:none;color:var(--mu);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.18rem;font-size:.62rem;font-weight:700;cursor:pointer;letter-spacing:.02em}
.tab-btn.on{color:var(--g)}
.tab-btn .ti{font-size:1.25rem;line-height:1}
.tab-btn.fab{position:relative;flex:0 0 80px}
.tab-btn.fab .fab-circle{position:absolute;top:-22px;left:50%;transform:translateX(-50%);width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--g),#3dd693);display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:#0f1117;box-shadow:0 8px 20px rgba(74,240,168,.4),0 0 0 4px rgba(15,17,23,.85)}
.tab-btn.fab:active .fab-circle{transform:translateX(-50%) scale(.96)}
.tab-btn.fab .fab-lbl{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:.6rem;color:var(--g);font-weight:800}

/* ─── 토스트 ─── */
.toast-wrap{position:fixed;left:0;right:0;top:calc(env(safe-area-inset-top,0) + 60px);z-index:300;display:flex;justify-content:center;padding:0 1rem;pointer-events:none;flex-direction:column;align-items:center;gap:.4rem}
.toast{background:var(--s2);color:var(--tx);border:1px solid var(--br);border-radius:8px;padding:.6rem .9rem;font-size:.84rem;font-weight:700;box-shadow:0 6px 18px rgba(0,0,0,.45);max-width:90%;animation:toastIn .2s ease-out;pointer-events:auto}
.toast.ok{background:rgba(74,240,168,.12);border-color:var(--g);color:var(--g)}
.toast.er{background:rgba(240,88,88,.12);border-color:var(--r);color:var(--r)}
.toast.warn{background:rgba(240,196,74,.12);border-color:var(--y);color:var(--y)}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* ─── 풀스크린 모달 (등록 + 편집) ─── */
.modal{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .25s cubic-bezier(.2,.7,.3,1);visibility:hidden}
.modal.open{transform:translateY(0);visibility:visible}
.m-hdr{flex-shrink:0;padding:calc(.7rem + var(--safe-top)) .9rem .7rem;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:.65rem;background:var(--s1)}
.m-x{background:transparent;border:none;color:var(--mu);font-size:1.4rem;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.m-title{flex:1;font-size:1rem;font-weight:900;letter-spacing:-.01em}
.m-step{font-family:var(--mo);font-size:.7rem;color:var(--mu);background:var(--s2);padding:.22rem .55rem;border-radius:4px;letter-spacing:.06em}
.m-body{flex:1;overflow-y:auto;padding:1rem .9rem 1.2rem;-webkit-overflow-scrolling:touch}
.m-h3{font-size:.78rem;color:var(--mu);font-family:var(--mo);letter-spacing:.06em;margin-bottom:.7rem;font-weight:800;display:flex;align-items:center;gap:.45rem}
.m-h3 .req{color:var(--r)}
.m-foot{flex-shrink:0;padding:.7rem .9rem calc(.8rem + var(--safe-bot));border-top:1px solid var(--br);background:var(--s1);display:flex;gap:.5rem}
.btn{padding:.85rem 1.2rem;border:none;border-radius:9px;font-size:.95rem;font-weight:800;cursor:pointer;letter-spacing:-.005em;transition:all .12s}
.btn-g{background:var(--g);color:#0f1117}
.btn-g:active{transform:scale(.97)}
.btn-g:disabled{opacity:.35;cursor:not-allowed}
.btn-s{background:var(--s2);color:var(--tx);border:1px solid var(--br)}
.btn-flex{flex:1}
.btn-r{background:transparent;color:var(--r);border:1.5px solid rgba(240,88,88,.5)}

/* 카테고리 그리드 (등록 1단계) */
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.55rem}
.cat-tile{aspect-ratio:1.3/1;background:var(--s1);border:2px solid var(--br);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.35rem;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;padding:.4rem}
.cat-tile:active{transform:scale(.97)}
.cat-tile.on{border-width:3px;background:rgba(255,255,255,.04)}
.cat-ic{font-size:2.1rem;line-height:1}
.cat-name{font-size:1rem;font-weight:900;letter-spacing:-.01em;text-align:center}

/* 동적 등록 폼 필드 */
.fld{display:flex;flex-direction:column;gap:.32rem;margin-bottom:1rem}
.fld-l{font-size:.74rem;color:var(--mu);font-family:var(--mo);letter-spacing:.04em;font-weight:800;display:flex;align-items:center;gap:.3rem}
.fld-l .req{color:var(--r)}
.fld-inp,.fld-sel{background:#0a0d13;color:var(--tx);border:1.5px solid var(--br);border-radius:8px;padding:.7rem .85rem;font-size:.95rem;outline:none;width:100%}
.fld-inp:focus,.fld-sel:focus{border-color:var(--g)}
.fld-inp.title{font-size:1.05rem;font-weight:700}
.fld-inp[type="date"],.fld-inp[type="time"]{font-family:var(--mo)}
.fld-area{min-height:84px;resize:vertical;line-height:1.5}
.fld-chips{display:flex;flex-wrap:wrap;gap:.36rem}
.fld-chip{background:var(--s1);border:1.5px solid var(--br);color:var(--tx);font-size:.86rem;font-weight:700;padding:.5rem .85rem;border-radius:8px;cursor:pointer;min-height:44px;display:inline-flex;align-items:center}
.fld-chip:active{transform:scale(.96)}
.fld-chip.on{background:rgba(74,240,168,.16);border-color:var(--g);color:var(--g)}
.fld-chip.none{color:var(--mu);font-style:italic}
.fld-hint{font-size:.66rem;color:var(--mu);font-family:var(--mo);margin-top:.18rem}

/* 설정 편집 폼 */
.set-form{display:flex;flex-direction:column;gap:.8rem}
.set-form .row{display:flex;gap:.55rem;flex-wrap:wrap}
.set-form .row > *{flex:1;min-width:120px}
.set-form input[type="text"],.set-form input[type="color"]{background:#0a0d13;color:var(--tx);border:1.5px solid var(--br);border-radius:8px;padding:.65rem .8rem;font-size:.9rem;outline:none;width:100%}
.set-form input[type="color"]{padding:.18rem;height:42px}
.set-form .toggle-row{display:flex;align-items:center;gap:.55rem;padding:.55rem .7rem;background:var(--s2);border:1px solid var(--br);border-radius:7px;cursor:pointer;font-size:.84rem;font-weight:700}
.set-form .toggle-row input{flex-shrink:0;width:18px;height:18px;accent-color:var(--g)}
.set-form .ic-row{display:grid;grid-template-columns:repeat(8,1fr);gap:.34rem}
.set-form .ic-pick{background:var(--s2);border:1.5px solid var(--br);color:var(--tx);font-size:1.1rem;padding:.45rem 0;border-radius:6px;cursor:pointer}
.set-form .ic-pick.on{background:rgba(74,240,168,.14);border-color:var(--g)}

@media(min-width:600px){
  .app{max-width:480px;margin:0 auto;border-left:1px solid var(--br);border-right:1px solid var(--br)}
  .modal{max-width:480px;left:50%;transform:translate(-50%,100%)}
  .modal.open{transform:translate(-50%,0)}
  .tabbar{max-width:480px;left:50%;transform:translateX(-50%)}
}
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="topbar-l">
      <div class="brand-ico">📋</div>
      <div>
        <div class="brand-name">픽앤톡</div>
        <div class="brand-sub" id="brandSub">PICK & TALK · v2</div>
      </div>
    </div>
    <div class="user-pill" onclick="doLogout()">
      <span class="user-dot" id="userDot"></span>
      <span class="user-name" id="userName">확인 중...</span>
    </div>
  </header>

  <main>
    <!-- ───────────── 캘린더 탭 ───────────── -->
    <section id="tabCal" class="tab-screen">
      <div class="cal-head">
        <div class="cal-month" id="calMonth">—</div>
        <div class="cal-nav">
          <button onclick="calStep(-1)" aria-label="이전 달">◀</button>
          <button onclick="calToToday()" aria-label="오늘로">●</button>
          <button onclick="calStep(1)" aria-label="다음 달">▶</button>
        </div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-day-list">
        <div class="cal-day-list-h" id="calDayHead">날짜를 선택하세요</div>
        <div class="feed-list" id="calDayList"></div>
      </div>
    </section>

    <!-- ───────────── 목록 탭 ───────────── -->
    <section id="tabList" class="tab-screen on">
      <div class="filter-strip">
        <div class="filter-row" id="filterRow"></div>
      </div>
      <div class="list-body">
        <div class="summary">
          <div class="sum-c"><div class="sum-l">오늘</div><div class="sum-v" id="todayN" style="color:var(--g)">0</div></div>
          <div class="sum-c"><div class="sum-l">이번주</div><div class="sum-v" id="weekN" style="color:var(--b)">0</div></div>
          <div class="sum-c"><div class="sum-l">전체</div><div class="sum-v" id="allN">0</div></div>
        </div>
        <div id="feedList" class="feed-list">
          <div class="loading">불러오는 중...</div>
        </div>
      </div>
    </section>

    <!-- ───────────── 정보(관리자 설정) 탭 ───────────── -->
    <section id="tabSet" class="tab-screen">
      <div id="setGate" class="set-readonly" style="display:none">
        ⛔ 관리 영역은 관리자만 사용할 수 있습니다.<br>변경이 필요하면 관리자에게 요청하세요.
      </div>
      <div id="setBody" class="set-body">
        <!-- 카테고리 -->
        <div class="set-sec">
          <div class="set-h">
            <div class="set-h-l" style="color:var(--g)">📂 카테고리 (아이콘 메뉴)</div>
            <button class="set-add" onclick="openCatEditor()">＋ 새 카테고리</button>
          </div>
          <div class="set-list" id="setCatList"></div>
        </div>
        <!-- 업체 -->
        <div class="set-sec">
          <div class="set-h">
            <div class="set-h-l" style="color:var(--o)">🏢 업체 / 거래처</div>

<script>
/* ───────── 상수 ───────── */
var ICON_PICKS = ['📥','📤','🚚','🏍️','🛒','📌','📦','🏷️','🔧','🛠️','🧰','✅','❌','⚠️','📝','📞','📧','💰','🔥','💡','🎯','🏁','📊','🗂️','🧾','🚀','⏰','📅','🚨','🧹','🧊','🌡️','🍱','💼','🚪','🔑','🪜'];
var DEFAULT_COLORS = ['#4af0a8','#f0c44a','#5b9cf6','#c084fc','#ff8c5a','#f05858','#7c8399','#34d399'];
var SEED_CATEGORIES = [
  { name:'입고', icon:'📥', color:'#4af0a8', fields:{ hasDate:true, hasTime:false, hasVendor:true, hasStatus:true, hasComplete:true, hasNote:true } },
  { name:'출고', icon:'📤', color:'#f05858', fields:{ hasDate:true, hasTime:false, hasVendor:true, hasStatus:true, hasComplete:true, hasNote:true } },
  { name:'화물', icon:'🚚', color:'#5b9cf6', fields:{ hasDate:true, hasTime:true,  hasVendor:true, hasStatus:false,hasComplete:true, hasNote:true } },
  { name:'퀵',   icon:'🏍️', color:'#c084fc', fields:{ hasDate:true, hasTime:true,  hasVendor:true, hasStatus:false,hasComplete:true, hasNote:true } },
  { name:'구매', icon:'🛒', color:'#ff8c5a', fields:{ hasDate:true, hasTime:false, hasVendor:true, hasStatus:false,hasComplete:true, hasNote:true } },
  { name:'기타', icon:'📌', color:'#7c8399', fields:{ hasDate:false,hasTime:false, hasVendor:false,hasStatus:false,hasComplete:false,hasNote:true } }
];
var SEED_COMPLETES = [
  { name:'미완료', color:'#7c8399' },
  { name:'미발송', color:'#f0c44a' },
  { name:'완료',   color:'#4af0a8' },
  { name:'보류',   color:'#5b9cf6' },
  { name:'중요',   color:'#f05858' }
];

/* ───────── 전역 상태 ───────── */
var groupId = null;
var isAdmin = false;
var logsRef = null, setRef = null;
var allLogs = [];
var settings = { categories:{}, vendors:{}, statuses:{}, completes:{}, seeded:false };
var curFilter = 'all'; /* all | mine | <categoryId> */
var curTab = 'list';
var regState = null; /* { step, catId, form } */
var editState = null; /* { kind, id (or null for new), data } */
var calCursor = new Date(); calCursor.setDate(1);
var calSelectedDate = null; /* YYYYMMDD */

/* ───────── 유틸 ───────── */
function escH(s){ if(s===null||s===undefined) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return escH(s).replace(/"/g,'&quot;'); }
function pad2(n){ n=String(n); return n.length<2 ? '0'+n : n; }
function getUserId(){ var u=window.WMSync&&WMSync.getUser(); return u?(u.email||u.uid):''; }
function getUserDisplay(){ var u=window.WMSync&&WMSync.getUser(); if(!u) return ''; if(u.displayName) return u.displayName; if(u.email) return u.email.split('@')[0]; return u.uid.slice(0,6); }
function ymd(ts){ var d=new Date(ts); return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function ymdInt(ts){ var d=new Date(ts); return d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate(); }
function dateToYmdInt(dStr){ if(!dStr) return 0; var p=dStr.split('-'); return (+p[0])*10000+(+p[1])*100+(+p[2]); }
function ymdIntToDateStr(yi){ if(!yi) return ''; var y=Math.floor(yi/10000), m=Math.floor((yi%10000)/100), d=yi%100; return y+'-'+pad2(m)+'-'+pad2(d); }
function ymdIntToShort(yi){ if(!yi) return ''; var y=Math.floor(yi/10000)%100, m=Math.floor((yi%10000)/100), d=yi%100; return pad2(y)+'.'+pad2(m)+'.'+pad2(d); }
function fmtTimeAgo(ts){
  if(!ts) return '';
  var diff=Date.now()-ts;
  if(diff<60000) return '방금';
  if(diff<3600000) return Math.floor(diff/60000)+'분 전';
  if(diff<86400000) return Math.floor(diff/3600000)+'시간 전';
  var d=new Date(ts);
  var dd=new Date(); dd.setHours(0,0,0,0);
  var dayDiff=Math.floor((dd.getTime()-new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime())/86400000);
  if(dayDiff===1) return '어제 '+pad2(d.getHours())+':'+pad2(d.getMinutes());
  if(dayDiff<7) return dayDiff+'일 전';
  return (d.getMonth()+1)+'/'+d.getDate()+' '+pad2(d.getHours())+':'+pad2(d.getMinutes());
}
function startOfTodayTs(){ var d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }
function startOfWeekTs(){ var d=new Date(); d.setHours(0,0,0,0); var dow=d.getDay(); var diff=(dow===0?6:dow-1); d.setDate(d.getDate()-diff); return d.getTime(); }
function toast(msg, kind){
  kind=kind||'ok';
  var w=document.getElementById('toastWrap');
  var el=document.createElement('div');
  el.className='toast '+kind;
  el.textContent=msg;
  w.appendChild(el);
  setTimeout(function(){ try{el.remove();}catch(e){} }, 2400);
}
function mapToArr(obj, sortKey){
  if (!obj) return [];
  return Object.keys(obj).map(function(k){ var o=obj[k]||{}; o._id=k; return o; }).sort(function(a,b){
    if (sortKey === 'name') return String(a.name||'').localeCompare(String(b.name||''));
    return (a.order||0) - (b.order||0);
  });
}

/* ───────── 인증 ───────── */
function doLogout(){
  if (!window.WMSync || !WMSync.isReady()) return;
  if (!confirm('로그아웃하시겠습니까?')) return;
  WMSync.signOut().then(function(){ window.location.replace('/wms_login.html'); });
}
function wmsHandleAuthState(state){
  var dot=document.getElementById('userDot'), nm=document.getElementById('userName');
  var returnUrl='/wms_login.html?return='+encodeURIComponent(location.pathname+location.search);
  if (!state.user){ dot.classList.remove('on'); nm.textContent='로그인 필요'; setTimeout(function(){ if(!WMSync.isSignedIn()) window.location.replace(returnUrl); }, 3000); return; }
  if (!state.groupId){ alert('이 계정은 작업 그룹에 등록되어 있지 않습니다.\n관리자에게 초대 코드를 요청하세요.'); window.location.replace(returnUrl); return; }
  dot.classList.add('on');
  nm.textContent=getUserDisplay();
  groupId=state.groupId;
  isAdmin=!!state.isAdmin;
  document.getElementById('infoEmail').textContent=(state.user.email||state.user.uid)+(isAdmin?' 👑 (관리자)':'');
  document.getElementById('infoGroup').textContent='그룹: '+state.groupId;
  refreshSetGate();
  attachRefs();
}
function refreshSetGate(){
  var gate=document.getElementById('setGate');
  var body=document.getElementById('setBody');
  if (!gate || !body) return;
  if (isAdmin){ gate.style.display='none'; body.style.display=''; }
  else{ gate.style.display=''; body.style.display='none'; }
}

/* ───────── Firebase ───────── */
function attachRefs(){
  if (!groupId || typeof firebase==='undefined') return;
  var db=firebase.database();
  /* settings */
  if (setRef) { try{ setRef.off(); }catch(e){} }
  setRef=db.ref('wms_sync/groups/'+groupId+'/picktalk/settings');
  setRef.on('value', function(snap){
    var v=snap.val()||{};
    settings={
      categories: v.categories||{},
      vendors: v.vendors||{},
      statuses: v.statuses||{},
      completes: v.completes||{},
      seeded: !!v.seeded
    };
    /* 시드 — admin 일 때만, 한 번만 */
    if (!settings.seeded && isAdmin && Object.keys(settings.categories).length===0) {
      seedDefaults();
    }
    renderAll();
  }, function(err){ console.warn('settings read', err); });
  /* logs */
  if (logsRef) { try{ logsRef.off(); }catch(e){} }
  logsRef=db.ref('wms_sync/groups/'+groupId+'/picktalk/logs');
  logsRef.on('value', function(snap){
    var v=snap.val()||{};
    allLogs=Object.keys(v).map(function(k){ var o=v[k]||{}; o._key=k; return o; }).sort(function(a,b){ return (b.ts||0)-(a.ts||0); });
    renderList();
    renderSummary();
    renderCalendar();
  }, function(err){ toast('데이터 읽기 실패: '+(err&&err.message||err),'er'); });
}
function seedDefaults(){
  /* 기본 카테고리·작업완료여부 시드 */
  var updates={};
  var basePath='wms_sync/groups/'+groupId+'/picktalk/settings';
  SEED_CATEGORIES.forEach(function(c, idx){
    var newRef=firebase.database().ref(basePath+'/categories').push();
    updates[basePath+'/categories/'+newRef.key]={
      name:c.name, icon:c.icon, color:c.color, order:idx, fields:c.fields
    };
  });
  SEED_COMPLETES.forEach(function(s, idx){
    var newRef=firebase.database().ref(basePath+'/completes').push();
    updates[basePath+'/completes/'+newRef.key]={ name:s.name, color:s.color, order:idx };
  });
  updates[basePath+'/seeded']=true;
  firebase.database().ref().update(updates).then(function(){
    toast('초기 카테고리·작업완료 항목 자동 생성됨','ok');
  }).catch(function(err){ console.warn('seed', err); });
}

/* ───────── 탭 전환 ───────── */
function showTab(t){
  curTab=t;
  ['cal','list','set'].forEach(function(x){
    var s=document.getElementById('tab'+x.charAt(0).toUpperCase()+x.slice(1));
    var n=document.getElementById('nav'+x.charAt(0).toUpperCase()+x.slice(1));
    if (s) s.classList.toggle('on', x===t);
    if (n) n.classList.toggle('on', x===t);
  });
  if (t==='cal') renderCalendar();
  else if (t==='list') renderList();
  else if (t==='set') renderSettings();
}
function renderAll(){
  renderFilterChips();
  renderList();
  renderCalendar();
  renderSettings();
  renderSummary();
}

/* ───────── 필터 + 목록 ───────── */
function renderFilterChips(){
  var row=document.getElementById('filterRow');
  if (!row) return;
  var cats=mapToArr(settings.categories,'order');
  var chips=[
    { key:'all', label:'전체', ic:'' },
    { key:'mine', label:'내 글', ic:'' }
  ].concat(cats.map(function(c){ return { key:c._id, label:c.name, ic:c.icon||'', color:c.color }; }));
  /* 칩이 많으면 컴팩트 모드 — 화면 작아도 한두 줄에 들어가게 */
  row.classList.toggle('compact', chips.length >= 10);
  row.innerHTML=chips.map(function(c){
    var ic=c.ic?'<span>'+c.ic+'</span>':'';
    return '<button class="f-chip '+(curFilter===c.key?'on':'')+'" onclick="setFilter(\''+c.key+'\')">'+ic+escH(c.label)+'</button>';
  }).join('');
}
function setFilter(k){ curFilter=k; renderFilterChips(); renderList(); }
function renderSummary(){
  var t0=startOfTodayTs(), w0=startOfWeekTs();
  var today=0, week=0;
  allLogs.forEach(function(lg){ var ts=lg.ts||0; if(ts>=t0) today++; if(ts>=w0) week++; });
  var el;
  if((el=document.getElementById('todayN'))) el.textContent=today;
  if((el=document.getElementById('weekN'))) el.textContent=week;
  if((el=document.getElementById('allN'))) el.textContent=allLogs.length;
}
function renderFeedCard(lg){
  var c=settings.categories[lg.categoryId]||{};
  var icon=lg.categoryIcon||c.icon||'📌';
  var name=lg.categoryName||c.name||'(삭제됨)';
  var color=c.color||'#7c8399';
  var me=getUserId();
  var isMe=lg.by===me;
  var meta=[];
  if (lg.dateInt) meta.push('<span class="m-pill m-date">📅 '+ymdIntToShort(lg.dateInt)+'</span>');
  if (lg.time) meta.push('<span class="m-pill m-time">🕐 '+escH(lg.time)+'</span>');
  if (lg.vendorName) meta.push('<span class="m-pill m-vendor">🏢 '+escH(lg.vendorName)+'</span>');
  if (lg.statusName){
    var sc=Object.values(settings.statuses||{}).find(function(s){return s.name===lg.statusName;});
    var stColor=(sc&&sc.color)||'#c084fc';
    meta.push('<span class="m-pill m-status" style="background:'+stColor+'22;color:'+stColor+'">⚙️ '+escH(lg.statusName)+'</span>');
  }
  if (lg.completeName){
    var cc=Object.values(settings.completes||{}).find(function(s){return s.name===lg.completeName;});
    var cmColor=(cc&&cc.color)||'#4af0a8';
    meta.push('<span class="m-pill m-complete" style="background:'+cmColor+'22;color:'+cmColor+'">'+escH(lg.completeName)+'</span>');
  }
  var noteHtml=lg.note?'<div class="fc-note">'+escH(lg.note)+'</div>':'';
  var delBtn=(isMe||isAdmin)?'<button class="fc-del" onclick="deleteLog(\''+escH(lg._key)+'\')">✕</button>':'';
  return '<div class="feed-card" style="border-left-color:'+color+'">'+
    delBtn +
    '<div class="fc-row1">'+
      '<div class="fc-cat"><span class="ic">'+icon+'</span><span class="name">'+escH(name)+'</span></div>'+
      '<div class="fc-time">'+fmtTimeAgo(lg.ts)+'</div>'+
    '</div>'+
    (lg.title?'<div class="fc-title">'+escH(lg.title)+'</div>':'')+
    (meta.length?'<div class="fc-meta">'+meta.join('')+'</div>':'')+
    noteHtml+
    '<div class="fc-by">올린이 · <span class="fc-by-name">'+escH(lg.byName||lg.by||'?')+'</span></div>'+
  '</div>';
}
function renderList(){
  var list=document.getElementById('feedList');
  if (!list) return;
  var me=getUserId();
  var data=allLogs.filter(function(lg){
    if (curFilter==='all') return true;
    if (curFilter==='mine') return lg.by===me;
    return lg.categoryId===curFilter;
  });
  if (!data.length){
    var msg=curFilter==='all'?'아직 등록된 작업이 없습니다':(curFilter==='mine'?'내가 올린 작업이 없습니다':'이 카테고리에 작업이 없습니다');
    list.innerHTML='<div class="empty-state"><div class="empty-ico">📭</div><div class="empty-msg">'+msg+'</div><div class="empty-sub">아래 ➕ 버튼을 눌러 작업을 등록하세요</div></div>';
    return;
  }
  list.innerHTML=data.slice(0,200).map(renderFeedCard).join('');
}
function deleteLog(key){
  var lg=allLogs.find(function(x){ return x._key===key; });
  if (!lg) return;
  var me=getUserId();
  if (lg.by!==me && !isAdmin){ toast('본인 글만 삭제 가능','er'); return; }
  if (!confirm('이 글을 삭제하시겠습니까?\n  '+(lg.title||lg.categoryName||''))) return;
  logsRef.child(key).remove().then(function(){ toast('삭제됨','ok'); }).catch(function(err){ toast('삭제 실패: '+(err&&err.message||err),'er'); });
}

/* ───────── 캘린더 ───────── */
function renderCalendar(){
  var grid=document.getElementById('calGrid');
  var month=document.getElementById('calMonth');
  if (!grid || !month) return;
  var y=calCursor.getFullYear(), m=calCursor.getMonth();
  month.textContent=y+'년 '+(m+1)+'월';
  /* 카운트 — 해당 월 일자별 */
  var counts={};
  allLogs.forEach(function(lg){
    var ts=lg.ts||0;
    var d=new Date(ts);
    if (d.getFullYear()===y && d.getMonth()===m){
      var k=d.getDate();
      counts[k]=(counts[k]||0)+1;
    }
  });
  var firstDow=new Date(y,m,1).getDay();
  var daysIn=new Date(y,m+1,0).getDate();
  var prevDays=new Date(y,m,0).getDate();
  var todayInt=ymdInt(Date.now());
  var dows=['일','월','화','수','목','금','토'];
  var html=dows.map(function(d,i){ return '<div class="cal-dow '+(i===0?'sun':i===6?'sat':'')+'">'+d+'</div>'; }).join('');
  /* 이전 달 채움 */
  for (var i=0;i<firstDow;i++){
    var pd=prevDays-firstDow+i+1;
    html+='<div class="cal-day mute"><div class="dnum">'+pd+'</div></div>';
  }
  /* 이번 달 */
  for (var d=1; d<=daysIn; d++){
    var di=y*10000+(m+1)*100+d;
    var sel=(calSelectedDate===di)?'sel':'';
    var todayCls=(di===todayInt)?'today':'';
    var cnt=counts[d]||0;
    var cntHtml=cnt>0?'<div class="dcnt">'+cnt+'</div>':'';
    html+='<div class="cal-day '+sel+' '+todayCls+'" onclick="selectCalDay('+di+')"><div class="dnum">'+d+'</div>'+cntHtml+'</div>';
  }
  /* 마지막 행 채움 */
  var total=firstDow+daysIn;
  var rem=(7-total%7)%7;
  for (var k=1;k<=rem;k++){
    html+='<div class="cal-day mute"><div class="dnum">'+k+'</div></div>';
  }
  grid.innerHTML=html;
  renderCalDayList();
}
function calStep(delta){
  calCursor.setMonth(calCursor.getMonth()+delta);
  renderCalendar();
}
function calToToday(){
  calCursor=new Date(); calCursor.setDate(1);
  calSelectedDate=ymdInt(Date.now());
  renderCalendar();
}
function selectCalDay(di){
  calSelectedDate=di;
  renderCalendar();
}
function renderCalDayList(){
  var head=document.getElementById('calDayHead');
  var list=document.getElementById('calDayList');
  if (!head || !list) return;
  if (!calSelectedDate){
    head.textContent='날짜를 선택하세요';
    list.innerHTML='';
    return;
  }
  /* 선택 일자 = 그 날의 ts 또는 dateInt 일치하는 로그들 */
  var day=calSelectedDate;
  var dayStart=new Date(Math.floor(day/10000), Math.floor((day%10000)/100)-1, day%100).setHours(0,0,0,0);
  var dayEnd=dayStart+86400000;
  var data=allLogs.filter(function(lg){
    if (lg.dateInt===day) return true;
    if (lg.ts>=dayStart && lg.ts<dayEnd) return true;
    return false;
  }).sort(function(a,b){ return (b.ts||0)-(a.ts||0); });
  head.textContent=ymdIntToShort(day)+' · '+data.length+'건';
  if (!data.length){
    list.innerHTML='<div class="empty-state" style="padding:1.5rem 1rem"><div class="empty-msg" style="font-size:.84rem">이 날 등록된 작업이 없습니다</div></div>';
    return;
  }
  list.innerHTML=data.map(renderFeedCard).join('');
}

  Array.from(parent.querySelectorAll('.fld-chip')).forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
}
function regOnChange(){
  var t=(document.getElementById('fldTitle')||{}).value||'';
  document.getElementById('regSubmit').disabled=!t.trim();
}
function regBack(){
  if (regState.step>1){ regState.step--; renderRegStep(); }
}
function regNext(){
  if (regState.step===1 && !regState.catId) return;
  if (regState.step<2){ regState.step++; renderRegStep(); }
}
function submitLog(){
  if (!regState || !logsRef) { toast('로그인 후 사용하세요','er'); return; }
  var c=settings.categories[regState.catId]||{};
  var f=c.fields||{};
  var title=(document.getElementById('fldTitle')||{}).value||'';
  title=title.trim();
  if (!title){ toast('네이밍은 필수입니다','warn'); return; }
  var rec={
    ts: Date.now(),
    by: getUserId(),
    byName: getUserDisplay(),
    categoryId: regState.catId,
    categoryName: c.name||'',
    categoryIcon: c.icon||'',
    title: title
  };
  if (f.hasDate){
    var d=(document.getElementById('fldDate')||{}).value||'';
    if (d) rec.dateInt=dateToYmdInt(d);
  }
  if (f.hasTime){
    var t=(document.getElementById('fldTime')||{}).value||'';
    if (t) rec.time=t;
  }
  if (f.hasVendor){
    var vEl=document.querySelector('#fldVendor .fld-chip.on');
    if (vEl && vEl.dataset.vid){
      rec.vendorId=vEl.dataset.vid;
      rec.vendorName=vEl.dataset.vname||'';
    }
  }
  if (f.hasStatus){
    var sEl=document.querySelector('#fldStatus .fld-chip.on');
    if (sEl && sEl.dataset.sname) rec.statusName=sEl.dataset.sname;
  }
  if (f.hasComplete){
    var cEl=document.querySelector('#fldComplete .fld-chip.on');
    if (cEl && cEl.dataset.cname) rec.completeName=cEl.dataset.cname;
  }
  if (f.hasNote){
    var n=(document.getElementById('fldNote')||{}).value||'';
    n=n.trim();
    if (n) rec.note=n;
  }
  var clean=JSON.parse(JSON.stringify(rec));
  var btn=document.getElementById('regSubmit');
  btn.disabled=true; btn.textContent='저장 중...';
  logsRef.push(clean).then(function(){
    document.getElementById('regModal').classList.remove('open');
    regState=null;
    toast('✓ 등록 완료','ok');
    showTab('list');
    var feed=document.getElementById('tabList'); if(feed) feed.scrollTop=0;
  }).catch(function(err){
    toast('저장 실패: '+(err&&err.message||err),'er');
  }).finally(function(){ btn.disabled=false; btn.textContent='✓ 완료'; });
}

    if (editState.id){
      data.order = (settings.categories[editState.id]||{}).order || 0;
      setRef.child('categories/'+editState.id).set(data).then(function(){ toast('저장됨','ok'); closeEditor(); }).catch(function(err){ toast('저장 실패: '+err.message,'er'); });
    } else {
      var nextOrder = Object.values(settings.categories).reduce(function(m,c){ return Math.max(m,c.order||0); }, -1)+1;
      data.order=nextOrder;
      setRef.child('categories').push(data).then(function(){ toast('카테고리 추가됨','ok'); closeEditor(); }).catch(function(err){ toast('저장 실패: '+err.message,'er'); });
    }
  } else {
    var pathMap={ vendor:'vendors', status:'statuses', complete:'completes' };
    var path=pathMap[editState.kind];
    var d={ name:name };
    if (editState.kind!=='vendor'){
      d.color=(document.getElementById('edColor')||{}).value||editState.data.color||DEFAULT_COLORS[0];
    }
    if (editState.kind==='vendor'){
      var memo=(document.getElementById('edMemo')||{}).value||'';
      if (memo.trim()) d.memo=memo.trim();
    }
    if (editState.id){
      d.order = (settings[path][editState.id]||{}).order || 0;
      setRef.child(path+'/'+editState.id).set(d).then(function(){ toast('저장됨','ok'); closeEditor(); }).catch(function(err){ toast('저장 실패: '+err.message,'er'); });
    } else {
      var nextO = Object.values(settings[path]).reduce(function(m,c){ return Math.max(m,c.order||0); }, -1)+1;
      d.order=nextO;
      setRef.child(path).push(d).then(function(){ toast('추가됨','ok'); closeEditor(); }).catch(function(err){ toast('저장 실패: '+err.message,'er'); });
    }
  }
}
function deleteItem(path, id, name){
  if (!isAdmin || !setRef) return;
  if (!confirm('「'+name+'」 항목을 삭제하시겠습니까?\n기존 로그에 남아 있는 표시는 그대로 유지되지만, 새 등록에선 더 이상 선택할 수 없습니다.')) return;
  setRef.child(path+'/'+id).remove().then(function(){ toast('삭제됨','ok'); }).catch(function(err){ toast('삭제 실패: '+err.message,'er'); });
}

/* ───────── 초기화 ───────── */
(function init(){
  if (!window.WMSync){ toast('동기화 모듈 로딩 실패 — 새로고침','er'); return; }
  WMSync.init('picktalk', { requireAuth: true });
  WMSync.onAuth(function(state){ wmsHandleAuthState(state); });
  showTab('list');
  renderFilterChips();
})();
</script>
