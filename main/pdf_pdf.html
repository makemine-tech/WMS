<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PDF 텍스트 진단 · Makemine Design</title>
<style>
:root{
  --bg:#f0f2f5;--surface:#fff;
  --ink:#1f2937;--ink2:#374151;--ink3:#6b7280;--ink4:#9ca3af;
  --border:#e5e7eb;--border2:#d1d5db;
  --pri:#1a56db;--pri-l:#e1effe;
  --suc:#057a55;--suc-l:#ecfdf5;
  --dng:#dc2626;--dng-l:#fef2f2;
  --wrn:#d97706;--wrn-l:#fffbeb;
  --tag:#f3f4f6;
  --hdr-bg:linear-gradient(135deg,#1f2937,#374151);
  --r:8px;
  --font:'Segoe UI',-apple-system,'Malgun Gothic','맑은 고딕',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);min-height:100vh}
body{font-family:var(--font);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;font-size:14px;line-height:1.5}

/* ── HEADER ── */
.hdr{background:var(--hdr-bg);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-icon{width:32px;height:32px;background:rgba(255,255,255,.12);border-radius:7px;display:flex;align-items:center;justify-content:center}
.hdr-icon svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hdr-name{font-size:16px;font-weight:700}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.06em;margin-top:1px}
.btn-home{display:inline-flex;align-items:center;gap:5px;text-decoration:none;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:6px 14px;font-size:12px;font-weight:500;transition:all .15s}
.btn-home:hover{color:#fff;border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.06)}

/* ── MAIN ── */
main{flex:1;max-width:960px;width:100%;margin:0 auto;padding:24px 20px}

/* ── CARD / SECTION ── */
.sec{margin-bottom:16px}
.sec-label{font-size:11px;font-weight:700;color:var(--ink4);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;padding-left:2px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}

/* ── DROP ZONE ── */
.drop-zone{background:var(--surface);border:2px dashed var(--border2);border-radius:var(--r);padding:36px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative}
.drop-zone:hover{border-color:var(--pri);background:var(--pri-l)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz-icon{width:44px;height:44px;margin:0 auto 10px;background:var(--tag);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.dz-title{font-weight:700;font-size:15px;margin-bottom:3px}
.dz-sub{font-size:13px;color:var(--ink3)}
.dz-ext{font-size:11px;color:var(--ink4);margin-top:8px;letter-spacing:.04em}

/* ── CONTROLS ── */
.ctrl-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px 14px}
.ctrl-row select{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);color:var(--ink);outline:none;background:var(--surface)}
.ctrl-row select:focus{border-color:var(--pri)}
.btn{padding:7px 14px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:#1e40af}
.btn-sec{background:var(--surface);color:var(--ink3);border:1px solid var(--border)}.btn-sec:hover{background:var(--tag)}
.ctrl-info{font-size:12px;color:var(--ink4);margin-left:auto}

/* ── LEGEND ── */
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;padding:8px 14px;border-bottom:1px solid var(--border)}
.ld{display:flex;align-items:center;gap:6px;color:var(--ink3)}
.lc{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* ── OUTPUT ── */
.output{padding:14px;max-height:65vh;overflow-y:auto;font-family:'Courier New',monospace;font-size:13px;line-height:2;white-space:pre-wrap;word-break:break-all;color:var(--ink2)}
.item-row{display:flex;gap:8px;margin-bottom:2px;padding:2px 6px;border-radius:4px}
.item-row:hover{background:var(--tag)}
.idx{color:var(--ink4);min-width:38px;text-align:right;flex-shrink:0}
.str{flex:1}
.coords{color:var(--ink4);font-size:11px;min-width:200px;flex-shrink:0}
/* highlights */
.h-qty{background:var(--wrn-l);border-left:3px solid var(--wrn)}
.h-arr{background:var(--suc-l);border-left:3px solid var(--suc)}
.h-reg{background:var(--dng-l);border-left:3px solid var(--dng)}
.h-num{background:#f3e8ff;border-left:3px solid #a855f7}

/* ── MSG ── */
.msg{padding:8px 14px;border-radius:var(--r);background:var(--pri-l);color:var(--pri);font-size:13px;margin:8px 0;display:flex;align-items:center;gap:6px}
.sp{display:inline-block;width:12px;height:12px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
.ftr{text-align:center;padding:14px 20px;background:var(--ink);color:rgba(255,255,255,.35);font-size:10px;letter-spacing:.04em;margin-top:auto}
.ftr a{color:rgba(255,255,255,.5);text-decoration:none}
.ftr a:hover{color:rgba(255,255,255,.8)}
</style>
</head>
<body>

<style>

  .mw-home-fab:hover{background:rgba(0,0,0,.82);border-color:rgba(255,255,255,.55);transform:translateY(-1px)}
  .mw-home-fab svg{width:14px;height:14px;display:block;opacity:.9}

  @media(max-width:480px){.mw-home-fab{font-size:10px;padding:6px 11px 6px 9px;top:10px;right:10px}.mw-home-fab svg{width:12px;height:12px}}

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    </div>
    <div>
      <div class="hdr-name">PDF 텍스트 진단</div>
      <div class="hdr-sub">PDF TEXT DIAGNOSTIC · PDFJS RAW ORDER</div>
    </div>
  </div>
  <a class="btn-home" href="index.html">&#9664; 홈으로</a>
</div>

<main>
  <!-- Upload -->
  <div class="sec">
    <div class="sec-label">파일 업로드</div>
    <div class="drop-zone" id="dz">
      <input type="file" id="f0" accept=".pdf">
      <div class="dz-icon">📄</div>
      <div class="dz-title">PDF 드래그 또는 클릭</div>
      <div class="dz-sub">pdfjs가 읽는 텍스트를 순서대로 보여줍니다</div>
      <div class="dz-ext">.pdf</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="sec">
    <div class="sec-label">분석</div>
    <div class="card">
      <div class="ctrl-row" id="ctrl" style="display:none">
        <span style="color:var(--ink4);font-size:12px">페이지:</span>
        <select id="pgSel" onchange="showPage()"></select>
        <button class="btn btn-pri" onclick="showPage()">새로고침</button>
        <button class="btn btn-sec" onclick="showJoined()">join(' ') 결과</button>
        <button class="btn btn-sec" onclick="showZone()">총수량~등기번호 구간</button>
        <span class="ctrl-info" id="pgInfo"></span>
      </div>
      <div class="legend" id="legend" style="display:none">
        <div class="ld"><div class="lc" style="background:#d97706"></div>총수량 라인</div>
        <div class="ld"><div class="lc" style="background:#057a55"></div>▶ 포함</div>
        <div class="ld"><div class="lc" style="background:#dc2626"></div>등기번호</div>
        <div class="ld"><div class="lc" style="background:#a855f7"></div>숫자만</div>
      </div>
      <div id="msg" class="msg" style="display:none"></div>
      <div class="output" id="out">PDF를 업로드하면 pdfjs가 읽는 텍스트를 순서대로 보여줍니다.</div>
    </div>
  </div>
</main>

<script>
var pdfjsOk=false;
function loadPdfjs(cb){
  if(pdfjsOk){cb();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
  s.onload=function(){
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    pdfjsOk=true;cb();
  };
  document.head.appendChild(s);
}

var pdfDoc=null;
var pageCache={};

document.getElementById('f0').onchange=function(e){
  var f=e.target.files[0];if(!f)return;
  document.getElementById('msg').style.display='flex';
  document.getElementById('msg').innerHTML='<span class="sp"></span>로딩 중...';
  loadPdfjs(function(){
    var reader=new FileReader();
    reader.onload=function(ev){
      var bytes=new Uint8Array(ev.target.result);
      pdfjsLib.getDocument({data:bytes}).promise.then(function(doc){
        pdfDoc=doc;pageCache={};
        var sel=document.getElementById('pgSel');
        sel.innerHTML='';
        for(var i=1;i<=doc.numPages;i++){
          var opt=document.createElement('option');
          opt.value=i;opt.textContent='페이지 '+i;
          sel.appendChild(opt);
        }
        document.getElementById('ctrl').style.display='flex';
        document.getElementById('legend').style.display='flex';
        document.getElementById('pgInfo').textContent='총 '+doc.numPages+'페이지';
        document.getElementById('msg').style.display='none';
        showPage();
      }).catch(function(e){
        document.getElementById('msg').innerHTML='❌ '+e.message;
      });
    };
    reader.readAsArrayBuffer(f);
  });
};

function getItems(pgNum, cb){
  if(pageCache[pgNum]){cb(pageCache[pgNum]);return;}
  pdfDoc.getPage(pgNum).then(function(page){
    return page.getTextContent();
  }).then(function(tc){
    var items=tc.items.map(function(it,idx){
      return {
        idx:idx,
        str:(it.str||''),
        tx:Math.round(it.transform[4]),
        ty:Math.round(it.transform[5]),
        w:Math.round(it.width||0),
        h:Math.round(Math.abs(it.transform[3])||it.height||0)
      };
    });
    pageCache[pgNum]=items;
    cb(items);
  });
}

function showPage(){
  var pgNum=parseInt(document.getElementById('pgSel').value);
  document.getElementById('msg').style.display='flex';
  document.getElementById('msg').innerHTML='<span class="sp"></span>텍스트 추출 중...';
  getItems(pgNum,function(items){
    document.getElementById('msg').style.display='none';
    renderItems(items,'📋 pdfjs tc.items 순서 그대로 (idx, str, tx, ty, w, h)');
  });
}

function showJoined(){
  var pgNum=parseInt(document.getElementById('pgSel').value);
  getItems(pgNum,function(items){
    var joined=items.map(function(it){return it.str;}).join(' ');
    var out=document.getElementById('out');
    out.innerHTML='';
    out.appendChild(makeTitle('📝 join(" ") 결과 — 파싱에 사용되는 텍스트'));
    var div=document.createElement('div');
    div.style.cssText='background:var(--tag);padding:12px;border-radius:6px;margin-top:8px;white-space:pre-wrap;word-break:break-all;line-height:1.8;color:var(--ink)';
    div.textContent=joined;
    out.appendChild(div);

    var qi=joined.indexOf('총수량');
    var ri=joined.indexOf('등기번호');
    if(qi>=0){
      var info=document.createElement('div');
      info.style.cssText='margin-top:12px;color:var(--ink4);font-size:12px';
      info.innerHTML=
        '총수량 위치: <b style="color:#d97706">'+qi+'</b>자 | '+
        '등기번호 위치: <b style="color:#dc2626">'+ri+'</b>자 | '+
        (ri>qi?'<b style="color:#057a55">구간 정상 (총수량이 먼저)</b>':'<b style="color:#dc2626">⚠️ 등기번호가 총수량보다 앞에 있음!</b>');
      out.appendChild(info);

      if(ri>qi){
        var zone=joined.substring(qi,ri);
        var zdiv=document.createElement('div');
        zdiv.style.cssText='margin-top:8px;background:var(--suc-l);border:1px solid #86efac;padding:10px;border-radius:6px;white-space:pre-wrap;word-break:break-all;line-height:1.8';
        zdiv.innerHTML='<div style="color:#057a55;font-size:11px;margin-bottom:4px">▼ 총수량~등기번호 구간</div>'+escHtml(zone);
        out.appendChild(zdiv);
      }
    }
  });
}

function showZone(){
  var pgNum=parseInt(document.getElementById('pgSel').value);
  getItems(pgNum,function(items){
    var start=-1,end=-1;
    for(var i=0;i<items.length;i++){
      if(start<0&&items[i].str.indexOf('총수량')>=0)start=i;
      if(items[i].str.indexOf('등기번호')>=0){end=i;break;}
    }

    var out=document.getElementById('out');
    out.innerHTML='';
    out.appendChild(makeTitle('🎯 총수량~등기번호 구간 items (start='+start+', end='+end+')'));

    if(start<0){
      var p=document.createElement('div');p.style.color='#dc2626';p.textContent='총수량 없음 → 연속 페이지';
      out.appendChild(p);return;
    }

    var zoneItems=items.slice(start, end>=0?end+1:start+20);
    zoneItems.forEach(function(it,i){
      var row=makeRow(it,start+i);
      out.appendChild(row);
    });

    var joined=zoneItems.map(function(it){return it.str;}).join(' ');
    var sep=document.createElement('div');
    sep.style.cssText='margin-top:14px;padding-top:10px;border-top:1px solid var(--border);color:var(--ink4);font-size:11px;margin-bottom:6px';
    sep.textContent='▼ 위 구간을 join(" ")한 후 ▶ 기준으로 분리:';
    out.appendChild(sep);

    var parts=joined.split('▶');
    parts.forEach(function(p,i){
      if(!p.trim())return;
      var d=document.createElement('div');
      d.style.cssText='padding:3px 8px;margin:2px 0;border-radius:4px;'+(i>0?'background:var(--suc-l);border-left:3px solid #057a55':'');
      d.innerHTML='<span style="color:var(--ink4)">['+(i===0?'앞':'▶'+(i))+'] </span>'+escHtml(p.substring(0,120))+(p.length>120?'…':'');
      out.appendChild(d);
    });
  });
}

function makeTitle(t){
  var d=document.createElement('div');
  d.style.cssText='color:var(--pri);margin-bottom:8px;font-size:13px;font-weight:700';
  d.textContent=t;return d;
}

function makeRow(it,idx){
  var s=it.str;
  var cls='item-row';
  if(s.indexOf('총수량')>=0)cls+=' h-qty';
  else if(s.indexOf('▶')>=0)cls+=' h-arr';
  else if(s.indexOf('등기번호')>=0)cls+=' h-reg';
  else if(/^\d+$/.test(s.trim()))cls+=' h-num';

  var row=document.createElement('div');
  row.className=cls;
  row.innerHTML=
    '<span class="idx">'+idx+'</span>'+
    '<span class="str">'+escHtml(s.substring(0,80))+(s.length>80?'…':'')+'</span>'+
    '<span class="coords">tx='+it.tx+' ty='+it.ty+' w='+it.w+' h='+it.h+'</span>';
  return row;
}

function renderItems(items,title){
  var out=document.getElementById('out');
  out.innerHTML='';
  out.appendChild(makeTitle(title+' (총 '+items.length+'개)'));
  items.forEach(function(it){out.appendChild(makeRow(it,it.idx));});
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
