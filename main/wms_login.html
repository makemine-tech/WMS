(function(){

  var isInApp = /KAKAOTALK|Line\/|Instagram|FBAV|FBAN|Twitter|Snapchat|NaverApp|Naver Blog|DaumApp|whale/i.test(ua);

  if(isAndroid){
    try{
      window.location.href =
        'intent://' + window.location.host + window.location.pathname + window.location.search
        + '#Intent;scheme=https;package=com.android.chrome;end';

  }

    + '<div style="font-size:48px;line-height:1;margin-bottom:12px;">📦</div>'

    + '<div style="display:inline-block;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.35);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:#FBBF24;margin-top:4px;">⚠️ 외부 브라우저 필요</div>'

    + '<div id="copyMsg" style="text-align:center;min-height:20px;margin-top:10px;font-size:12px;color:#34D399;"></div>'

  window.copyUrlAndGuide = function(btn){

      navigator.clipboard.writeText(url).then(function(){
        document.getElementById('copyMsg').textContent = '✅ 링크가 복사되었습니다. Chrome 또는 Safari 주소창에 붙여넣기 해주세요.';
      }).catch(fallbackCopy);
    }else{
      fallbackCopy();
    }
    function fallbackCopy(){
      var ta = document.createElement('textarea');
      ta.value = url;
      ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);
      ta.select();
      try{document.execCommand('copy');document.getElementById('copyMsg').textContent='✅ 링크가 복사되었습니다. Chrome 또는 Safari 주소창에 붙여넣기 해주세요.';}

      document.body.removeChild(ta);

})();

/* ── 슈퍼관리자: 그룹 목록 ── */
function showAdminView(user, groups){
  _currentUser=user;
  _currentGroups=groups||{};
  var groupHtml='';
  if(!groups||Object.keys(groups).length===0){
    groupHtml='<div style="text-align:center;color:#64748B;padding:20px;font-size:13px;">등록된 그룹이 없습니다<br><span style="font-size:11px;">아래 버튼으로 새 그룹을 만드세요</span></div>';
  }else{
    Object.entries(groups).forEach(function(entry){
      var gid=entry[0];
      var whCount=Object.keys(entry[1]).filter(function(k){return k!=='_init';}).length;
      groupHtml+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'
      +'<div onclick="enterGroup(\''+gid+'\')" style="flex:1;display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid #334155;border-radius:10px;cursor:pointer;" onmouseover="this.style.background=\'rgba(59,130,246,.1)\'" onmouseout="this.style.background=\'rgba(255,255,255,.04)\'">'
      +'<span style="font-size:20px;">🏢</span>'
      +'<div style="flex:1;"><div style="font-weight:700;font-size:15px;">'+gid+'</div>'
      +'<div style="font-size:11px;color:#64748B;">창고 '+whCount+'개</div></div>'
      +'<span style="color:#64748B;font-size:16px;">›</span></div>'
      +'<button onclick="confirmDeleteGroup(\''+gid+'\')" style="background:rgba(239,68,68,.15);color:#F87171;border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:8px 10px;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;">삭제</button>'
      +'</div>';
    });
  }
  r(HOME_BTN
   +'<div class="card">'
   +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #334155;">'
   +'<div style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;color:#F87171;">🛡️ 슈퍼관리자</div>'
   +'<div style="flex:1;"><div style="font-weight:700;font-size:13px;">'+(user.displayName||'')+'</div>'
   +'<div style="font-size:11px;color:#64748B;">'+user.email+'</div></div>'
   +'<button onclick="doLogout()" style="background:none;border:none;color:#64748B;font-size:12px;cursor:pointer;text-decoration:underline;">로그아웃</button></div>'
   +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">'
   +'<div style="font-size:14px;font-weight:700;">그룹 선택</div>'
   +'<button onclick="showCreateGroupModal()" style="background:#2563EB;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;">+ 새 그룹</button>'
   +'</div>'
   +groupHtml+'</div>');
}

/* ── 새 그룹 생성 모달 ── */
function showCreateGroupModal(){
  modalEl.innerHTML='<div class="modal-bg" onclick="closeModal()">'
   +'<div class="modal-box" onclick="event.stopPropagation()">'
   +'<div style="font-size:17px;font-weight:700;margin-bottom:6px;">새 그룹 만들기</div>'
   +'<div style="font-size:11px;color:#64748B;margin-bottom:18px;">그룹 ID는 영문 소문자·숫자·하이픈만 사용 가능합니다</div>'
   +'<div class="label">그룹 ID</div>'
   +'<input id="newGroupId" class="inp" placeholder="예: lk-logistics" style="margin-bottom:6px;"'
   +' oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9-]/g,\'\');document.getElementById(\'groupStatus\').innerHTML=\'\'"/>'
   +'<div id="groupStatus" style="min-height:16px;margin-bottom:14px;font-size:11px;"></div>'
   +'<button onclick="createGroup()" style="width:100%;background:#2563EB;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;">생성하기</button>'
   +'<button onclick="closeModal()" style="width:100%;background:none;border:none;color:#64748B;font-size:12px;cursor:pointer;padding:8px;text-decoration:underline;">취소</button>'
   +'</div></div>';
}

async function createGroup(){
  var gid=(document.getElementById('newGroupId').value||'').trim();
  var status=document.getElementById('groupStatus');
  if(!gid||gid.length<2){status.innerHTML='<span style="color:#F87171;">2자리 이상 입력하세요</span>';return;}
  if(!/^[a-z0-9-]+$/.test(gid)){status.innerHTML='<span style="color:#F87171;">영문 소문자·숫자·하이픈만 사용 가능합니다</span>';return;}
  if(_currentGroups[gid]){status.innerHTML='<span style="color:#F87171;">❌ 이미 존재하는 그룹 ID입니다</span>';return;}
  status.innerHTML='<span style="color:#64748B;">생성 중...</span>';
  try{
    await db.ref('groups/'+gid+'/_init').set(true);
    closeModal();
    var groupsSnap=await db.ref('groups').get();
    showAdminView(_currentUser, groupsSnap.val()||{});
  }catch(e){status.innerHTML='<span style="color:#F87171;">생성 실패: '+e.message+'</span>';}
}

function confirmDeleteGroup(gid){
  if(!confirm('그룹 "'+gid+'"을 삭제하시겠습니까?\n\n⚠️ 그룹만 삭제되며 창고 데이터는 유지됩니다.')){return;}
  deleteGroup(gid);
}

async function deleteGroup(gid){
  try{
    await db.ref('groups/'+gid).remove();
    var groupsSnap=await db.ref('groups').get();
    showAdminView(_currentUser, groupsSnap.val()||{});
  }catch(e){alert('삭제 실패: '+e.message);}
}

function enterGroup(gid){
  localStorage.setItem('wms_adminGroupId', gid);
  localStorage.removeItem('wms_adminWhId');
  window.location.replace(getWmsPath());
}

  r(HOME_BTN
   +'<div class="card">'
   +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid #334155;">'
   +photo+'<div><div style="font-weight:700;font-size:14px;">'+(user.displayName||'사용자')+'</div>'
   +'<div style="font-size:11px;color:#64748B;">'+user.email+'</div></div></div>'
   +'<div style="font-size:13px;color:#94A3B8;margin-bottom:16px;font-weight:500;">관리자에게 받은 초대 코드를 입력하세요</div>'
   +'<div class="section-box">'
   +'<div style="font-size:13px;font-weight:700;margin-bottom:14px;">🔑 초대 코드 입력</div>'
   +'<div class="label">초대 코드 (6자리)</div>'
   +'<input id="inviteCodeInput" class="inp" placeholder="예: XK9F2A"'
   +' oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,\'\').slice(0,6);document.getElementById(\'codeStatus\').innerHTML=\'\'"'
   +' style="margin-bottom:6px;letter-spacing:4px;font-size:18px;font-weight:700;text-align:center;"/>'
   +'<div id="codeStatus" style="min-height:16px;margin-bottom:10px;text-align:center;"></div>'
   +'<button class="btn-secondary" onclick="useInviteCode()">참가하기</button>'
   +'</div>'
   +'<button onclick="doLogout()" style="width:100%;background:none;border:none;color:#475569;font-size:12px;margin-top:14px;cursor:pointer;padding:8px;text-decoration:underline;">로그아웃</button>'
   +'</div>');
}

async function useInviteCode(){
  var code=(document.getElementById('inviteCodeInput').value||'').trim().toUpperCase();
  var status=document.getElementById('codeStatus');
  if(!code||code.length!==6){status.innerHTML='<span class="err">6자리 코드를 입력하세요</span>';return;}
  status.innerHTML='<span class="info">확인 중...</span>';
  try{
    var snap=await db.ref('inviteCodes/'+code).get();
    if(!snap.exists()){status.innerHTML='<span style="color:#F87171;font-size:11px;">❌ 유효하지 않은 초대 코드입니다</span>';return;}
    var codeData=snap.val();
    if(codeData.usedBy){status.innerHTML='<span style="color:#F87171;font-size:11px;">❌ 이미 사용된 초대 코드입니다</span>';return;}
    if(codeData.expiresAt&&Date.now()>codeData.expiresAt){status.innerHTML='<span style="color:#F87171;font-size:11px;">❌ 만료된 초대 코드입니다</span>';return;}
    var user=auth.currentUser;
    var gid=codeData.groupId;
    await db.ref('userGroup/'+user.uid).set(gid);
    await db.ref('inviteCodes/'+code+'/usedBy').set(user.uid);
    status.innerHTML='<span style="color:#34D399;font-size:11px;">✅ 참가 완료!</span>';
    setTimeout(function(){window.location.replace(getWmsPath());},500);
  }catch(e){status.innerHTML='<span style="color:#F87171;font-size:11px;">오류: '+e.message+'</span>';}
}

async function doLogout(){await auth.signOut();showLogin();}

async function googleLogin(){
  var btn=document.getElementById('googleBtn');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spinner" style="width:18px;height:18px;margin:0;"></div><span>Google 로그인 페이지로 이동...</span>';}
  var provider=new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({'prompt':'select_account'});
  try{
    /* signInWithRedirect — 페이지가 Google로 갔다가 인증 후 돌아옴.
       돌아온 후 onAuthStateChanged가 자동으로 handleUser 호출. COOP 차단 영향 없음. */
    await auth.signInWithRedirect(provider);
    /* 이 줄 도달 직후 페이지가 redirect됨 */
  }catch(e){
    showLogin('로그인 실패: '+e.message);
  }
}

async function handleUser(user){
  showLoading('정보 확인 중...');
  try{
    var adminSnap=await db.ref('superadmins/'+user.uid).get();
    if(adminSnap.exists()){
      var groupsSnap=await db.ref('groups').get();
      showAdminView(user, groupsSnap.val()||{});
      return;
    }
    var groupSnap=await db.ref('userGroup/'+user.uid).get();
    if(groupSnap.exists()){
      window.location.replace(getWmsPath());
      return;
    }
    showSetup(user);
  }catch(e){showLogin('오류: '+e.message);}
}

showLoading('초기화 중...');
auth.onAuthStateChanged(function(user){
  if(user){handleUser(user);}
  else{showLogin();}
});
</script>
