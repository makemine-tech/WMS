<title>STAR 사진+정보 PDF</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--s1:#161b26;--s2:#1e2333;--br:#252b3b;
  --g:#4af0a8;--y:#f0c44a;--b:#5b9cf6;--r:#f05858;--p:#c084fc;
  --tx:#e8eaf0;--mu:#7c8399;--mo:'Courier New',monospace
}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
.app{width:min(98%,1400px);margin:0 auto;padding:1rem 1rem 2rem;flex:1}
.unified-ftr{text-align:center;padding:12px 20px;background:#1f2937;color:rgba(255,255,255,.35);font-size:10px;letter-spacing:.04em;margin-top:auto;width:100%}
h1{font-size:1.4rem;font-weight:900;margin:.4rem 0 .15rem}
h1 em{color:var(--p);font-style:normal}
.hint{color:var(--mu);font-size:.78rem;margin-bottom:1rem}
.msg{border-radius:7px;padding:.55rem .9rem;font-size:.8rem;margin:.5rem 0}
.ok{background:rgba(74,240,168,.08);border:1px solid var(--g);color:var(--g)}
.er{background:rgba(240,88,88,.1);border:1px solid var(--r);color:var(--r)}
.inf{background:rgba(91,156,246,.08);border:1px solid var(--b);color:var(--b)}
.warn{background:rgba(240,196,74,.08);border:1px solid var(--y);color:var(--y)}
.btn{padding:.55rem 1.1rem;border-radius:7px;border:none;font-size:.84rem;font-weight:700;cursor:pointer;transition:all .15s}
.btn-g{background:var(--g);color:#0f1117}.btn-g:hover:not(:disabled){background:#6affc0;transform:translateY(-1px)}
.btn-b{background:var(--b);color:#fff}.btn-b:hover:not(:disabled){background:#7bb0f8}
.btn-p{background:var(--p);color:#0f1117}.btn-p:hover:not(:disabled){background:#d3a3ff;transform:translateY(-1px)}
.btn-y{background:var(--y);color:#0f1117}.btn-y:hover:not(:disabled){background:#f7d068}
.btn-r{background:transparent;color:var(--r);border:1.5px solid rgba(240,88,88,.5)}.btn-r:hover{background:rgba(240,88,88,.08)}
.btn-s{background:var(--s2);color:var(--tx);border:1px solid var(--br)}.btn-s:hover{border-color:var(--mu)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}

.bar{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;padding:.8rem .9rem;background:var(--s1);border:1px solid var(--br);border-radius:9px;margin-bottom:.8rem}
.fb{position:relative;overflow:hidden;display:inline-block}
.fb input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.sum{font-size:.74rem;color:var(--mu);font-family:var(--mo);margin-left:auto}
.sum b{color:var(--g);font-weight:700}
.sum .mu{color:var(--y)}
.sum .er{color:var(--r);background:transparent;border:none;padding:0;display:inline}

/* 카드 그리드 (화면 표시용) */
.grid{display:grid;grid-template-columns:1fr;gap:.7rem}
.card{display:grid;grid-template-columns:240px 1fr;gap:.85rem;background:var(--s1);border:1px solid var(--br);border-radius:9px;padding:.7rem .85rem;align-items:start}
.card.unmatched{border-color:rgba(240,88,88,.4)}
.card.no-img{border-color:rgba(240,196,74,.4)}
.thumb{width:100%;aspect-ratio:1/1;background:#0a0d13;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
.thumb img{max-width:100%;max-height:100%;object-fit:contain}
.thumb .noimg{color:var(--mu);font-size:.72rem;font-family:var(--mo)}
.thumb .seq{position:absolute;top:.4rem;left:.4rem;background:rgba(0,0,0,.7);color:#fff;font-family:var(--mo);font-size:.64rem;padding:.14rem .42rem;border-radius:3px;letter-spacing:.06em}
.thumb .fn{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#fff;font-family:var(--mo);font-size:.6rem;padding:.16rem .42rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fields{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.4rem .55rem;align-content:start}
.fld{display:flex;flex-direction:column;gap:.18rem;min-width:0}
.fld label{font-size:.66rem;color:var(--mu);font-family:var(--mo);letter-spacing:.04em}
.fld input{background:#0a0d13;color:var(--tx);border:1px solid var(--br);border-radius:5px;padding:.36rem .5rem;font-size:.84rem;outline:none;width:100%}
.fld input:focus{border-color:var(--p)}
.fld input.empty{background:rgba(240,196,74,.04);border-color:rgba(240,196,74,.25)}
.card .badge{position:absolute;top:.4rem;right:.4rem;font-family:var(--mo);font-size:.62rem;padding:.12rem .42rem;border-radius:3px;letter-spacing:.05em}
.card.unmatched .badge{background:rgba(240,88,88,.18);color:var(--r);border:1px solid rgba(240,88,88,.4)}
.card.no-img .badge{background:rgba(240,196,74,.16);color:var(--y);border:1px solid rgba(240,196,74,.36)}

.empty-row{text-align:center;padding:1.8rem 1rem;color:var(--mu);font-size:.84rem;background:var(--s1);border:1px dashed var(--br);border-radius:9px;line-height:1.7}
.empty-row strong{color:var(--p)}

/* PDF 렌더링용 숨김 컨테이너 (A4 레이아웃) */
#pdfStage{position:fixed;left:-99999px;top:0;width:794px;background:#fff;color:#111}
.pdf-page{width:794px;height:1123px;padding:48px 52px;background:#fff;color:#000;display:flex;flex-direction:column;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;box-sizing:border-box;overflow:hidden}
.pdf-page .pdf-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;border:1.5px solid #ddd;border-radius:6px;background:#fafafa;padding:8px;overflow:hidden}
.pdf-page .pdf-img-wrap img{max-width:100%;max-height:100%;object-fit:contain}
.pdf-page .pdf-img-wrap .no{color:#999;font-size:14px}
.pdf-page .pdf-info{margin-top:18px;border-top:2px solid #222;padding-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;font-size:13px;color:#222}
.pdf-page .pdf-row{display:grid;grid-template-columns:90px 1fr;gap:8px;border-bottom:1px solid #eee;padding:5px 0;align-items:baseline}
.pdf-page .pdf-row label{font-size:11px;color:#666;font-weight:600;letter-spacing:.02em}
.pdf-page .pdf-row span{color:#111;word-break:break-all;font-size:13px;font-weight:500}
.pdf-page .pdf-foot{margin-top:14px;display:flex;justify-content:space-between;color:#999;font-size:10px;font-family:'Courier New',monospace;border-top:1px solid #eee;padding-top:8px}

/* 헤더 */
.hdr-home-btn{display:inline-flex;align-items:center;gap:5px;text-decoration:none;color:rgba(255,255,255,.72);font-family:system-ui,sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;padding:5px 11px;border:1px solid rgba(255,255,255,.22);border-radius:999px;flex-shrink:0;white-space:nowrap}
.hdr-home-btn:hover{color:#fff;border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.08)}
@media(max-width:380px){.hdr-home-txt{display:none}}

@media(max-width:720px){
  .card{grid-template-columns:1fr}
  .fields{grid-template-columns:1fr 1fr}
}
</style>

    <div style="min-width:0">

<div class="app">
<h1>📑 사진 + 정보 → <em>PDF</em></h1>
<p class="hint">사진 폴더와 정보 파일(CSV/XLSX)을 올리면 파일명 기준으로 자동 매칭. 우측 텍스트 수정 가능. 한 항목 = 한 페이지로 PDF 생성.</p>

<div id="m0" class="msg" style="display:none"></div>

<!-- 액션 바 -->
<div class="bar">
  <span class="btn btn-b fb">📁 사진 폴더 선택
    <input type="file" webkitdirectory directory multiple onchange="onFolder(this.files);this.value='';">
  </span>
  <span class="btn btn-p fb">📄 정보 파일 (CSV·XLSX)
    <input type="file" accept=".csv,.xlsx,.xls" onchange="onInfoFile(this.files[0]);this.value='';">
  </span>
  <button class="btn btn-g" id="btnPdf" onclick="downloadPdf()" disabled>📑 PDF 다운로드</button>
  <button class="btn btn-r" id="btnReset" onclick="resetAll()" disabled>🗑 초기화</button>
  <span class="sum" id="sumLine">사진 0 · 정보 0 · 매칭 0</span>
</div>

<!-- 카드 그리드 -->
<div id="grid"></div>

<!-- PDF 렌더링용 무대 (화면 밖) -->
<div id="pdfStage"></div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<script src="wms_sync.js"></script>
<script>
/* ─────────────── 상태 ─────────────── */
var photos = [];     // [{name, baseName, file, blobUrl}]
var infoRows = [];   // [{...columns}]
var infoCols = [];   // 열 이름 (헤더)
var items = [];      // 매칭 결과: [{photo, row, key, status:'matched'|'photo_only'|'row_only', overrides:{...}}]

/* ─────────────── 공용 ─────────────── */
function setMsg(id, kind, html){ var el=document.getElementById(id); if(!el)return; el.className='msg '+kind; el.innerHTML=html; el.style.display=''; }
function hideMsg(id){ var el=document.getElementById(id); if(el) el.style.display='none'; }
function escH(s){ if(s===null||s===undefined)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return escH(s).replace(/"/g,'&quot;'); }
function stripExt(name){ return String(name||'').replace(/\.[^.]+$/,''); }
function normKey(s){ return String(s==null?'':s).trim().toUpperCase(); }
function pad2(n){ n=String(n); return n.length<2?'0'+n:n; }

/* ─────────────── 인증 ─────────────── */
function wmsLogout(){
  if (!window.WMSync || !WMSync.isReady()) return;
  if (!confirm('로그아웃하면 로그인 화면으로 이동합니다.')) return;
  WMSync.signOut().then(function(){ window.location.replace('/wms_login.html'); });
}
function wmsBadge(state){
  var dot=document.getElementById('syncDot'), label=document.getElementById('syncLabel'), btn=document.getElementById('syncBtn');
  if (state && state.user && state.groupId) {
    dot.style.background='#c084fc'; label.textContent = state.user.email || state.user.uid; label.style.color='#c084fc'; btn.style.display='';
  } else if (state && state.user) {
    dot.style.background='#f0c44a'; label.textContent='권한 없음'; label.style.color='#f0c44a'; btn.style.display='';
  } else {
    dot.style.background='#888'; label.textContent='로그인 필요'; label.style.color='rgba(255,255,255,.6)'; btn.style.display='none';
  }
}
function wmsHandleAuth(state){
  wmsBadge(state);
  var returnUrl = '/wms_login.html?return=' + encodeURIComponent(location.pathname + location.search);
  if (!state.user) { setTimeout(function(){ if(!WMSync.isSignedIn()) window.location.replace(returnUrl); }, 3000); return; }
  if (!state.groupId) { alert('이 계정은 작업 그룹에 등록되어 있지 않습니다.\n관리자에게 초대 코드를 요청하세요.'); window.location.replace(returnUrl); return; }
}

/* ─────────────── 사진 폴더 ─────────────── */
function onFolder(fileList){
  if (!fileList || !fileList.length) return;
  /* 기존 blob URL 정리 */
  photos.forEach(function(p){ if (p.blobUrl) try{ URL.revokeObjectURL(p.blobUrl); }catch(e){} });
  photos = [];
  var skipped = 0;
  for (var i=0; i<fileList.length; i++) {
    var f = fileList[i];
    if (!/^image\//i.test(f.type) && !/\.(jpe?g|png|webp|gif)$/i.test(f.name)) { skipped++; continue; }
    if (/\.heic$/i.test(f.name)) { skipped++; continue; }
    photos.push({
      name: f.name,
      baseName: stripExt(f.name),
      file: f,
      blobUrl: URL.createObjectURL(f)
    });
  }
  photos.sort(function(a,b){ return a.name < b.name ? -1 : 1; });
  setMsg('m0','ok','📁 사진 '+photos.length+'장 추가됨'+(skipped?' (이미지 아님/HEIC '+skipped+'장 제외)':''));
  matchAndRender();
}

/* ─────────────── 정보 파일 ─────────────── */
function onInfoFile(file){
  if (!file) return;
  var ext = (file.name.match(/\.([^.]+)$/) || ['',''])[1].toLowerCase();
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      if (ext === 'csv') {
        var text = new TextDecoder('utf-8').decode(new Uint8Array(e.target.result));
        /* BOM 제거 */
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        parseCsv(text);
      } else {
        var wb = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
        var ws = wb.Sheets[wb.SheetNames[0]];
        var aoa = XLSX.utils.sheet_to_json(ws, { header:1, defval:'', raw:false });
        parseAoa(aoa);
      }
      setMsg('m0','ok','📄 정보 '+infoRows.length+'행 인식 · 열: '+infoCols.join(' · '));
      matchAndRender();
    } catch(err) {
      console.error(err);
      setMsg('m0','er','❌ 정보 파일 분석 실패: '+err.message);
    }
  };
  reader.onerror = function(){ setMsg('m0','er','❌ 파일 읽기 실패'); };
  reader.readAsArrayBuffer(file);
}
function parseCsv(text){
  /* 간단 CSV 파서 — 따옴표 안 콤마/줄바꿈 지원 */
  var rows = []; var cur = []; var field = ''; var inQ = false;
  for (var i=0; i<text.length; i++) {
    var c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; }
        else inQ = false;
      } else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { cur.push(field); field = ''; }
      else if (c === '\r') {}
      else if (c === '\n') { cur.push(field); rows.push(cur); cur = []; field = ''; }
      else field += c;
    }
  }
  if (field.length || cur.length) { cur.push(field); rows.push(cur); }
  parseAoa(rows);
}
function parseAoa(aoa){
  if (!aoa.length) { infoRows = []; infoCols = []; return; }
  infoCols = aoa[0].map(function(h){ return String(h==null?'':h).trim(); });
  infoRows = [];
  for (var i=1; i<aoa.length; i++) {
    var r = aoa[i];
    if (!r || !r.length) continue;
    var allEmpty = r.every(function(v){ return v==null || String(v).trim()===''; });
    if (allEmpty) continue;
    var obj = {};
    infoCols.forEach(function(c, j){ obj[c] = r[j] == null ? '' : String(r[j]); });
    infoRows.push(obj);
  }
}

/* ─────────────── 매칭 ─────────────── */
/* 파일명(확장자 제외)과 정보 행의 키 컬럼 값으로 매칭. 키 컬럼 자동 감지:
   barcode / new_name / filename / 바코드 / 파일명 중 첫 일치 */
function detectKeyCol(){
  if (!infoCols.length) return null;
  var candidates = ['barcode','new_name','filename','파일명','바코드','file_name'];
  for (var i=0; i<candidates.length; i++) {
    var key = infoCols.find(function(c){ return c.toLowerCase() === candidates[i].toLowerCase(); });
    if (key) return key;
  }
  /* 못 찾으면 첫 열 */
  return infoCols[0];
}
function matchAndRender(){
  items = [];
  var keyCol = detectKeyCol();
  var byKey = {};  // norm(key) → row
  if (keyCol) {
    infoRows.forEach(function(r){
      var k = normKey(stripExt(r[keyCol]));
      if (k) byKey[k] = r;
    });
  }
  var usedRows = {};
  /* 사진 기준 매칭 */
  photos.forEach(function(p){
    var k = normKey(p.baseName);
    var row = byKey[k];
    if (row) usedRows[k] = true;
    items.push({
      photo: p,
      row: row || null,
      key: k,
      status: row ? 'matched' : 'photo_only',
      overrides: {}
    });
  });
  /* 정보만 있는 행 — 사진 없는 항목으로 추가 */
  infoRows.forEach(function(r){
    var k = normKey(stripExt(r[keyCol]));
    if (k && !usedRows[k]) {
      items.push({ photo:null, row:r, key:k, status:'row_only', overrides:{} });
    }
  });
  updateSum();
  renderGrid();
  refreshButtons();
}
function updateSum(){
  var matched = items.filter(function(it){ return it.status==='matched'; }).length;
  var photoOnly = items.filter(function(it){ return it.status==='photo_only'; }).length;
  var rowOnly = items.filter(function(it){ return it.status==='row_only'; }).length;
  var html = '사진 <b>'+photos.length+'</b> · 정보 <b>'+infoRows.length+'</b> · 매칭 <b>'+matched+'</b>';
  if (photoOnly) html += ' · <span class="er">정보없음 '+photoOnly+'</span>';
  if (rowOnly)   html += ' · <span class="mu">사진없음 '+rowOnly+'</span>';
  document.getElementById('sumLine').innerHTML = html;
}
function refreshButtons(){
  var hasContent = items.length > 0;
  document.getElementById('btnPdf').disabled = !hasContent;
  document.getElementById('btnReset').disabled = !hasContent && photos.length===0 && infoRows.length===0;
}

/* ─────────────── 그리드 렌더 ─────────────── */
function renderGrid(){
  var g = document.getElementById('grid');
  if (!items.length) {
    g.className = '';
    g.innerHTML = '<div class="empty-row">'+
      '📁 <strong>사진 폴더</strong>와 📄 <strong>정보 파일</strong>을 올리면 자동 매칭되어 카드가 표시됩니다.<br>'+
      '<span style="font-size:.74rem;color:var(--mu)">정보 파일의 <code style="font-family:var(--mo);color:var(--y)">barcode</code> 또는 <code style="font-family:var(--mo);color:var(--y)">new_name</code> 컬럼 값과 사진 파일명(확장자 제외)이 일치하면 자동 짝지어집니다.</span></div>';
    return;
  }
  g.className = 'grid';
  /* 표시 컬럼 — 매칭에 사용된 키 제외하고 표시 */
  var displayCols = infoCols.slice();
  g.innerHTML = items.map(function(it, i){
    var p = it.photo, r = it.row || {};
    var cls = it.status === 'matched' ? '' : (it.status === 'photo_only' ? 'unmatched' : 'no-img');
    var badge = it.status === 'matched' ? '' :
                it.status === 'photo_only' ? '<span class="badge">정보 없음</span>' :
                                              '<span class="badge">사진 없음</span>';
    var thumb = p
      ? '<div class="thumb"><img src="'+escAttr(p.blobUrl)+'" alt="" loading="lazy"><span class="seq">#'+(i+1)+'</span><span class="fn" title="'+escAttr(p.name)+'">'+escH(p.name)+'</span></div>'
      : '<div class="thumb"><span class="noimg">사진 없음</span><span class="seq">#'+(i+1)+'</span></div>';
    var fields = displayCols.map(function(col){
      var raw = it.overrides[col] != null ? it.overrides[col] : (r[col] || '');
      var emptyCls = String(raw).trim() === '' ? ' empty' : '';
      return '<div class="fld">'+
        '<label>'+escH(col)+'</label>'+
        '<input type="text" value="'+escAttr(raw)+'" class="'+emptyCls.trim()+'" oninput="editField('+i+',\''+escAttr(col)+'\',this.value)">'+
      '</div>';
    }).join('');
    if (!displayCols.length) {
      fields = '<div style="grid-column:1/-1;color:var(--mu);font-size:.78rem;padding:.4rem 0">정보 파일이 없습니다. 위쪽 <strong style="color:var(--p)">📄 정보 파일</strong>을 업로드하세요.</div>';
    }
    return '<div class="card '+cls+'" style="position:relative">'+thumb+
      '<div class="fields">'+badge+fields+'</div>'+
    '</div>';
  }).join('');
}
function editField(idx, col, val){
  var it = items[idx];
  if (!it) return;
  it.overrides[col] = val;
}

/* ─────────────── 초기화 ─────────────── */
function resetAll(){
  if (!photos.length && !infoRows.length) return;
  if (!confirm('업로드된 사진과 정보를 모두 비우고 초기 상태로 돌립니다.\n진행할까요?')) return;
  photos.forEach(function(p){ if (p.blobUrl) try{ URL.revokeObjectURL(p.blobUrl); }catch(e){} });
  photos = []; infoRows = []; infoCols = []; items = [];
  updateSum(); renderGrid(); refreshButtons();
  setMsg('m0','warn','🗑 초기화 완료');
}

/* ─────────────── PDF 생성 (html2canvas + jsPDF) ─────────────── */
function getField(it, col){
  if (!it) return '';
  if (it.overrides && it.overrides[col] != null) return it.overrides[col];
  if (it.row && it.row[col] != null) return it.row[col];
  return '';
}
function buildPdfPageHtml(it, idx, total){
  var p = it.photo;
  var cols = infoCols.length ? infoCols : ['barcode','품명','품번','컬러','사이즈','원산지'];
  /* 2열 그리드로 정보 배치 */
  var info = cols.map(function(col){
    var v = getField(it, col);
    return '<div class="pdf-row"><label>'+escH(col)+'</label><span>'+escH(v||'')+'</span></div>';
  }).join('');
  var imgHtml = p
    ? '<img src="'+escAttr(p.blobUrl)+'" alt="">'
    : '<div class="no">사진 없음</div>';
  return '<div class="pdf-page">'+
    '<div class="pdf-img-wrap">'+imgHtml+'</div>'+
    '<div class="pdf-info">'+info+'</div>'+
    '<div class="pdf-foot"><span>'+escH(it.key||p&&p.baseName||'')+'</span><span>'+(idx+1)+' / '+total+'</span></div>'+
  '</div>';
}
function waitImagesLoaded(container){
  var imgs = container.querySelectorAll('img');
  if (!imgs.length) return Promise.resolve();
  return Promise.all(Array.prototype.map.call(imgs, function(img){
    if (img.complete && img.naturalWidth > 0) return Promise.resolve();
    return new Promise(function(res){
      img.onload = res; img.onerror = res;
      setTimeout(res, 5000);  /* 타임아웃 안전망 */
    });
  }));
}
function downloadPdf(){
  if (!items.length) { setMsg('m0','warn','⚠️ 매칭된 항목이 없습니다'); return; }
  if (typeof html2canvas === 'undefined' || !window.jspdf) {
    setMsg('m0','er','❌ PDF 라이브러리 로딩 실패 — 새로고침 후 재시도'); return;
  }
  var btn = document.getElementById('btnPdf');
  btn.disabled = true; var prev = btn.textContent;
  setMsg('m0','inf','📑 PDF 생성 중... 0 / '+items.length);

  var jsPDF = window.jspdf.jsPDF;
  var pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4', compress:true });
  /* A4: 210 × 297 mm — 794 × 1123 px @ 96dpi */
  var pageW = 210, pageH = 297;
  var stage = document.getElementById('pdfStage');

  function processOne(i){
    if (i >= items.length) {
      var d = new Date();
      var ts = d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate())+'_'+pad2(d.getHours())+pad2(d.getMinutes());
      pdf.save('star_extract_'+ts+'.pdf');
      btn.disabled = false; btn.textContent = prev;
      stage.innerHTML = '';
      setMsg('m0','ok','✅ PDF 다운로드 완료 — '+items.length+'페이지');
      return;
    }
    setMsg('m0','inf','📑 PDF 생성 중... '+(i+1)+' / '+items.length+' &mdash; '+escH(items[i].key || (items[i].photo && items[i].photo.name) || '항목 '+(i+1)));
    stage.innerHTML = buildPdfPageHtml(items[i], i, items.length);
    var page = stage.firstChild;
    waitImagesLoaded(page).then(function(){
      return html2canvas(page, { scale: 1.5, backgroundColor:'#ffffff', logging:false, useCORS:true });
    }).then(function(canvas){
      var imgData = canvas.toDataURL('image/jpeg', 0.85);
      if (i > 0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, 0, pageW, pageH);
      /* 다음 항목 비동기 진행 — 메인 스레드 양보 */
      setTimeout(function(){ processOne(i+1); }, 30);
    }).catch(function(err){
      console.error('[PDF page error]', err);
      setMsg('m0','er','❌ '+(i+1)+'페이지 생성 실패: '+(err && err.message || err));
      btn.disabled = false; btn.textContent = prev;
      stage.innerHTML = '';
    });
  }
  processOne(0);
}

/* ─────────────── 초기 부팅 ─────────────── */
(function init(){
  if (!window.WMSync) { setMsg('m0','er','❌ 인증 모듈 로딩 실패 — 새로고침하세요'); return; }
  WMSync.init('star_extract', { requireAuth: true });
  WMSync.onAuth(function(state){ wmsHandleAuth(state); });
  renderGrid();
})();
</script>
