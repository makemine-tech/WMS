<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<!-- CSP 없음 / SES lockdown 우회를 위해 Popup 방식 사용 -->
<title>메이크창고 WMS — 로그인</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0F172A;font-family:system-ui,sans-serif;color:#E2E8F0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#1E293B;border-radius:20px;padding:32px 28px;width:100%;max-width:420px;box-shadow:0 8px 48px rgba(0,0,0,.5);}
.inp{width:100%;background:#0F172A;border:1px solid #334155;border-radius:8px;padding:10px 12px;color:#E2E8F0;font-size:14px;outline:none;font-family:inherit;}
.inp:focus{border-color:#3B82F6;}
.label{display:block;font-size:11px;color:#64748B;margin-bottom:5px;font-weight:600;letter-spacing:.04em;}
.section-box{background:rgba(255,255,255,.03);border:1px solid #334155;border-radius:12px;padding:18px;}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#1a1a1a;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.btn-google:hover{opacity:.9;}
.btn-google:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{width:100%;background:#2563EB;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-primary:disabled{background:#334155;color:#64748B;cursor:not-allowed;}
.btn-secondary{width:100%;background:rgba(59,130,246,.15);color:#60A5FA;border:1px solid rgba(59,130,246,.3);border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;}
.err{color:#F87171;font-size:11px;}
.ok{color:#34D399;font-size:11px;}
.info{color:#64748B;font-size:11px;}
footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:8px;font-size:9px;color:#1E293B;pointer-events:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid #334155;border-top-color:#3B82F6;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
</style>
</head>
<body>
<div id="app"></div>
<footer>© 2026 Makemine Design. All rights reserved. CEO Park Kyoung-woo</footer>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyAM2t9dvtStrXNam-YAiq19yD8FHwKpPmI",
  authDomain:"makechango-wms.firebaseapp.com",
  databaseURL:"https://makechango-wms-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"makechango-wms",
  storageBucket:"makechango-wms.firebasestorage.app",
  messagingSenderId:"333385336098",
  appId:"1:333085336098:web:94f07492421965ab32917b"
});
var auth=firebase.auth();
var db=firebase.database();
var appEl=document.getElementById('app');

function getWmsPath(){
  return window.location.origin+'/wms.html';
}
function r(html){appEl.innerHTML=html;}

function showLoading(msg){
  r('<div style="text-align:center;">'
   +'<div class="spinner" style="margin-bottom:16px;"></div>'
   +'<div style="color:#64748B;font-size:13px;">'+(msg||'로딩 중...')+'</div>'
   +'</div>');
}

function showLogin(errMsg){
  r('<div class="card">'
   +'<div style="text-align:center;margin-bottom:32px;">'
   +'<div style="font-size:56px;margin-bottom:12px;line-height:1;">📦</div>'
   +'<div style="font-size:22px;font-weight:800;letter-spacing:-.3px;">메이크창고 WMS</div>'
   +'<div style="font-size:12px;color:#94A3B8;margin-top:5px;">창고관리 시스템 ver 01</div>'
   +'<div style="font-size:11px;color:#475569;margin-top:2px;">제작 · 메이크창고 대표 박경우</div>'
   +'</div>'
   +(errMsg?'<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 12px;font-size:12px;color:#F87171;margin-bottom:14px;">'+errMsg+'</div>':'')
   +'<button id="googleBtn" class="btn-google" onclick="googleLogin()">'
   +'<svg width="20" height="20" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.31z"/></svg>'
   +'Google 계정으로 로그인</button>'
   +'<div style="margin-top:14px;font-size:11px;color:#475569;text-align:center;">팝업이 차단된 경우 브라우저 팝업 허용 후 재시도하세요</div>'
   +'</div>');
}

/* ── 신규 사용자: 그룹 ID 입력 화면 ── */
function showSetup(user){
  var photo=user.photoURL
    ?'<img src="'+user.photoURL+'" style="width:36px;height:36px;border-radius:50%;border:2px solid #334155;" onerror="this.style.display=\'none\'"/>'
    :'<div style="width:36px;height:36px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-size:18px;">👤</div>';
  r('<div class="card">'
   +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid #334155;">'
   +photo+'<div><div style="font-weight:700;font-size:14px;">'+(user.displayName||'사용자')+'</div>'
   +'<div style="font-size:11px;color:#64748B;">'+user.email+'</div></div></div>'
   +'<div style="font-size:13px;color:#94A3B8;margin-bottom:16px;font-weight:500;">관리자에게 받은 그룹 ID를 입력하세요</div>'
   +'<div class="section-box">'
   +'<div style="font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px;">🔑 그룹 참가</div>'
   +'<div class="label">그룹 ID</div>'
   +'<input id="joinGroupId" class="inp" placeholder="그룹ID 생성관리자에게 문의" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9-]/g,\'\');document.getElementById(\'joinStatus\').innerHTML=\'\'" style="margin-bottom:6px;"/>'
   +'<div id="joinStatus" style="min-height:16px;margin-bottom:10px;"></div>'
   +'<button class="btn-secondary" onclick="joinGroup()">참가하기</button>'
   +'</div>'
   +'<button onclick="doLogout()" style="width:100%;background:none;border:none;color:#475569;font-size:12px;margin-top:14px;cursor:pointer;padding:8px;text-decoration:underline;">로그아웃</button>'
   +'</div>');
}

/* ── 슈퍼관리자: 전체 창고 목록 ── */
function showAdminView(user,warehouses){
  var whHtml='';
  if(!warehouses||Object.keys(warehouses).length===0){
    whHtml='<div style="text-align:center;color:#64748B;padding:20px;font-size:13px;">등록된 창고가 없습니다</div>';
  }else{
    Object.entries(warehouses).forEach(function(entry){
      var wid=entry[0],w=entry[1];
      var memberCount=w.members?Object.keys(w.members).length:0;
      var name=(w.info&&w.info.name)||w.name||wid;
      whHtml+='<div onclick="enterWarehouse(\''+wid+'\')" style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid #334155;border-radius:10px;cursor:pointer;margin-bottom:8px;" onmouseover="this.style.background=\'rgba(59,130,246,.1)\'" onmouseout="this.style.background=\'rgba(255,255,255,.04)\'">'
      +'<span style="font-size:20px;">📦</span>'
      +'<div style="flex:1;"><div style="font-weight:700;font-size:14px;">'+name+'</div>'
      +'<div style="font-size:11px;color:#64748B;">'+wid+' · 멤버 '+memberCount+'명</div></div>'
      +'<span style="color:#64748B;font-size:16px;">›</span></div>';
    });
  }
  r('<div class="card">'
   +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #334155;">'
   +'<div style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;color:#F87171;">🛡️ 슈퍼관리자</div>'
   +'<div style="flex:1;"><div style="font-weight:700;font-size:13px;">'+(user.displayName||'')+'</div>'
   +'<div style="font-size:11px;color:#64748B;">'+user.email+'</div></div>'
   +'<button onclick="doLogout()" style="background:none;border:none;color:#64748B;font-size:12px;cursor:pointer;text-decoration:underline;">로그아웃</button></div>'
   +'<div style="font-size:14px;font-weight:700;margin-bottom:12px;">전체 창고 목록</div>'
   +whHtml+'</div>');
}

function enterWarehouse(wid){
  localStorage.setItem('wms_adminWhId',wid);
  window.location.replace(getWmsPath());
}

/* ── 그룹 참가 ── */
async function joinGroup(){
  var gid=(document.getElementById('joinGroupId').value||'').trim();
  var status=document.getElementById('joinStatus');
  if(!gid){status.innerHTML='<span class="err">그룹 ID를 입력하세요</span>';return;}
  status.innerHTML='<span class="info">확인 중...</span>';
  try{
    var snap=await db.ref('groups/'+gid).get();
    if(!snap.exists()){
      status.innerHTML='<span class="err">❌ 존재하지 않는 그룹 ID입니다</span>';
      return;
    }
    var user=auth.currentUser;
    await db.ref('userGroup/'+user.uid).set(gid);
    window.location.replace(getWmsPath());
  }catch(e){
    status.innerHTML='<span class="err">참가 실패: '+e.message+'</span>';
  }
}

async function doLogout(){
  await auth.signOut();
  showLogin();
}

/* ── 구글 로그인 (Popup 방식) ── */
async function googleLogin(){
  var btn=document.getElementById('googleBtn');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spinner" style="width:18px;height:18px;margin:0;"></div><span>로그인 중...</span>';}
  var provider=new firebase.auth.GoogleAuthProvider();
  try{
    var result=await auth.signInWithPopup(provider);
    if(result&&result.user){await handleUser(result.user);}
  }catch(e){
    if(e.code==='auth/popup-blocked'||e.code==='auth/popup-closed-by-user'){
      showLogin('팝업이 차단되었습니다. 브라우저 주소창 우측의 팝업 차단 아이콘을 클릭해 허용해주세요.');
    }else{
      showLogin('로그인 실패: '+e.message);
    }
  }
}

/* ── 로그인 후 처리 ── */
async function handleUser(user){
  showLoading('정보 확인 중...');
  try{
    /* 슈퍼관리자 확인 */
    var adminSnap=await db.ref('superadmins/'+user.uid).get();
    if(adminSnap.exists()){
      var whSnap=await db.ref('warehouses').get();
      showAdminView(user,whSnap.val()||{});
      return;
    }
    /* 일반 사용자 — userGroup 확인 */
    var groupSnap=await db.ref('userGroup/'+user.uid).get();
    if(groupSnap.exists()){
      window.location.replace(getWmsPath());
      return;
    }
    /* 신규 사용자 — 그룹 참가 화면 */
    showSetup(user);
  }catch(e){showLogin('오류: '+e.message);}
}

/* ── 초기화 ── */
showLoading('초기화 중...');
auth.onAuthStateChanged(function(user){
  if(user){handleUser(user);}
  else{showLogin();}
});
</script>
</body>
</html>
