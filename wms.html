/* Firebase는 null 값을 필드째 삭제함 → 로드 시 반드시 정규화 */
function normalizeWH(raw){
  if(!raw||!raw.id)return null;
  var wh=Object.assign({inQ:[],history:[],undoStack:[],pColors:{},sheetsUrl:'',pendOut:[]},raw);
  if(!Array.isArray(wh.inQ))wh.inQ=[];
  if(!Array.isArray(wh.history))wh.history=[];
  if(!Array.isArray(wh.undoStack))wh.undoStack=[];
  if(!Array.isArray(wh.pendOut))wh.pendOut=[];
  if(!wh.pColors||typeof wh.pColors!=='object')wh.pColors={};
  var cells={};
  for(var r=0;r<(wh.rows||0);r++){
    for(var c=0;c<(wh.cols||0);c++){
      var key=r+'-'+c;
      var cell=(wh.cells&&wh.cells[key])||{};
      var dR=cell.divR||1,dC=cell.divC||1;
      var slots={};
      for(var sr=0;sr<dR;sr++)for(var sc=0;sc<dC;sc++){
        var sk=sr+'-'+sc;
        var sv=(cell.slots&&cell.slots[sk]!==undefined)?cell.slots[sk]:null;
        slots[sk]=sv;
      }
      cells[key]={type:cell.type||null,divR:dR,divC:dC,slots:slots};
    }
  }
  wh.cells=cells;
  return wh;
}

function dbListen(cb){
  dbOff();
  var ref=fbDb.ref(WH_PATH);

    var v=snap.val();
    if(!v){cb([]);return;}
    var arr=Object.values(v).map(normalizeWH).filter(Boolean);
    cb(arr);
  },function(e){console.warn('dbListen',e);});
  _listeners.push({ref:ref,evt:'value'});
}

    if(v&&!v.error){cb([normalizeWH(v)]);}

  },function(e){console.warn('dbListenOne',e);});
  _listeners.push({ref:ref,evt:'value'});
}
/* 구독 해제 */
function dbOff(){
  _listeners.forEach(function(l){l.ref.off(l.evt);});

function fmtExp(s){return s&&s.length===6?'20'+s.slice(0,2)+'.'+s.slice(2,4)+'.'+s.slice(4,6):(s||'');}
function fmtShort(s){return s&&s.length===6?s.slice(2,4)+'/'+s.slice(4,6):'';}
function deep(o){return JSON.parse(JSON.stringify(o));}
function copyText(t){var ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;top:-9999px;left:-9999px';document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,99999999);var ok=document.execCommand('copy');document.body.removeChild(ta);return ok;}

function getExpSt(exp){
  if(!exp||exp.length!==6)return 'ok';
  var d=new Date('20'+exp.slice(0,2)+'-'+exp.slice(2,4)+'-'+exp.slice(4,6));
  var now=new Date();now.setHours(0,0,0,0);
  if(d<now)return 'expired';
  if((d-now)/86400000<=90)return 'imminent';
  return 'ok';
}

/* 창고 헬퍼 */
function mkSlots(r,c){var s={};for(var i=0;i<r;i++)for(var j=0;j<c;j++)s[i+'-'+j]=null;return s;}
function mkCell(tp,dr,dc){return{type:tp,divR:dr,divC:dc,slots:mkSlots(dr,dc)};}
function mkWH(name,rows,cols){
  var cells={};
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)cells[r+'-'+c]={type:null,divR:1,divC:1,slots:{'0-0':null}};
  return{id:uid(),name:name,rows:rows,cols:cols,cells:cells,inQ:[],history:[],undoStack:[],pColors:{},sheetsUrl:'',pendOut:[]};
}
function calcSt(wh){
  var tot=0,used=0;
  Object.values(wh.cells).forEach(function(c){if(c.type==='rack'||c.type==='shelf'){tot+=c.divR*c.divC;used+=Object.values(c.slots).filter(Boolean).length;}});
  return{tot:tot,used:used,free:tot-used};
}
function getPG(wh,cells){
  var src=cells||wh.cells,m={};
  Object.values(src).forEach(function(c){
    Object.values(c.slots).forEach(function(s){
      if(!s)return;
      var clr=wh.pColors[s.name]||'#94A3B8';
      if(!m[s.name])m[s.name]={name:s.name,cnt:0,totalQty:0,clr:clr,exps:{}};
      m[s.name].cnt++;m[s.name].totalQty+=s.qty||0;
      var ek=s.exp||'';
      if(!m[s.name].exps[ek])m[s.name].exps[ek]={exp:ek,cnt:0,totalQty:0};
      m[s.name].exps[ek].cnt++;m[s.name].exps[ek].totalQty+=s.qty||0;
    });
  });
  return Object.values(m).map(function(p){
    return Object.assign({},p,{exps:Object.values(p.exps).sort(function(a,b){if(!a.exp)return 1;if(!b.exp)return -1;return a.exp.localeCompare(b.exp);})});
  });
}
function pickClr(wh,name){
  if(wh.pColors[name])return wh.pColors[name];
  var used=new Set(Object.values(wh.pColors));
  return PAL.find(function(c){return !used.has(c);})||PAL[0];
}
function setClrMap(existing,key,val){var n=Object.assign({},existing);n[key]=val;return n;}
function buildTSV(wh,cells,stats,label){
  var tl={rack:'랙',empty:'빈공간',unused:'미사용',shelf:'보관'};
  function esc(v){return String(v||'').replace(/\t/g,' ').replace(/\n/g,' ');}
  var rows=[['창고:'+esc(wh.name),'저장:'+esc(label||'현재'),'전체:'+stats.tot,'사용:'+stats.used,'여유:'+stats.free],[],[''].concat(Array.from({length:wh.cols},function(_,i){return 'C'+(i+1);}))];
  for(var r=0;r<wh.rows;r++){
    var row=['R'+(r+1)];
    for(var c=0;c<wh.cols;c++){
      var cell=cells&&cells[r+'-'+c];
      if(!cell||!cell.type){row.push('');continue;}
      var sv=Object.values(cell.slots||{}).filter(Boolean);
      if(!sv.length){row.push('['+(tl[cell.type]||cell.type)+']');continue;}
      row.push(sv.map(function(s){return esc(s.name)+(s.exp?' ~'+fmtExp(s.exp):'')+' ('+s.qty+'개)';}).join(' / '));
    }
    rows.push(row);
  }
  return rows.map(function(rr){return rr.join('\t');}).join('\n');
}

/* PEND GROUP */
function PendGroup(p){
  var items=p.items,wh=p.wh;
  var sg=useState(true),open=sg[0],setOpen=sg[1];
  var first=items[0];
  var lbl=(first.date||'')+(first.loc?('-'+first.loc):'');
  var totalQty=items.reduce(function(acc,x){return acc+(x.slot.qty||0);},0);
  return h('div',{style:{marginBottom:6,border:'1px solid rgba(245,158,11,.25)',borderRadius:7,overflow:'hidden'}},
    h('div',{onClick:function(){setOpen(function(v){return !v;});},style:{display:'flex',alignItems:'center',gap:6,padding:'6px 10px',background:'rgba(245,158,11,.10)',cursor:'pointer'}},

      h('span',{style:{fontSize:11,color:'#FBBF24',fontWeight:600,flex:1}},items.length+'팔 / 총 '+totalQty.toLocaleString()+'개'),

      h('button',{style:S('#DC2626','#fff',{padding:'2px 8px',fontSize:10,flexShrink:0}),

      h('button',{style:S('rgba(255,255,255,.07)','#94A3B8',{padding:'2px 7px',fontSize:10,flexShrink:0}),
        onClick:function(e){e.stopPropagation();p.onWithdrawAll(items.map(function(it){return it.qid;}));}

function App(){
  var s1=useState('loading'),authSt=s1[0],setAuthSt=s1[1];
  var s2=useState(null),fbUser=s2[0],setFbUser=s2[1];
  var s3=useState(false),isAdmin=s3[0],setIsAdmin=s3[1];
  var s4=useState([]),whs=s4[0],setWhs=s4[1];
  var s5=useState(null),whId=s5[0],setWhId=s5[1];

  var whsRef=useRef([]);
  whsRef.current=whs;

  useEffect(function(){
  var INDEX_PATH=window.location.pathname.replace('wms.html','')+'index.html';
    var unsub=fbAuth.onAuthStateChanged(function(user){
      if(!user){window.location.href=INDEX_PATH;return;}
      setFbUser(user);

      /* 슈퍼관리자 확인 */
      fbDb.ref('superadmins/'+user.uid).get().then(function(adminSnap){
        if(adminSnap.exists()){
          setIsAdmin(true);
          /* 슈퍼관리자: 관리자가 index에서 선택한 창고 ID 있으면 바로 진입 */
          var savedWid=localStorage.getItem('wms_adminWhId');
          try{var bk=localStorage.getItem('wms_bak');if(bk)setWhs(JSON.parse(bk));}catch(e){}
          dbListen(function(arr){
            setWhs(arr);
            try{localStorage.setItem('wms_bak',JSON.stringify(arr));}catch(e){}
          });
          if(savedWid){setWhId(savedWid);}
          setAuthSt('ready');
          return;
        }

        /* 일반 사용자: 창고 ID 확인 */
        fbDb.ref('userWarehouse/'+user.uid).get().then(function(whSnap){
          if(!whSnap.exists()){window.location.href=INDEX_PATH;return;}

  var wh=p.wh,onUpdate=p.onUpdate,onClose=p.onClose;
  var sheets=[{label:'현재상태',cells:wh.cells,stats:calcSt(wh)}].concat(wh.history.slice().reverse().map(function(h2){return{label:h2.label,cells:h2.cells,stats:h2.stats};}));
  var e1=useState(0),idx=e1[0],setIdx=e1[1];
  var e2=useState(false),copied=e2[0],setCopied=e2[1];
  var e3=useState(wh.sheetsUrl||''),url=e3[0],setUrl=e3[1];
  var e4=useState(!!wh.sheetsUrl),urlSaved=e4[0],setUrlSaved=e4[1];
  var tsv=buildTSV(wh,sheets[idx].cells,sheets[idx].stats,sheets[idx].label);

    h('div',{style:{background:CARD,borderRadius:'18px 18px 0 0',width:'100%',maxWidth:540,maxHeight:'90vh',display:'flex',flexDirection:'column'},onClick:function(e){e.stopPropagation();}},

      h('div',{style:{flex:1,overflow:'auto',padding:18}},
        h('div',{style:{fontSize:12,color:SUB,marginBottom:8,fontWeight:600}},'시트 선택'),
        h('div',{style:{display:'flex',gap:5,flexWrap:'wrap',marginBottom:14}},sheets.map(function(s,i){return h('button',{key:i,onClick:function(){setIdx(i);setCopied(false);},style:S(idx===i?'rgba(16,185,129,.2)':'rgba(255,255,255,.06)',idx===i?'#34D399':SUB,{padding:'5px 11px',fontSize:11,border:'1px solid '+(idx===i?'rgba(16,185,129,.4)':'transparent')})},s.label.slice(0,20));})),
        h('div',{style:{background:'rgba(16,185,129,.07)',border:'1px solid rgba(16,185,129,.25)',borderRadius:10,padding:14,marginBottom:14}},
          h('div',{style:{fontSize:12,fontWeight:700,color:'#34D399',marginBottom:8}},'STEP 1 - 복사 후 구글시트 A1에 Ctrl+V'),
          h('textarea',{readOnly:true,value:tsv,onFocus:function(e){e.target.select();},style:{width:'100%',height:110,background:'#0D1117',border:'1px solid '+BDR,borderRadius:7,padding:10,color:'#7EE787',fontSize:10,fontFamily:'monospace',lineHeight:1.5,resize:'none',outline:'none',boxSizing:'border-box'}}),
          h('button',{style:S(copied?'#059669':'#3B82F6','#fff',{padding:10,fontSize:14,width:'100%',borderRadius:8,marginTop:8}),onClick:function(){if(copyText(tsv))setCopied(true);}},copied?'복사완료':'데이터 복사하기'),
          copied&&h('div',{style:{marginTop:8,fontSize:12,color:'#34D399',textAlign:'center'}},'구글시트 A1 클릭 > Ctrl+V')),
        h(Inp,{lbl:'구글 Apps Script URL',val:url,set:setUrl,ph:'https://script.google.com/macros/s/.../exec'}),
        h('button',{style:S('#3B82F6','#fff',{padding:10,fontSize:13,width:'100%',borderRadius:8,marginTop:8}),onClick:function(){if(!url.includes('script.google.com')){alert('올바른 URL이 아닙니다');return;}onUpdate(function(w){return Object.assign({},w,{sheetsUrl:url.trim()});});setUrlSaved(true);}},'URL 저장'),
        urlSaved&&h('div',{style:{fontSize:12,color:'#34D399',textAlign:'center',marginTop:6}},'URL 저장됨'),
        url.includes('script.google.com')&&h('a',{href:url,target:'_blank',rel:'noreferrer',style:{display:'block',textAlign:'center',padding:9,marginTop:8,background:'rgba(99,102,241,.15)',border:'1px solid rgba(99,102,241,.3)',borderRadius:9,color:'#A5B4FC',fontSize:12,fontWeight:600,textDecoration:'none'}},'연결 확인'))));
}
