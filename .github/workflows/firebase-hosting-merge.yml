# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    # action-hosting-deploy@v0 targets Node 20; GitHub now forces it onto Node 24,
    # which breaks the Google OAuth token fetch ("Premature close"). Pin back to Node 20.
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAKECHANGO_WMS }}
          channelId: live
          projectId: makechango-wms
          # 15.22.2 (2026-06-24) regressed the OAuth token fetch → "Premature close".
          # Pin to last-known-good until a fixed release lands.
          firebaseToolsVersion: "15.22.1"
